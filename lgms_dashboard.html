<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGMS Call Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --g:#4a7c3f;--gd:#2d5226;--gm:#6aa35e;--gl:#edf7eb;--g2:#c8e6c2;
  --blue:#3461c1;--bl:#e8effe;--bm:#6b8fd4;
  --amber:#b86800;--al:#fff3e0;--am:#e8a020;
  --red:#c0392b;--rl:#fdecea;
  --ink:#111714;--ink2:#3d443d;--ink3:#7a857a;--ink4:#b0b8b0;
  --border:#dde8db;--border2:#eaf2e8;
  --surface:#f4f8f3;--surface2:#f9fbf8;--card:#fff;
  --sidebar-w:230px;
  --r:10px;--rl2:14px;--rl3:18px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.05);
  --sh2:0 6px 24px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --sh3:0 16px 48px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sora',sans-serif;font-size:14px;color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--gd);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:58px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:24px 26px 60px}
.sb-brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.sb-brand-icon{width:32px;height:32px;background:var(--gm);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-brand-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.3}
.sb-brand-text small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:.2px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-group{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;position:relative}
.sb-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.sb-btn.active{background:rgba(255,255,255,.14);color:#fff}
.sb-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gm);border-radius:0 3px 3px 0}
.sb-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.sb-sep{height:1px;background:rgba(255,255,255,.08);margin:8px 6px}
.sb-footer{padding:10px 10px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-version{font-size:10px;color:rgba(255,255,255,.25);padding:4px 10px}
.tb-title{font-size:15px;font-weight:700;color:var(--ink)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hamburger{display:none;padding:8px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;letter-spacing:-.1px}
.btn-p{background:var(--g);color:#fff;box-shadow:0 1px 3px rgba(74,124,63,.3)}.btn-p:hover{background:var(--gd)}
.btn-s{background:var(--card);color:var(--g);border:1.5px solid var(--g)}.btn-s:hover{background:var(--gl)}
.btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border)}.btn-g:hover{background:var(--border2)}
.btn-d{background:var(--card);color:var(--red);border:1.5px solid #f5c0bc}.btn-d:hover{background:var(--rl)}
.btn-sm{padding:5px 11px;font-size:11.5px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border-radius:var(--rl2);padding:20px;box-shadow:var(--sh);border:1px solid var(--border2);margin-bottom:16px}
.card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.card-hdr h3{font-size:13px;font-weight:700;color:var(--ink);flex:1;min-width:0}
.bdg{font-size:10px;font-weight:700;background:var(--gl);color:var(--gd);padding:2px 8px;border-radius:20px}
.bdg-blue{background:var(--bl);color:var(--blue)}
.bdg-amber{background:var(--al);color:var(--amber)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.attn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px}
.attn-card{border-radius:var(--rl2);padding:18px 20px;cursor:pointer;transition:all .2s;border:2px solid;position:relative;overflow:hidden}
.attn-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.attn-card.red{background:#fff5f5;border-color:#f5a5a5}
.attn-card.amber{background:#fffbf2;border-color:#f5d070}
.attn-card.blue{background:#f0f5ff;border-color:#a5bef5}
.ac-ico{font-size:24px;margin-bottom:8px;display:block}
.ac-num{font-size:32px;font-weight:700;line-height:1;margin-bottom:3px;letter-spacing:-1px}
.attn-card.red .ac-num{color:var(--red)}.attn-card.amber .ac-num{color:var(--amber)}.attn-card.blue .ac-num{color:var(--blue)}
.ac-lbl{font-size:11.5px;font-weight:600;color:var(--ink2)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:22px}
.mc{background:var(--card);border-radius:var(--rl2);padding:16px 18px;box-shadow:var(--sh);border:1px solid var(--border2);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.mc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--rl2) var(--rl2)}
.mc.green::after{background:var(--g)}.mc.blue::after{background:var(--blue)}.mc.amber::after{background:var(--amber)}.mc.red::after{background:var(--red)}
.mc-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.mc-val{font-size:28px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-1px}
.mc-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.lb{width:100%;border-collapse:collapse;font-size:12.5px}
.lb th{padding:9px 11px;text-align:left;font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.lb th:hover{color:var(--g)}
.lb td{padding:10px 11px;border-bottom:1px solid var(--border2);vertical-align:middle}
.lb tr:last-child td{border-bottom:none}
.lb tr:hover td{background:var(--surface);cursor:pointer}
.lb-rank{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.lb-r1{background:#fef3c7;color:#92400e}.lb-r2{background:#f1f5f9;color:#475569}.lb-r3{background:#fef9c3;color:#854d0e}.lb-rn{background:var(--surface);color:var(--ink3)}
.lb-name{font-weight:600;color:var(--g);cursor:pointer}.lb-name:hover{text-decoration:underline}
.lb-expand{font-size:12px;color:var(--ink3);padding:8px 11px;text-align:center;cursor:pointer;border-top:1px dashed var(--border)}
.lb-expand:hover{color:var(--g);background:var(--surface)}
.chip{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:22px;border-radius:6px;font-size:11.5px;font-weight:700;padding:0 6px;letter-spacing:-.2px}
.chip-g{background:#d1fae5;color:#065f46}.chip-y{background:#fef9c3;color:#854d0e}.chip-r{background:#fee2e2;color:#991b1b}.chip-n{background:var(--surface);color:var(--ink3)}
.comp-group{margin-bottom:14px}
.comp-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.comp-group-name{font-size:12px;font-weight:700;color:var(--ink);flex:1}
.comp-group-pct{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.comp-bar-wrap{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.comp-bar{height:100%;border-radius:4px;transition:width .4s}
.comp-steps{display:none;padding:8px 0 4px}
.comp-steps.open{display:block}
.comp-step{display:flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 0}
.comp-step-bar{width:70px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.comp-step-fill{height:100%;border-radius:2px}
.comp-step-pct{font-size:10px;font-weight:600;min-width:28px;text-align:right}
.lib-controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:7px 12px;flex:1;min-width:180px;max-width:300px;transition:border-color .15s}
.search-wrap:focus-within{border-color:var(--g)}
.search-wrap input{border:none;background:none;outline:none;font-size:12.5px;font-family:'Sora',sans-serif;color:var(--ink);width:100%}
.fsel{font-size:12px;padding:7px 10px;border:1.5px solid var(--border);border-radius:9px;background:var(--card);color:var(--ink);outline:none;font-family:'Sora',sans-serif;cursor:pointer}
.fsel:focus{border-color:var(--g)}
.lib-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.lib-count{font-size:12px;color:var(--ink3);font-weight:500}
.toggle-excl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);cursor:pointer;user-select:none}
.toggle-excl input{cursor:pointer;accent-color:var(--g)}
.bulk-bar{display:none;align-items:center;gap:10px;background:#fffbf2;border:1.5px solid #f5d070;border-radius:9px;padding:9px 14px;margin-bottom:10px;font-size:12.5px;font-weight:600;color:var(--amber)}
.bulk-bar.on{display:flex}
.crow{background:var(--card);border:1.5px solid var(--border);border-radius:var(--rl2);margin-bottom:7px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.crow:hover{border-color:var(--g2);box-shadow:0 2px 8px rgba(74,124,63,.07)}
.crow.open{border-color:var(--g);box-shadow:0 2px 12px rgba(74,124,63,.1)}
.crow.excl{opacity:.55;border-style:dashed}
.crow-head{padding:11px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .15s;min-height:56px}
.crow-head:hover,.crow.open .crow-head{background:var(--gl)}
.crow.open .crow-head{border-bottom:1.5px solid var(--border)}
.cr-av{width:34px;height:34px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cr-info{flex:1;min-width:0}
.cr-title{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-sub{font-size:11px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.op{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.op-b{background:#d1fae5;color:#065f46}.op-e{background:#dbeafe;color:#1e40af}.op-l{background:#fee2e2;color:#991b1b}.op-u{background:var(--surface);color:var(--ink3)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sd-pos{background:#16a34a}.sd-neu{background:#ca8a04}.sd-hes{background:#e67e22}.sd-neg{background:var(--red)}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--gl);color:var(--gd);cursor:pointer}
.tag-rm{cursor:pointer;opacity:.4;font-size:9px}.tag-rm:hover{opacity:1}
.tag-inp{font-size:12px;padding:2px 8px;border:1.5px solid var(--border);border-radius:20px;outline:none;width:90px;font-family:'Sora',sans-serif}
.tag-inp:focus{border-color:var(--g)}
.score-big{font-size:22px;font-weight:700;letter-spacing:-1px}
.chev{font-size:10px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.crow.open .chev{transform:rotate(180deg)}
.cr-body{display:none;padding:20px}
.crow.open .cr-body{display:block}
.ds{margin-bottom:18px}
.ds h4{font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
.score-box{background:var(--surface);border-radius:9px;padding:12px 14px;border:1px solid var(--border2)}
.score-box-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.score-box-val{font-size:22px;font-weight:700;line-height:1;letter-spacing:-1px}
.score-box-bar{height:3px;background:var(--border);border-radius:2px;margin:5px 0 4px;overflow:hidden}
.score-box-fill{height:100%;border-radius:2px}
.score-box-note{font-size:11px;color:var(--ink3);line-height:1.5}
.ck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:3px}
.ck-item{display:flex;align-items:center;gap:7px;font-size:12px;padding:3px 0;line-height:1.4}
.info-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-box{background:var(--surface);border-radius:9px;padding:13px;border:1px solid var(--border2)}
.info-box-title{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.info-list{list-style:none}
.info-list li{font-size:12px;padding:3px 0;display:flex;gap:7px;line-height:1.5}
.tr-bar{height:28px;border-radius:8px;overflow:hidden;display:flex;font-size:12px;font-weight:600}
.tr-rep{background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center}
.tr-cust{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center}
textarea.nt{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Sora',sans-serif;resize:vertical;min-height:64px;outline:none;transition:border-color .15s}
textarea.nt:focus{border-color:var(--g)}
.excl-banner{background:#fffbf2;border:1.5px solid #f5d070;border-radius:9px;padding:9px 13px;font-size:12px;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.txb{background:var(--surface);border-radius:9px;padding:14px;font-size:11px;font-family:'JetBrains Mono',monospace;line-height:2;max-height:300px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border2)}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.rep-card{background:var(--card);border-radius:var(--rl2);padding:18px;box-shadow:var(--sh);border:1.5px solid var(--border2);cursor:pointer;transition:all .2s}
.rep-card:hover{border-color:var(--g);box-shadow:var(--sh2);transform:translateY(-2px)}
.rep-card.active{border-color:var(--g);box-shadow:var(--sh2)}
.rep-av{width:44px;height:44px;border-radius:14px;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin-bottom:11px}
.rep-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.rep-sub{font-size:11px;color:var(--ink3);margin-bottom:8px}
.rep-score{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.rep-trend{font-size:11px;font-weight:700;margin-top:2px}
.rep-trend.up{color:#16a34a}.rep-trend.dn{color:var(--red)}.rep-trend.flat{color:var(--ink3)}
.rmgmt-table{width:100%;border-collapse:collapse;font-size:12.5px}
.rmgmt-table th{padding:9px 12px;text-align:left;font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)}
.rmgmt-table td{padding:11px 12px;border-bottom:1px solid var(--border2)}
.rmgmt-table tr:last-child td{border-bottom:none}
.rmgmt-table tr:hover td{background:var(--surface)}
.loc-tag{font-size:10.5px;font-weight:700;background:var(--gl);color:var(--gd);padding:2px 8px;border-radius:6px}
.sv-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border2);font-size:12.5px;flex-wrap:wrap}
.sv-item:last-child{border-bottom:none}
.sv-url{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);background:var(--surface);padding:4px 9px;border-radius:7px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;border:1px solid var(--border2)}
.sv-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.sv-mgr{background:var(--gl);color:var(--gd)}.sv-loc{background:var(--bl);color:var(--blue)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--rl2);padding:36px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--g);background:var(--gl)}
.dz-ico{font-size:36px;margin-bottom:10px;display:block}
.dz-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--ink3)}
.q-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--surface);border-radius:8px;margin-bottom:5px;font-size:12px;border:1px solid var(--border2)}
.q-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.q-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.q-size{color:var(--ink3);font-size:11px;flex-shrink:0}
.prog{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:10px 0 5px}
.prog-fill{height:100%;background:var(--g);border-radius:4px;transition:width .4s}
.prog-label{font-size:11.5px;color:var(--ink3)}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:2px}
.tab{padding:9px 17px;font-size:12.5px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--ink3);border-radius:8px 8px 0 0;transition:all .15s}
.tab:hover{color:var(--ink);background:var(--surface)}
.tab.active{border-bottom-color:var(--g);color:var(--g)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10.5px;font-weight:700;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Sora',sans-serif;outline:none;color:var(--ink);transition:border-color .15s;background:var(--card)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg textarea{min-height:140px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12px}
.modal-bg{position:fixed;inset:0;background:rgba(17,23,20,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(3px)}
.modal-box{background:var(--card);border-radius:var(--rl3);padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3)}
.modal-box h2{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border2)}
.share-toggle{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px}
.share-toggle button{flex:1;padding:9px;font-size:12.5px;font-weight:600;border:none;background:var(--surface);color:var(--ink2);cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s}
.share-toggle button.active{background:var(--g);color:#fff}
.msg-ok{background:#f0fdf4;border:1.5px solid #86efac;border-radius:9px;padding:10px 13px;color:#166534;font-size:12px;margin-top:8px}
.msg-err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:9px;padding:10px 13px;color:var(--red);font-size:12px;margin-top:8px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--g)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty-ico{font-size:40px;opacity:.25;margin-bottom:12px;display:block}
.chart-wrap{position:relative;height:210px}
.corr-item{padding:10px 0;border-bottom:1px solid var(--border2);font-size:12px}
.corr-item:last-child{border-bottom:none}
.share-banner{background:var(--gd);color:#fff;padding:10px 22px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:10px;flex-shrink:0}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.mobile-overlay.on{display:block}
@media(max-width:800px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:-240px;top:0;height:100vh;z-index:200;transition:left .25s}
  .sidebar.mobile-open{left:0;box-shadow:var(--sh3)}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .info-2col{grid-template-columns:1fr}
  .scores-grid{grid-template-columns:1fr 1fr}
  .attn-grid{grid-template-columns:1fr 1fr}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .page{padding:16px 14px 60px}
}
</style>
</head>
<body>
<div id="share-banner" style="display:none" class="share-banner">🔗 <strong id="share-banner-label">Shared View</strong> <span>· Read only</span></div>
<div class="shell">
<nav class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-brand-icon">🚚</div>
    <div class="sb-brand-text">Call Intelligence<small>Little Guys Movers</small></div>
  </div>
  <div class="sb-nav">
    <div class="sb-group" id="sb-g1">Analytics</div>
    <button class="sb-btn active" onclick="nav('overview')" id="nav-overview"><span class="sb-ico">🏠</span>Overview</button>
    <button class="sb-btn" onclick="nav('library')" id="nav-library"><span class="sb-ico">📞</span>Call Library</button>
    <button class="sb-btn" onclick="nav('profiles')" id="nav-profiles"><span class="sb-ico">👤</span>Rep Profiles</button>
    <div class="sb-sep"></div>
    <div class="sb-group" id="sb-g2">Management</div>
    <button class="sb-btn" onclick="nav('management')" id="nav-management"><span class="sb-ico">⚙️</span>Rep Management</button>
    <button class="sb-btn" onclick="nav('shared')" id="nav-shared"><span class="sb-ico">📤</span>Shared Views</button>
    <button class="sb-btn" onclick="nav('corrections')" id="nav-corrections"><span class="sb-ico">✏️</span>Correction Log</button>
    <div class="sb-sep"></div>
    <button class="sb-btn" onclick="nav('add')" id="nav-add"><span class="sb-ico">➕</span>Add Calls</button>
  </div>
  <div class="sb-footer"><div class="sb-version">v8 · LGMS Intelligence</div></div>
</nav>
<div class="mobile-overlay" id="mob-overlay" onclick="closeMob()"></div>
<div class="main">
  <header class="topbar">
    <button class="hamburger" onclick="openMob()">☰</button>
    <div class="tb-title" id="tb-title">Overview</div>
    <div class="tb-right" id="tb-right">
      <button class="btn btn-g btn-sm" onclick="exportCSV()">↓ CSV</button>
      <button class="btn btn-p btn-sm" onclick="nav('add')">+ Add Calls</button>
    </div>
  </header>
  <div class="page" id="page"></div>
</div>
</div>
<script>
const API='';
const CK=['got_move_date','got_customer_name','got_phone_number','got_cities','got_home_type','got_stairs_info','did_full_inventory','asked_forgotten_items','asked_about_boxes','gave_price_on_call','pitched_fvp','attempted_to_close','offered_email_estimate','mentioned_confirmations','thanked_customer','asked_name_at_start','led_estimate_process','scheduled_onsite_attempt','offered_alternatives','took_rapport_opportunities','completed_booking_wrapup','captured_lead'];
const CKFULL=['Move date','Customer name','Phone number','Cities/locations','Home type (load & unload)','Stairs info','Full room-by-room inventory','Forgotten items asked','Moving boxes asked','Gave price on call','FVP pitched','Attempted to close','Offered email estimate','Mentioned confirmation calls','Thanked customer','Asked customer name at start','Led estimate process (Navigator)','Attempted to schedule onsite','Offered alternatives for difficult moves','Took rapport opportunities','Completed booking wrap-up','Lead captured'];
const CK_GROUPS=[
  {name:'Information Gathering',keys:['got_move_date','got_customer_name','got_phone_number','got_cities','got_home_type','got_stairs_info'],color:'#3461c1'},
  {name:'Inventory & Details',keys:['did_full_inventory','asked_forgotten_items','asked_about_boxes'],color:'#6b21a8'},
  {name:'Pricing & FVP',keys:['gave_price_on_call','pitched_fvp'],color:'#b86800'},
  {name:'Closing & Follow-up',keys:['attempted_to_close','offered_email_estimate','mentioned_confirmations','thanked_customer'],color:'#4a7c3f'},
  {name:'Rapport & Navigation',keys:['asked_name_at_start','led_estimate_process','scheduled_onsite_attempt','offered_alternatives','took_rapport_opportunities'],color:'#c0392b'},
  {name:'Admin & Lead',keys:['completed_booking_wrapup','captured_lead'],color:'#065f46'},
];
const SK=['info_sequence','price_delivery','fvp_pitch','closing_attempt','call_control','professionalism','rapport_tone','overall'];
const SL=['Info Sequence','Price Delivery','FVP Pitch','Closing','Call Control','Professionalism','Rapport & Tone','Overall'];
const KWS=['Full Value Protection','confirmation call','hourly','moving boxes','fuel','declared value','schedule','Little Guys'];

let allCalls=[],reps=[],sharedViews=[],corrections=[];
let lbKey='overall',lbDir=-1,lbShowAll=false;
let selected=new Set();
let audioFiles=[];
let addTab='audio';
let currentPage='overview';
let trendChart=null,repTrendChart=null;
let shareType='location';
let reanalyzePoller=null;
let libFilters={rep:'',out:'',score:'',search:'',sort:'newest',showExcl:false,attn:''};
let dateFilter=30;

const SHARE_MODE=!!(window.SHARE_TOKEN);
const SHARE_REP_IDS=window.SHARE_REP_IDS||[];
const SHARE_LABEL=window.SHARE_LABEL||'';

async function init(){
  if(SHARE_MODE){
    g('share-banner').style.display='flex';
    g('share-banner-label').textContent=SHARE_LABEL||'Shared View';
    ['sb-g2','nav-management','nav-shared','nav-corrections','nav-add'].forEach(id=>{const el=g(id);if(el)el.style.display='none';});
    g('tb-right').innerHTML='';
  }
  await loadCalls();
  loadReps();loadSharedViews();loadCorrections();
  nav('overview');
  checkReanalStatus();
}
async function loadCalls(){try{const r=await fetch(API+'/calls');if(r.ok){let d=await r.json();if(SHARE_MODE&&SHARE_REP_IDS.length)d=d.filter(c=>SHARE_REP_IDS.includes(c.rep_name));allCalls=d;}}catch(e){}}
async function loadReps(){try{const r=await fetch(API+'/reps');if(r.ok)reps=await r.json();}catch(e){}}
async function loadSharedViews(){try{const r=await fetch(API+'/shared_views');if(r.ok)sharedViews=await r.json();}catch(e){}}
async function loadCorrections(){try{const r=await fetch(API+'/corrections');if(r.ok)corrections=await r.json();}catch(e){}}

function nav(page,opts={}){
  currentPage=page;
  document.querySelectorAll('.sb-btn').forEach(el=>el.classList.remove('active'));
  const btn=g('nav-'+page);if(btn)btn.classList.add('active');
  const titles={overview:'Overview',library:'Call Library',profiles:'Rep Profiles',management:'Rep Management',shared:'Shared Views',corrections:'Correction Log',add:'Add Calls'};
  g('tb-title').textContent=opts.title||titles[page]||page;
  if(!SHARE_MODE)g('tb-right').innerHTML=page==='add'?'':`<button class="btn btn-g btn-sm" onclick="exportCSV()">↓ CSV</button><button class="btn btn-p btn-sm" onclick="nav('add')">+ Add Calls</button>`;
  closeMob();
  ({overview:renderOverview,library:renderLibrary,profiles:renderProfiles,management:renderManagement,shared:renderShared,corrections:renderCorrections,add:renderAdd})[page]?.(opts);
}
function openMob(){g('sidebar').classList.add('mobile-open');g('mob-overlay').classList.add('on');}
function closeMob(){g('sidebar').classList.remove('mobile-open');g('mob-overlay').classList.remove('on');}

function getFC(attn=''){
  const now=new Date(),cutoff=dateFilter>0?new Date(now-dateFilter*86400000):null;
  return allCalls.filter(c=>{
    const dt=new Date(c.call_date||c.created_at);
    if(cutoff&&dt<cutoff)return false;
    if(attn==='decline'&&!c.availability_decline)return false;
    if(attn==='onsite'&&!c.onsite_suggested)return false;
    if(attn==='quality'&&(!c.call_quality||c.call_quality==='normal'))return false;
    if(attn==='continuation'&&!(c.is_continuation&&c.continuation_group_id))return false;
    return true;
  });
}
function scc(src){return(src||getFC()).filter(c=>!c.exclude_from_scoring);}
function avg(arr,k){const v=(arr||[]).map(c=>c.scores?.[k]?.score||0).filter(v=>v>0);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'—';}
function scCol(s){const n=parseFloat(s);if(isNaN(n))return'#9ca3af';return n>=8?'#16a34a':n>=5?'#d97706':'#dc2626';}
function chip(s){const n=parseFloat(s);if(isNaN(n)||s==='—')return'<span class="chip chip-n">—</span>';const c=n>=8?'chip-g':n>=5?'chip-y':'chip-r';return`<span class="chip ${c}">${typeof s==='number'?n.toFixed(1):s}</span>`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtS(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function ini(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function set(id,html){const el=g(id);if(el)el.innerHTML=html;}
function g(id){return document.getElementById(id);}

// ── OVERVIEW ──
function renderOverview(){
  const fc=getFC(),sc=scc(fc);
  const declines=allCalls.filter(c=>c.availability_decline).length;
  const onsites=allCalls.filter(c=>c.onsite_suggested).length;
  const badQ=allCalls.filter(c=>c.call_quality&&c.call_quality!=='normal').length;
  const conts=allCalls.filter(c=>c.is_continuation&&c.continuation_group_id).length;
  const booked=sc.filter(c=>c.call_outcome==='booked').length;
  const br=sc.length?Math.round(booked/sc.length*100):0;
  const compPct=sc.length?Math.round(sc.reduce((a,c)=>a+CK.filter(k=>c.checklist?.[k]).length,0)/(sc.length*CK.length)*100):0;
  const excl=fc.filter(c=>c.exclude_from_scoring).length;
  const attn=[
    declines>0?`<div class="attn-card red" onclick="navFilter('decline')"><span class="ac-ico">🚫</span><div class="ac-num">${declines}</div><div class="ac-lbl">Availability Declines</div></div>`:'',
    onsites>0?`<div class="attn-card amber" onclick="navFilter('onsite')"><span class="ac-ico">🏠</span><div class="ac-num">${onsites}</div><div class="ac-lbl">Onsite Suggested</div></div>`:'',
    badQ>0?`<div class="attn-card amber" onclick="navFilter('quality')"><span class="ac-ico">📵</span><div class="ac-num">${badQ}</div><div class="ac-lbl">Poor Audio/Disconnected</div></div>`:'',
    conts>0?`<div class="attn-card blue" onclick="navFilter('continuation')"><span class="ac-ico">🔗</span><div class="ac-num">${conts}</div><div class="ac-lbl">Continuation Calls</div></div>`:'',
  ].filter(Boolean).join('');
  set('page',`
    ${attn?`<div style="margin-bottom:6px"><div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">⚠ Needs Attention</div><div class="attn-grid">${attn}</div></div>`:''}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:700">Dashboard</div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="font-size:11px;color:var(--ink3)">Showing:</span>
        <select class="fsel" onchange="dateFilter=parseInt(this.value);renderOverview()" style="font-size:11.5px;padding:5px 9px">
          <option value="7" ${dateFilter===7?'selected':''}>Last 7 days</option>
          <option value="30" ${dateFilter===30?'selected':''}>Last 30 days</option>
          <option value="90" ${dateFilter===90?'selected':''}>Last 90 days</option>
          <option value="0" ${dateFilter===0?'selected':''}>All time</option>
        </select>
      </div>
    </div>
    <div class="metric-grid">
      <div class="mc green"><div class="mc-label">Total Calls</div><div class="mc-val">${fc.length}</div><div class="mc-sub">${excl} excluded</div></div>
      <div class="mc green"><div class="mc-label">Scored Calls</div><div class="mc-val">${sc.length}</div><div class="mc-sub">${new Set(sc.map(c=>c.rep_name)).size} reps</div></div>
      <div class="mc blue"><div class="mc-label">Avg Overall</div><div class="mc-val">${avg(sc,'overall')}</div><div class="mc-sub">out of 10</div></div>
      <div class="mc blue"><div class="mc-label">Avg Rapport</div><div class="mc-val">${avg(sc,'rapport_tone')}</div><div class="mc-sub">out of 10</div></div>
      <div class="mc amber"><div class="mc-label">Compliance</div><div class="mc-val">${compPct}%</div><div class="mc-sub">22-step avg</div></div>
      <div class="mc ${br>=50?'green':'red'}"><div class="mc-label">Booking Rate</div><div class="mc-val">${br}%</div><div class="mc-sub">${booked} booked</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-hdr"><h3>Rep Leaderboard</h3><span class="bdg" id="lb-cnt"></span></div>
        <div style="overflow-x:auto">
          <table class="lb"><thead><tr>
            <th>#</th><th onclick="sortLB('rep_name')">Rep</th><th onclick="sortLB('overall')">Overall ↕</th>
            <th onclick="sortLB('rapport_tone')">Rapport</th><th onclick="sortLB('price_delivery')">Price</th>
            <th onclick="sortLB('fvp_pitch')">FVP</th><th onclick="sortLB('closing_attempt')">Closing</th><th onclick="sortLB('calls')">Calls</th>
          </tr></thead><tbody id="lb-body"></tbody></table>
          <div class="lb-expand" id="lb-expand" onclick="lbShowAll=!lbShowAll;renderLB()"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><h3>Score Trends</h3><span class="bdg-blue bdg">Call date</span></div>
        <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-hdr"><h3>Process Compliance by Group</h3><span style="font-size:11px;color:var(--ink3)">Click to expand steps</span></div>
      <div id="comp-groups"></div>
    </div>
    <div class="grid-3">
      <div class="card"><div class="card-hdr"><h3>Talk Ratio</h3></div><div id="talk-viz"></div></div>
      <div class="card"><div class="card-hdr"><h3>Keywords</h3></div><div id="kw-viz"></div></div>
      <div class="card"><div class="card-hdr"><h3>Objections</h3></div><div id="obj-viz"></div></div>
    </div>`);
  renderLB();renderTrend(sc);renderCompGroups(sc);renderTalk(sc);renderKW(sc);renderObj(sc);
}
function navFilter(attn){libFilters.attn=attn;nav('library');}
function sortLB(k){if(lbKey===k)lbDir*=-1;else{lbKey=k;lbDir=-1;}renderLB();}
function renderLB(){
  const sc=scc(getFC());
  const repNames=[...new Set(sc.map(c=>c.rep_name))].filter(Boolean);
  const data=repNames.map(r=>{
    const rc=sc.filter(c=>c.rep_name===r);
    const a=k=>rc.length?(rc.reduce((s,c)=>s+(c.scores?.[k]?.score||0),0)/rc.length):0;
    return{rep_name:r,overall:a('overall'),rapport_tone:a('rapport_tone'),price_delivery:a('price_delivery'),fvp_pitch:a('fvp_pitch'),closing_attempt:a('closing_attempt'),calls:rc.length};
  });
  data.sort((a,b)=>lbKey==='rep_name'?a.rep_name.localeCompare(b.rep_name)*lbDir:(b[lbKey]-a[lbKey])*-lbDir);
  const cnt=g('lb-cnt');if(cnt)cnt.textContent=`${data.length} rep${data.length!==1?'s':''}`;
  const body=g('lb-body');if(!body)return;
  const disp=lbShowAll?data:data.slice(0,10);
  const exp=g('lb-expand');
  if(exp){exp.style.display=data.length<=10?'none':'block';exp.textContent=lbShowAll?'▲ Show top 10':`▼ Show all ${data.length} reps`;}
  body.innerHTML=disp.map((d,i)=>{
    const rc=i===0?'lb-r1':i===1?'lb-r2':i===2?'lb-r3':'lb-rn';
    return`<tr><td><span class="lb-rank ${rc}">${i+1}</span></td>
      <td><span class="lb-name" onclick="nav('profiles',{rep:'${esc(d.rep_name)}'})">${d.rep_name}</span></td>
      <td><span onclick="libFilters.rep='${esc(d.rep_name)}';nav('library')" style="cursor:pointer">${chip(d.overall.toFixed(1))}</span></td>
      <td>${chip(d.rapport_tone.toFixed(1))}</td><td>${chip(d.price_delivery.toFixed(1))}</td>
      <td>${chip(d.fvp_pitch.toFixed(1))}</td><td>${chip(d.closing_attempt.toFixed(1))}</td>
      <td style="color:var(--ink3);font-size:11px">${d.calls}</td></tr>`;
  }).join('')||'<tr><td colspan="8" style="text-align:center;color:var(--ink3);padding:16px">No scored calls</td></tr>';
}
function renderTrend(sc){
  const canvas=document.getElementById('trend-chart');if(!canvas)return;
  const sorted=[...(sc||scc(getFC()))].sort((a,b)=>new Date(a.call_date||a.created_at)-new Date(b.call_date||b.created_at));
  if(trendChart){trendChart.destroy();trendChart=null;}
  trendChart=new Chart(canvas,{type:'line',data:{labels:sorted.map(c=>fmtS(c.call_date||c.created_at)),datasets:[
    {label:'Overall',data:sorted.map(c=>c.scores?.overall?.score||0),borderColor:'#4a7c3f',backgroundColor:'rgba(74,124,63,.07)',borderWidth:2.5,pointRadius:2.5,tension:.4,fill:true},
    {label:'Rapport',data:sorted.map(c=>c.scores?.rapport_tone?.score||0),borderColor:'#3461c1',backgroundColor:'transparent',borderWidth:2,pointRadius:2,tension:.4,borderDash:[5,4]},
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,labels:{font:{size:11,family:'Sora'},boxWidth:14,padding:12}}},scales:{y:{min:0,max:10,ticks:{stepSize:2,color:'#7a857a',font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},x:{ticks:{color:'#7a857a',maxRotation:45,autoSkip:true,maxTicksLimit:10,font:{size:10}},grid:{display:false}}}}});
}
function renderCompGroups(sc){
  const el=g('comp-groups');if(!el)return;
  if(!sc||!sc.length){el.innerHTML='<div style="color:var(--ink3);font-size:12px;text-align:center;padding:20px">No scored calls in period</div>';return;}
  el.innerHTML=CK_GROUPS.map((grp,gi)=>{
    const pct=Math.round(sc.reduce((a,c)=>a+grp.keys.filter(k=>c.checklist?.[k]).length,0)/(sc.length*grp.keys.length)*100);
    const col=pct>=80?'#16a34a':pct>=50?'#d97706':'#dc2626';
    const steps=grp.keys.map(k=>{
      const sp=Math.round(sc.filter(c=>c.checklist?.[k]).length/sc.length*100);
      const sc2=sp>=80?'#16a34a':sp>=50?'#d97706':'#dc2626';
      const idx=CK.indexOf(k);
      return`<div class="comp-step"><span style="flex:1;font-size:11px">${CKFULL[idx]||k}</span><div class="comp-step-bar"><div class="comp-step-fill" style="width:${sp}%;background:${sc2}"></div></div><span class="comp-step-pct" style="color:${sc2}">${sp}%</span></div>`;
    }).join('');
    return`<div class="comp-group">
      <div class="comp-group-header" onclick="toggleCG(${gi})">
        <span class="comp-group-name">${grp.name}</span>
        <span class="comp-group-pct" style="color:${col}">${pct}%</span>
        <span style="font-size:11px;color:var(--ink4)">▾</span>
      </div>
      <div class="comp-bar-wrap"><div class="comp-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="comp-steps" id="cg-${gi}">${steps}</div>
    </div>`;
  }).join('');
}
function toggleCG(i){const el=g('cg-'+i);if(el)el.classList.toggle('open');}
function renderTalk(sc){
  const w=(sc||[]).filter(c=>c.talk_ratio_rep>0);const el=g('talk-viz');if(!el)return;
  if(!w.length){el.innerHTML='<div style="color:var(--ink3);font-size:12px">No data yet</div>';return;}
  const ar=Math.round(w.reduce((a,c)=>a+c.talk_ratio_rep,0)/w.length),ac=100-ar,ok=Math.abs(ar-40)<=8;
  el.innerHTML=`<div class="tr-bar" style="margin-bottom:9px"><div class="tr-rep" style="width:${ar}%">${ar}%</div><div class="tr-cust" style="width:${ac}%">${ac}%</div></div>

function clearLibF(){libFilters={rep:'',out:'',score:'',search:'',sort:'newest',showExcl:false,attn:''};renderLibrary();}
function renderCallList(){
  const q=libFilters.search.toLowerCase();
  let list=allCalls.filter(c=>{
    if(!libFilters.showExcl&&c.exclude_from_scoring)return false;
    if(libFilters.rep&&c.rep_name!==libFilters.rep)return false;
    if(libFilters.out&&c.call_outcome!==libFilters.out)return false;
    if(libFilters.score==='high'&&(c.scores?.overall?.score||0)<8)return false;
    if(libFilters.score==='mid'){const s=c.scores?.overall?.score||0;if(s<5||s>7)return false;}
    if(libFilters.score==='low'&&(c.scores?.overall?.score||0)>4)return false;
    if(libFilters.attn==='decline'&&!c.availability_decline)return false;
    if(libFilters.attn==='onsite'&&!c.onsite_suggested)return false;
    if(libFilters.attn==='quality'&&(!c.call_quality||c.call_quality==='normal'))return false;
    if(libFilters.attn==='continuation'&&!(c.is_continuation&&c.continuation_group_id))return false;
    if(q){const hay=[c.rep_name,c.caller_name,c.call_purpose,c.call_summary,c.transcript].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  if(libFilters.sort==='newest')list.sort((a,b)=>new Date(b.call_date||b.created_at)-new Date(a.call_date||a.created_at));
  else if(libFilters.sort==='oldest')list.sort((a,b)=>new Date(a.call_date||a.created_at)-new Date(b.call_date||b.created_at));

function toggleRow(id){const r=g('row-'+id);if(r)r.classList.toggle('open');}
function toggleSel(id){if(selected.has(id))selected.delete(id);else selected.add(id);updateBB();const r=g('row-'+id);if(r){const cb=r.querySelector('input[type=checkbox]');if(cb)cb.checked=selected.has(id);}}
function updateBB(){const b=g('bulk-bar');if(!b)return;const n=selected.size;b.classList.toggle('on',n>0);const c=g('bulk-cnt');if(c)c.textContent=`${n} call${n!==1?'s':''} selected`;}
function clearSel(){selected.clear();updateBB();renderCallList();}
function toggleSelAll(){const rows=document.querySelectorAll('#call-list .crow');const ids=[...rows].map(el=>el.id.replace('row-',''));const allSel=ids.every(id=>selected.has(id));if(allSel)ids.forEach(id=>selected.delete(id));else ids.forEach(id=>selected.add(id));updateBB();renderCallList();}
async function bulkDel(){const n=selected.size;if(!n||!confirm(`Delete ${n} call${n!==1?'s':''}?`))return;try{await fetch(API+'/bulk_delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:[...selected]})});allCalls=allCalls.filter(c=>!selected.has(c.id));selected.clear();renderCallList();}catch(e){alert(e.message);}}
async function delCall(id){if(!confirm('Delete?'))return;try{await fetch(API+'/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});allCalls=allCalls.filter(c=>c.id!==id);selected.delete(id);renderCallList();}catch(e){alert(e.message);}}
async function toggleExcl(id,val){await updCall(id,{exclude_from_scoring:val,exclusion_reason:val?'Manually excluded':''});}
async function addTag(e,id){if(e.key!=='Enter')return;const inp=e.target,tag=inp.value.trim();if(!tag)return;const c=allCalls.find(x=>x.id===id);if(!c)return;await updCall(id,{tags:[...(c.tags||[]),tag]});inp.value='';}
async function rmTag(id,tag){const c=allCalls.find(x=>x.id===id);if(!c)return;await updCall(id,{tags:(c.tags||[]).filter(t=>t!==tag)});}
async function saveNotes(id){await updCall(id,{manager_notes:g('nt-'+id)?.value||''});}
async function applyOv(id){
  const k=g('ok-'+id)?.value,v=parseInt(g('ov-'+id)?.value),note=g('on-'+id)?.value||'';
  if(!k||isNaN(v)||v<1||v>10){alert('Select a category and enter 1-10');return;}
  const c=allCalls.find(x=>x.id===id);const orig=c?.scores?.[k]?.score||0;
  await updCall(id,{score_overrides:{...(c?.score_overrides||{}),[k]:v}});
  try{await fetch(API+'/corrections/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:id,category:k,original_score:orig,corrected_score:v,manager_note:note})});await loadCorrections();}catch(e){}
}
async function clrOv(id){await updCall(id,{score_overrides:{}});}
async function updCall(id,data){
  try{
    await fetch(API+'/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,...data})});
    const i=allCalls.findIndex(c=>c.id===id);if(i>=0)allCalls[i]={...allCalls[i],...data};
    if(currentPage==='library')renderCallList();else if(currentPage==='overview')renderOverview();
  }catch(e){alert('Save failed: '+e.message);}
}

// ── REP PROFILES ──
function renderProfiles(opts={}){
  const repNames=[...new Set(allCalls.map(c=>c.rep_name))].filter(Boolean).sort();
  const cards=repNames.map(r=>{
    const rc=allCalls.filter(c=>c.rep_name===r&&!c.exclude_from_scoring);
    const overall=rc.length?(rc.reduce((a,c)=>a+(c.scores?.overall?.score||0),0)/rc.length).toFixed(1):'—';
    const rapport=rc.length?(rc.reduce((a,c)=>a+(c.scores?.rapport_tone?.score||0),0)/rc.length).toFixed(1):'—';
    const sorted=[...rc].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const r5=sorted.slice(0,5).map(c=>c.scores?.overall?.score||0),p5=sorted.slice(5,10).map(c=>c.scores?.overall?.score||0);
    const ra=r5.length?r5.reduce((a,b)=>a+b,0)/r5.length:0,pa=p5.length?p5.reduce((a,b)=>a+b,0)/p5.length:0;
    const trend=pa===0?'flat':ra>pa+0.3?'up':ra<pa-0.3?'dn':'flat';
    return`<div class="rep-card${opts.rep===r?' active':''}" onclick="openRepProfile('${esc(r)}')">
      <div class="rep-av">${ini(r)}</div>
      <div class="rep-name">${esc(r)}</div>
      <div class="rep-sub">${rc.length} scored call${rc.length!==1?'s':''}</div>
      <div class="rep-score" style="color:${scCol(parseFloat(overall))}">${overall}</div>
      <div style="font-size:11px;color:var(--ink3)">Rapport: ${rapport}/10</div>
      <div class="rep-trend ${trend}">${trend==='up'?'↑ Improving':trend==='dn'?'↓ Declining':'→ Stable'}</div>
    </div>`;
  }).join('');
  set('page',`<div class="rep-grid">${cards||'<div class="empty"><span class="empty-ico">👤</span><p>No rep data yet.</p></div>'}</div><div id="rep-detail"></div>`);
  if(opts.rep)openRepProfile(opts.rep);
}
function openRepProfile(repName){
  const rc=allCalls.filter(c=>c.rep_name===repName),sc=rc.filter(c=>!c.exclude_from_scoring);
  const sorted=[...rc].sort((a,b)=>new Date(b.call_date||b.created_at)-new Date(a.call_date||a.created_at));
  const teamSc=scc(getFC());
  document.querySelectorAll('.rep-card').forEach(el=>el.classList.toggle('active',el.querySelector('.rep-name')?.textContent===repName));

      <div class="info-box"><div class="info-box-title">Recurring Coaching Points</div><ul class="info-list">${topCoach.map(([p,n])=>`<li><span>⚡</span>${esc(p)} <span style="color:var(--ink3);font-size:10px">(${n}×)</span></li>`).join('')||'<li style="color:var(--ink3)">Not enough data</li>'}</ul></div>
    </div>

// ── MANAGEMENT ──
function renderManagement(){
  const repNames=[...new Set(allCalls.map(c=>c.rep_name))].filter(Boolean).sort();
  const rows=repNames.map(r=>{
    const cnt=allCalls.filter(c=>c.rep_name===r).length;
    const sc2=allCalls.filter(c=>c.rep_name===r&&!c.exclude_from_scoring);
    const avgO=sc2.length?(sc2.reduce((a,c)=>a+(c.scores?.overall?.score||0),0)/sc2.length).toFixed(1):'—';
    const dbRep=reps.find(rep=>rep.full_name===r||rep.nickname===r);
    return`<tr><td style="font-weight:600">${esc(r)}</td><td>${dbRep?.location?`<span class="loc-tag">${esc(dbRep.location)}</span>`:'<span style="color:var(--ink3)">—</span>'}</td><td>${cnt}</td><td>${chip(avgO)}</td><td><span style="font-size:10px;font-weight:700;color:#16a34a;background:#d1fae5;padding:2px 8px;border-radius:10px">Active</span></td><td><button class="btn btn-g btn-xs" onclick="openRenameModal('${esc(r)}')">Rename</button></td></tr>`;
  }).join('');
  const job=window._lastJobStatus||{status:'idle'};
  let reanalyzeHtml='';
  if(job.status==='running'){const pct=job.total?Math.round(job.processed/job.total*100):0;reanalyzeHtml=`<div style="background:var(--surface);border-radius:9px;padding:14px;margin-top:12px;border:1px solid var(--border2)"><div class="prog"><div class="prog-fill" id="reanalyze-prog" style="width:${pct}%"></div></div><div class="prog-label" id="reanalyze-status">Processing ${job.processed}/${job.total}: ${esc(job.current||'…')}</div></div>`;}
  else if(job.status==='complete')reanalyzeHtml=`<div class="msg-ok" style="margin-top:10px">✓ Done! ${job.processed} calls re-analyzed.</div>`;
  set('page',`
    <div class="grid-2">
      <div class="card">
        <div class="card-hdr"><h3>Rep Roster</h3><button class="btn btn-p btn-sm" onclick="openAddRepModal()">+ Add Rep</button></div>
        <table class="rmgmt-table"><thead><tr><th>Name</th><th>Location</th><th>Calls</th><th>Avg Score</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--ink3);padding:16px">No reps found</td></tr>'}</tbody></table>
      </div>
      <div>
        <div class="card">
          <div class="card-hdr"><h3>AI Deduplication</h3></div>
          <p style="font-size:12px;color:var(--ink3);margin-bottom:12px">Find rep names that may refer to the same person.</p>
          <button class="btn btn-s btn-sm" onclick="runDedup()" id="dedup-btn">🔍 Check for duplicates</button>
          <div id="dedup-results" style="margin-top:12px"></div>
        </div>
        <div class="card">
          <div class="card-hdr"><h3>Bulk Re-Analyze</h3></div>
          <p style="font-size:12px;color:var(--ink3);margin-bottom:12px">Re-run all transcripts through updated Claude prompt. Runs in background. ~$0.02/call.</p>
          <button class="btn btn-s btn-sm" onclick="startReanalyze()" id="reanalyze-btn" ${job.status==='running'?'disabled':''}>${job.status==='running'?'<span class="spin spin-dark"></span> Running…':'⚡ Start bulk re-analyze'}</button>
          ${reanalyzeHtml}
        </div>
      </div>
    </div>
    <div class="modal-bg" id="rename-modal" style="display:none"><div class="modal-box"><h2>Rename Rep</h2>
      <div class="fg"><label>Current name</label><input type="text" id="rename-old" readonly style="background:var(--surface)" /></div>
      <div class="fg"><label>New name</label><input type="text" id="rename-new" placeholder="Enter new name" /></div>
      <div id="rename-msg"></div>
      <div class="modal-btns"><button class="btn btn-g" onclick="g('rename-modal').style.display='none'">Cancel</button><button class="btn btn-p" onclick="doRename()">Rename</button></div>
    </div></div>
    <div class="modal-bg" id="add-rep-modal" style="display:none"><div class="modal-box"><h2>Add Rep</h2>
      <div class="fg"><label>Full name *</label><input type="text" id="new-rep-name" placeholder="e.g. Caleb" /></div>
      <div class="fg"><label>Nickname</label><input type="text" id="new-rep-nick" placeholder="e.g. C" /></div>
      <div class="fg"><label>Location tag</label><input type="text" id="new-rep-loc" placeholder="e.g. FAY, FC, NWA" /></div>
      <div id="add-rep-msg"></div>
      <div class="modal-btns"><button class="btn btn-g" onclick="g('add-rep-modal').style.display='none'">Cancel</button><button class="btn btn-p" onclick="doAddRep()">Add Rep</button></div>
    </div></div>`);
}
function openRenameModal(name){g('rename-old').value=name;g('rename-new').value='';g('rename-msg').innerHTML='';g('rename-modal').style.display='flex';}
function openAddRepModal(){g('new-rep-name').value='';g('new-rep-nick').value='';g('new-rep-loc').value='';g('add-rep-msg').innerHTML='';g('add-rep-modal').style.display='flex';}
async function doRename(){
  const old=g('rename-old').value,n=g('rename-new').value.trim();
  if(!n){g('rename-msg').innerHTML='<div class="msg-err">Enter a new name</div>';return;}
  try{const r=await fetch(API+'/reps/bulk_rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:old,new_name:n})});const res=await r.json();if(!r.ok)throw new Error(res.error);allCalls.forEach(c=>{if(c.rep_name===old)c.rep_name=n;});g('rename-msg').innerHTML=`<div class="msg-ok">✓ Renamed ${res.renamed} calls</div>`;setTimeout(()=>{g('rename-modal').style.display='none';renderManagement();},1200);}catch(e){g('rename-msg').innerHTML=`<div class="msg-err">${e.message}</div>`;}
}
async function doAddRep(){
  const name=g('new-rep-name').value.trim();if(!name){g('add-rep-msg').innerHTML='<div class="msg-err">Name required</div>';return;}
  try{await fetch(API+'/reps/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:name,nickname:g('new-rep-nick').value.trim(),location:g('new-rep-loc').value.trim()})});await loadReps();g('add-rep-msg').innerHTML='<div class="msg-ok">✓ Added</div>';setTimeout(()=>{g('add-rep-modal').style.display='none';renderManagement();},1000);}catch(e){g('add-rep-msg').innerHTML=`<div class="msg-err">${e.message}</div>`;}
}
async function runDedup(){
  const btn=g('dedup-btn'),res=g('dedup-results');btn.disabled=true;btn.innerHTML='<span class="spin spin-dark"></span> Analyzing…';
  try{const r=await fetch(API+'/reps/deduplicate',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const data=await r.json();btn.disabled=false;btn.textContent='🔍 Check for duplicates';
    if(!data.suggestions?.length){res.innerHTML='<div class="msg-ok">✓ No duplicates found</div>';return;}
    res.innerHTML=data.suggestions.map((s,i)=>`<div style="background:var(--al);border:1.5px solid #f5d070;border-radius:9px;padding:12px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;margin-bottom:3px">${Math.round(s.confidence*100)}% confidence</div><div style="font-size:12px;margin-bottom:5px"><strong>${esc(s.canonical)}</strong> ← ${s.variants.map(v=>esc(v)).join(', ')}</div><div style="font-size:11px;color:var(--ink3);margin-bottom:8px">${esc(s.reason)}</div><div style="display:flex;gap:6px"><button class="btn btn-p btn-xs" onclick="acceptDedup('${esc(s.canonical)}',${JSON.stringify(s.variants)})">Accept & merge</button><button class="btn btn-g btn-xs" onclick="this.closest('[style]').remove()">Dismiss</button></div></div>`).join('');
  }catch(e){btn.disabled=false;btn.textContent='🔍 Check for duplicates';res.innerHTML=`<div class="msg-err">${e.message}</div>`;}
}
async function acceptDedup(canonical,variants){
  for(const v of variants){if(v===canonical)continue;try{await fetch(API+'/reps/bulk_rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:v,new_name:canonical})});allCalls.forEach(c=>{if(c.rep_name===v)c.rep_name=canonical;});}catch(e){}}
  renderManagement();
}
async function startReanalyze(){
  const btn=g('reanalyze-btn');btn.disabled=true;btn.innerHTML='<span class="spin spin-dark"></span> Starting…';
  try{await fetch(API+'/reanalyze/start',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});startReanalPoller();}catch(e){btn.disabled=false;btn.textContent='⚡ Start bulk re-analyze';alert('Failed: '+e.message);}
}
function startReanalPoller(){
  if(reanalyzePoller)clearInterval(reanalyzePoller);
  reanalyzePoller=setInterval(async()=>{
    try{const r=await fetch(API+'/reanalyze/status');const d=await r.json();window._lastJobStatus=d;
      const prog=g('reanalyze-prog');if(prog&&d.total)prog.style.width=Math.round(d.processed/d.total*100)+'%';
      const stat=g('reanalyze-status');if(stat)stat.textContent=`Processing ${d.processed}/${d.total}: ${d.current||'…'}`;
      const btn=g('reanalyze-btn');
      if(d.status==='complete'||d.status==='error'){clearInterval(reanalyzePoller);reanalyzePoller=null;if(btn){btn.disabled=false;btn.textContent='⚡ Start bulk re-analyze';}await loadCalls();if(currentPage==='management')renderManagement();}
      else if(btn){btn.disabled=true;btn.innerHTML='<span class="spin spin-dark"></span> Running…';}
    }catch(e){}
  },2500);
}
async function checkReanalStatus(){try{const r=await fetch(API+'/reanalyze/status');const d=await r.json();window._lastJobStatus=d;if(d.status==='running')startReanalPoller();}catch(e){}}

    <div class="card-hdr"><h3>Correction Log</h3><span class="bdg">${corrections.length} corrections</span></div>
    <p style="font-size:12px;color:var(--ink3);margin-bottom:14px">Score corrections are automatically included in future Claude analysis calls as calibration examples.</p>
    ${corrections.length?corrections.map(c=>`<div class="corr-item"><div><span style="font-weight:700">${c.category?.replace(/_/g,' ')||'unknown'}</span> <span style="color:var(--red)">${c.original_score}</span> <span style="color:var(--g)">→ ${c.corrected_score}</span> <span style="color:var(--ink3);font-size:11px;margin-left:8px">${fmt(c.created_at)}</span>${c.used_in_prompt?'<span style="font-size:10px;font-weight:700;color:#16a34a;background:#d1fae5;padding:1px 6px;border-radius:8px;margin-left:6px">Active</span>':''}</div>${c.manager_note?`<div style="color:var(--ink3);margin-top:2px;font-size:11px">${esc(c.manager_note)}</div>`:''}</div>`).join(''):`<div class="empty"><span class="empty-ico">✏️</span><p>No corrections yet. Use score override in any call to log a correction.</p></div>`}
  </div>`);
}

// ── ADD CALLS ──
function renderAdd(){
  set('page',`<div style="max-width:680px;margin:0 auto"><div class="card">
    <h2 style="font-size:16px;font-weight:700;margin-bottom:16px">Add Call Analysis</h2>
    <div class="tabs">
      <div class="tab${addTab==='audio'?' active':''}" onclick="switchAddTab('audio')">🎙 Audio</div>
      <div class="tab${addTab==='paste'?' active':''}" onclick="switchAddTab('paste')">📋 Paste Transcript</div>
      <div class="tab${addTab==='file'?' active':''}" onclick="switchAddTab('file')">📄 Upload .txt</div>
    </div>
    <div id="add-audio" style="display:${addTab==='audio'?'block':'none'}">
      <div style="background:var(--gl);border:1.5px solid var(--g2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--gd);margin-bottom:14px;font-weight:500">🎙 Drop multiple files or a ZIP. Processed 3 at a time. Duplicates skipped automatically.</div>
      <div class="drop-zone" id="audio-drop" onclick="g('audio-input').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
        <span class="dz-ico">🎙</span><div class="dz-title">Drop audio files or a ZIP here</div><div class="dz-sub">MP3, M4A, WAV, OGG — or a Vonage ZIP export</div>
      </div>
      <input type="file" id="audio-input" accept="audio/*,.mp3,.m4a,.wav,.ogg,.mp4,.zip" multiple style="display:none" onchange="handleSelect(this.files)" />
      <div id="audio-queue" style="display:none;margin-top:12px"><div style="font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Queue</div><div id="audio-queue-list"></div></div>
      <div id="audio-progress" style="display:none;margin-top:10px"><div class="prog"><div class="prog-fill" id="audio-prog-bar" style="width:0%"></div></div><div class="prog-label" id="audio-prog-text">Preparing…</div><div id="audio-skipped" style="display:none;margin-top:8px"><div style="font-size:11px;font-weight:700;color:var(--amber);margin-bottom:4px">Skipped:</div><div id="audio-skipped-list" style="font-size:11px;color:var(--ink3)"></div></div></div>
      <div id="add-audio-msg"></div>
      <div style="margin-top:14px;text-align:right"><button class="btn btn-p" id="add-audio-btn" onclick="submitAudio()" disabled>Analyze & Save</button></div>
    </div>
    <div id="add-paste" style="display:${addTab==='paste'?'block':'none'}">
      <div class="fg"><label>Rep Name</label><input type="text" id="paste-rep" placeholder="Will auto-detect from transcript" /></div>
      <div class="fg"><label>Call Outcome</label><select id="paste-out"><option value="unknown">Let AI decide</option><option value="booked">Booked</option><option value="estimate_sent">Estimate sent</option><option value="lost">Lost</option></select></div>
      <div class="fg"><label>Transcript *</label><textarea id="paste-tx" placeholder="Paste transcript here…"></textarea></div>
      <div id="paste-msg"></div>
      <div style="text-align:right;margin-top:10px"><button class="btn btn-p" id="paste-btn" onclick="submitPaste()">Analyze & Save</button></div>
    </div>
    <div id="add-file" style="display:${addTab==='file'?'block':'none'}">
      <div class="fg"><label>Rep Name</label><input type="text" id="file-rep" placeholder="Will auto-detect" /></div>
      <div class="fg"><label>Call Outcome</label><select id="file-out"><option value="unknown">Let AI decide</option><option value="booked">Booked</option><option value="estimate_sent">Estimate sent</option><option value="lost">Lost</option></select></div>
      <div class="fg"><label>Transcript file (.txt)</label><input type="file" id="file-input" accept=".txt,text/plain" /></div>
      <div id="file-msg"></div>
      <div style="text-align:right;margin-top:10px"><button class="btn btn-p" id="file-btn" onclick="submitFile()">Analyze & Save</button></div>
    </div>
  </div></div>`);
}
function switchAddTab(t){addTab=t;['audio','paste','file'].forEach(x=>{const el=g('add-'+x);if(el)el.style.display=x===t?'block':'none';});document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['audio','paste','file'][i]===t);});}
function handleDrop(e){e.preventDefault();g('audio-drop').classList.remove('drag');handleFilesWithZip([...e.dataTransfer.files]);}
function handleSelect(files){handleFilesWithZip([...files]);}
async function handleFilesWithZip(files){
  const zipFiles=files.filter(f=>f.name.toLowerCase().endsWith('.zip')||f.type.includes('zip'));
  const audioOnly=files.filter(f=>f.type.startsWith('audio/')||f.name.match(/\.(mp3|m4a|wav|ogg|mp4|webm)$/i));
  if(zipFiles.length){
    const list=g('audio-queue-list'),queue=g('audio-queue');
    if(queue)queue.style.display='block';
    if(list)list.innerHTML=`<div class="q-item"><span class="q-ico"><span class="spin spin-dark"></span></span><span class="q-name">Extracting ZIP…</span></div>`;
    for(const zf of zipFiles){
      try{
        const zip=await JSZip.loadAsync(zf);
        const exts=new Set(['.mp3','.m4a','.wav','.ogg','.mp4','.webm','.mpeg','.mpga']);
        const entries=Object.values(zip.files).filter(f=>{if(f.dir)return false;const n=f.name.toLowerCase();if(n.startsWith('__')||n.startsWith('.'))return false;return exts.has(n.substring(n.lastIndexOf('.')));});
        for(const entry of entries){const blob=await entry.async('blob');audioOnly.push(new File([blob],entry.name.split('/').pop(),{type:'audio/mpeg'}));}
        if(list)list.innerHTML=`<div class="q-item" style="background:var(--gl)"><span class="q-ico">✅</span><span class="q-name">Extracted ${entries.length} files from ${zf.name}</span></div>`;
      }catch(err){if(list)list.innerHTML=`<div class="q-item" style="background:var(--rl)"><span class="q-ico">❌</span><span class="q-name">Failed: ${err.message}</span></div>`;return;}
    }
    setTimeout(()=>setAudioFiles(audioOnly),500);
  }else{setAudioFiles(audioOnly);}
}
function setAudioFiles(files){
  audioFiles=files;const btn=g('add-audio-btn');if(btn)btn.disabled=!files.length;
  if(!files.length)return;
  const queue=g('audio-queue'),list=g('audio-queue-list');
  if(queue)queue.style.display='block';
  if(list)list.innerHTML=files.map((f,i)=>`<div class="q-item" id="qi-${i}"><span class="q-ico" id="qis-${i}">⭕</span><span class="q-name">${esc(f.name)}</span><span class="q-size">${(f.size/1024/1024).toFixed(1)}MB</span></div>`).join('');
}
function setQS(i,s){const el=document.getElementById('qis-'+i);if(el)el.innerHTML={processing:'▶',done:'✅',skipped:'⚠️',error:'❌'}[s]||'⭕';}
async function submitAudio(){
  if(!audioFiles.length)return;
  const btn=g('add-audio-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Processing…';
  g('audio-progress').style.display='block';
  const skipped=[];let processed=0;const total=audioFiles.length;
  for(let i=0;i<total;i+=3){
    const batch=audioFiles.slice(i,i+3);
    await Promise.all(batch.map(async(af,bi)=>{
      const idx=i+bi;
      if(af.size>25*1024*1024){skipped.push(`${af.name} (too large)`);setQS(idx,'skipped');return;}
      setQS(idx,'processing');
      g('audio-prog-text').textContent=`Processing batch ${Math.floor(i/3)+1}/${Math.ceil(total/3)}: ${af.name}`;
      try{
        const dupR=await fetch(API+'/check_duplicate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:af.name})});
        const dupD=await dupR.json();
        if(dupD.duplicate){skipped.push(`${af.name} — already exists`);setQS(idx,'skipped');return;}
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(af);});
        const tr=await fetch(API+'/transcribe_and_analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:b64,filename:af.name})});
        const trD=await tr.json();
        if(!tr.ok){skipped.push(`${af.name} (${trD.error||'failed'})`);setQS(idx,'error');return;}
        const repName=trD.rep_name_detected&&trD.rep_name_detected!=='Unknown'?trD.rep_name_detected:'Unknown';
        const sr=await fetch(API+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...trD,rep_name:repName,filename:af.name,check_duplicate:true})});
        const saved=await sr.json();
        if(!sr.ok||saved.duplicate){skipped.push(`${af.name} (${saved.duplicate?'duplicate':saved.error||'failed'})`);setQS(idx,saved.duplicate?'skipped':'error');return;}
        allCalls.unshift(Array.isArray(saved)?saved[0]:saved);setQS(idx,'done');processed++;
      }catch(e){skipped.push(`${af.name} (${e.message})`);setQS(idx,'error');}
    }));
    g('audio-prog-bar').style.width=Math.round(Math.min(i+3,total)/total*100)+'%';
  }
  g('audio-prog-bar').style.width='100%';g('audio-prog-text').textContent=`Done! ${processed} analyzed${skipped.length?`, ${skipped.length} skipped`:''}`;
  if(skipped.length){g('audio-skipped').style.display='block';g('audio-skipped-list').innerHTML=skipped.map(s=>`<div>• ${esc(s)}</div>`).join('');}
  if(processed>0)g('add-audio-msg').innerHTML=`<div class="msg-ok">✓ ${processed} call${processed!==1?'s':''} added!</div>`;
  btn.disabled=false;btn.textContent='Analyze & Save';audioFiles=[];
}
async function submitPaste(){
  const btn=g('paste-btn'),msg=g('paste-msg');
  const rep=g('paste-rep').value.trim(),tx=g('paste-tx').value.trim(),out=g('paste-out').value;
  if(!tx){msg.innerHTML='<div class="msg-err">Please provide a transcript</div>';return;}
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Analyzing…';
  try{
    const ar=await fetch(API+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:tx,filename:`${rep||'unknown'}_call.txt`})});
    const res=await ar.json();if(!ar.ok)throw new Error(res.error);
    if(out!=='unknown')res.call_outcome=out;
    const sr=await fetch(API+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...res,rep_name:rep||res.rep_name_detected||'Unknown',transcript:tx})});
    const saved=await sr.json();if(!sr.ok)throw new Error(saved.error);
    allCalls.unshift(Array.isArray(saved)?saved[0]:saved);
    msg.innerHTML='<div class="msg-ok">✓ Saved!</div>';g('paste-tx').value='';btn.disabled=false;btn.textContent='Analyze & Save';
  }catch(e){msg.innerHTML=`<div class="msg-err">⚠ ${e.message}</div>`;btn.disabled=false;btn.textContent='Analyze & Save';}
}
async function submitFile(){
  const btn=g('file-btn'),msg=g('file-msg');
  const rep=g('file-rep').value.trim(),out=g('file-out').value;
  const f=g('file-input').files[0];if(!f){msg.innerHTML='<div class="msg-err">Select a file</div>';return;}
  const tx=await f.text();btn.disabled=true;btn.innerHTML='<span class="spin"></span> Analyzing…';
  try{
    const ar=await fetch(API+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript:tx,filename:f.name})});
    const res=await ar.json();if(!ar.ok)throw new Error(res.error);
    if(out!=='unknown')res.call_outcome=out;
    const sr=await fetch(API+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...res,rep_name:rep||res.rep_name_detected||'Unknown',transcript:tx,filename:f.name})});
    const saved=await sr.json();if(!sr.ok)throw new Error(saved.error);
    allCalls.unshift(Array.isArray(saved)?saved[0]:saved);
    msg.innerHTML='<div class="msg-ok">✓ Saved!</div>';btn.disabled=false;btn.textContent='Analyze & Save';
  }catch(e){msg.innerHTML=`<div class="msg-err">⚠ ${e.message}</div>`;btn.disabled=false;btn.textContent='Analyze & Save';}
}

function exportPDFRep(name){window.open(API+`/export/pdf/rep/${encodeURIComponent(name)}`,'_blank');}
