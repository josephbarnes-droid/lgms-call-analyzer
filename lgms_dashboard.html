<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGMS Call Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  /* Dark forest */
  --bg:#090e09;--bg2:#0d140d;--bg3:#111a11;
  --card:#141f14;--card2:#172117;
  --border:#1e301e;--border2:#253825;--border3:#2d442d;
  /* Greens */
  --g:#4caf50;--gd:#388e3c;--gm:#66bb6a;--gl:rgba(76,175,80,.08);--g2:rgba(76,175,80,.15);
  --g-glow:0 0 20px rgba(76,175,80,.15);--g-glow2:0 0 32px rgba(76,175,80,.25);
  /* Text */
  --ink:#e8f5e9;--ink2:#a5c8a7;--ink3:#6a8f6c;--ink4:#3d5e3f;
  /* Accents */
  --blue:#5c9eff;--bl:rgba(92,158,255,.1);--bm:#5c9eff;
  --amber:#ffb74d;--al:rgba(255,183,77,.1);--am:#ffb74d;
  --red:#ef5350;--rl:rgba(239,83,80,.1);
  /* Legacy surface aliases */
  --surface:var(--bg2);--surface2:var(--bg3);
  --sidebar-w:220px;
  --r:10px;--rl2:14px;--rl3:18px;
  --sh:0 2px 8px rgba(0,0,0,.4);
  --sh2:0 8px 32px rgba(0,0,0,.5);
  --sh3:0 20px 60px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0}
.page{flex:1;overflow-y:auto;padding:24px 26px 60px;background:var(--bg)}
.sb-brand{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.sb-brand-icon{width:32px;height:32px;background:var(--gm);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-brand-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.3}
.sb-brand-text small{display:block;font-size:10px;font-weight:400;color:rgba(255,255,255,.45);letter-spacing:.2px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-group{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px}
.sb-btn{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;position:relative}
.sb-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.sb-btn.active{background:rgba(255,255,255,.14);color:#fff}
.sb-btn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--gm);border-radius:0 3px 3px 0}
.sb-ico{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.sb-sep{height:1px;background:rgba(255,255,255,.08);margin:8px 6px}
.sb-footer{padding:10px 10px 14px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sb-version{font-size:10px;color:rgba(255,255,255,.25);padding:4px 10px}
.tb-title{font-size:15px;font-weight:700;color:var(--ink)}
.tb-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hamburger{display:none;padding:8px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:9px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap;letter-spacing:-.1px}
.btn-p{background:var(--g);color:#fff;box-shadow:0 1px 3px rgba(74,124,63,.3)}.btn-p:hover{background:var(--gd)}
.btn-s{background:var(--card);color:var(--g);border:1.5px solid var(--g)}.btn-s:hover{background:var(--gl)}
.btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border)}.btn-g:hover{background:var(--border2)}
.btn-d{background:var(--card);color:var(--red);border:1.5px solid #f5c0bc}.btn-d:hover{background:var(--rl)}
.btn-sm{padding:5px 11px;font-size:11.5px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border-radius:var(--rl2);padding:20px;box-shadow:var(--sh);border:1px solid var(--border);margin-bottom:16px;transition:border-color .2s}
.card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.card-hdr h3{font-size:13px;font-weight:700;color:var(--ink);flex:1;min-width:0}
.bdg{font-size:10px;font-weight:700;background:var(--gl);color:var(--gd);padding:2px 8px;border-radius:20px}
.bdg-blue{background:var(--bl);color:var(--blue)}
.bdg-amber{background:var(--al);color:var(--amber)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.attn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px}
.attn-card{border-radius:var(--rl2);padding:18px 20px;cursor:pointer;transition:all .2s;border:2px solid;position:relative;overflow:hidden}
.attn-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.attn-card.red{background:#fff5f5;border-color:#f5a5a5}
.attn-card.amber{background:#fffbf2;border-color:#f5d070}
.attn-card.blue{background:#f0f5ff;border-color:#a5bef5}
.ac-ico{font-size:24px;margin-bottom:8px;display:block}
.ac-num{font-size:32px;font-weight:700;line-height:1;margin-bottom:3px;letter-spacing:-1px}
.attn-card.red .ac-num{color:var(--red)}.attn-card.amber .ac-num{color:var(--amber)}.attn-card.blue .ac-num{color:var(--blue)}
.ac-lbl{font-size:11.5px;font-weight:600;color:var(--ink2)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:22px}
.mc{background:var(--card);border-radius:var(--rl2);padding:16px 18px;box-shadow:var(--sh);border:1px solid var(--border2);cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.mc:hover{box-shadow:var(--sh2);transform:translateY(-1px)}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--rl2) var(--rl2)}
.mc.green::after{background:var(--g)}.mc.blue::after{background:var(--blue)}.mc.amber::after{background:var(--amber)}.mc.red::after{background:var(--red)}
.mc-label{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px}
.mc-val{font-size:28px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-1px}
.mc-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.lb{width:100%;border-collapse:collapse;font-size:12.5px}
.lb th{padding:9px 11px;text-align:left;font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.lb th:hover{color:var(--g)}
.lb td{padding:10px 11px;border-bottom:1px solid var(--border2);vertical-align:middle}
.lb tr:last-child td{border-bottom:none}
.lb tr:hover td{background:var(--surface);cursor:pointer}
.lb-rank{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.lb-r1{background:#fef3c7;color:#92400e}.lb-r2{background:#f1f5f9;color:#475569}.lb-r3{background:#fef9c3;color:#854d0e}.lb-rn{background:var(--surface);color:var(--ink3)}
.lb-name{font-weight:600;color:var(--g);cursor:pointer}.lb-name:hover{text-decoration:underline}
.lb-expand{font-size:12px;color:var(--ink3);padding:8px 11px;text-align:center;cursor:pointer;border-top:1px dashed var(--border)}
.lb-expand:hover{color:var(--g);background:var(--surface)}
.chip{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:22px;border-radius:6px;font-size:11.5px;font-weight:700;padding:0 6px;letter-spacing:-.2px}
.chip-g{background:#d1fae5;color:#065f46}.chip-y{background:#fef9c3;color:#854d0e}.chip-r{background:#fee2e2;color:#991b1b}.chip-n{background:var(--surface);color:var(--ink3)}
.comp-group{margin-bottom:14px}
.comp-group-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.comp-group-name{font-size:12px;font-weight:700;color:var(--ink);flex:1}
.comp-group-pct{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.comp-bar-wrap{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:4px}
.comp-bar{height:100%;border-radius:4px;transition:width .4s}
.comp-steps{display:none;padding:8px 0 4px}
.comp-steps.open{display:block}
.comp-step{display:flex;align-items:center;gap:6px;font-size:11.5px;padding:2px 0}
.comp-step-bar{width:55px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.comp-step-fill{height:100%;border-radius:2px}
.comp-step-pct{font-size:10px;font-weight:600;min-width:28px;text-align:right}
.lib-controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:8px 13px;flex:1;min-width:180px;max-width:300px;transition:border-color .15s}
.search-wrap:focus-within{border-color:var(--g)}
.search-wrap input{border:none;background:none;outline:none;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);width:100%}.search-wrap input::placeholder{color:var(--ink4)}
.fsel{font-size:12.5px;padding:8px 11px;border:1.5px solid var(--border2);border-radius:10px;background:var(--card);color:var(--ink);outline:none;font-family:'Inter',sans-serif;cursor:pointer;transition:border-color .15s}
.fsel:focus{border-color:var(--g)}
.lib-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.lib-count{font-size:12px;color:var(--ink3);font-weight:500}
.toggle-excl{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);cursor:pointer;user-select:none}
.toggle-excl input{cursor:pointer;accent-color:var(--g)}
.bulk-bar{display:none;align-items:center;gap:10px;background:#fffbf2;border:1.5px solid #f5d070;border-radius:9px;padding:9px 14px;margin-bottom:10px;font-size:12.5px;font-weight:600;color:var(--amber)}
.bulk-bar.on{display:flex}
.crow{background:var(--card);border:1px solid var(--border);border-radius:var(--rl2);margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.crow:hover{border-color:var(--g2);box-shadow:0 2px 8px rgba(74,124,63,.07)}
.crow.open{border-color:var(--g);box-shadow:0 0 0 1px rgba(76,175,80,.1)}
.crow.excl{opacity:.55;border-style:dashed}
.crow-head{padding:11px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .15s;min-height:56px}
.crow-head:hover,.crow.open .crow-head{background:var(--gl)}
.crow.open .crow-head{border-bottom:1.5px solid var(--border)}
.cr-av{width:34px;height:34px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cr-info{flex:1;min-width:0}
.cr-title{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-sub{font-size:11px;color:var(--ink3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr-right{display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.op{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.op-b{background:#d1fae5;color:#065f46}.op-e{background:#dbeafe;color:#1e40af}.op-l{background:#fee2e2;color:#991b1b}.op-u{background:var(--surface);color:var(--ink3)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sd-pos{background:#16a34a}.sd-neu{background:#ca8a04}.sd-hes{background:#e67e22}.sd-neg{background:var(--red)}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--gl);color:var(--gd);cursor:pointer}
.tag-rm{cursor:pointer;opacity:.4;font-size:9px}.tag-rm:hover{opacity:1}
.tag-inp{font-size:12px;padding:2px 8px;border:1.5px solid var(--border);border-radius:20px;outline:none;width:90px;font-family:'Inter',sans-serif}
.tag-inp:focus{border-color:var(--g)}
.score-big{font-size:22px;font-weight:700;letter-spacing:-1px}
.chev{font-size:10px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.crow.open .chev{transform:rotate(180deg)}
.cr-body{display:none;padding:20px}
.crow.open .cr-body{display:block}
.ds{margin-bottom:18px}
.ds h4{font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:8px}
.score-box{background:var(--surface);border-radius:9px;padding:12px 14px;border:1px solid var(--border2)}
.score-box-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.score-box-val{font-size:22px;font-weight:700;line-height:1;letter-spacing:-1px}
.score-box-bar{height:3px;background:var(--border);border-radius:2px;margin:5px 0 4px;overflow:hidden}
.score-box-fill{height:100%;border-radius:2px}
.score-box-note{font-size:11px;color:var(--ink3);line-height:1.5}
.ck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:3px}
.ck-item{display:flex;align-items:center;gap:7px;font-size:12px;padding:3px 0;line-height:1.4}
.info-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-box{background:var(--surface);border-radius:9px;padding:13px;border:1px solid var(--border2)}
.info-box-title{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.info-list{list-style:none}
.info-list li{font-size:12px;padding:3px 0;display:flex;gap:7px;line-height:1.5}
.tr-bar{height:28px;border-radius:8px;overflow:hidden;display:flex;font-size:12px;font-weight:600}
.tr-rep{background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center}
.tr-cust{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center}
textarea.nt{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:'Inter',sans-serif;resize:vertical;min-height:64px;outline:none;transition:border-color .15s}
textarea.nt:focus{border-color:var(--g)}
.excl-banner{background:#fffbf2;border:1.5px solid #f5d070;border-radius:9px;padding:9px 13px;font-size:12px;color:var(--amber);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.txb{background:var(--surface);border-radius:9px;padding:14px;font-size:11px;font-family:'JetBrains Mono',monospace;line-height:2;max-height:300px;overflow-y:auto;white-space:pre-wrap;border:1px solid var(--border2)}
.tx-kw{background:rgba(92,158,255,.18);color:var(--blue);border-radius:3px;padding:1px 3px;cursor:pointer;transition:background .15s}
.tx-kw:hover{background:rgba(92,158,255,.35)}
.tx-kw.active{background:rgba(92,158,255,.45);outline:2px solid var(--blue)}
.tx-obj{background:rgba(255,183,77,.15);color:var(--amber);border-radius:3px;padding:1px 3px;cursor:pointer;transition:background .15s}
.tx-obj:hover{background:rgba(255,183,77,.3)}
.tx-obj.active{background:rgba(255,183,77,.4);outline:2px solid var(--amber)}
.tx-obj-abandoned{background:rgba(239,83,80,.2);color:#ef9a9a;border-radius:3px;padding:1px 3px;cursor:pointer;transition:background .15s}
.tx-obj-abandoned:hover{background:rgba(239,83,80,.35)}
.tx-obj-abandoned.active{background:rgba(239,83,80,.45);outline:2px solid var(--red)}
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.rep-card{background:var(--card);border-radius:var(--rl2);padding:18px;box-shadow:var(--sh);border:1.5px solid var(--border2);cursor:pointer;transition:all .2s}
.rep-card:hover{border-color:var(--g);box-shadow:var(--sh2);transform:translateY(-2px)}
.rep-card.active{border-color:var(--g);box-shadow:var(--sh2)}
.rep-av{width:44px;height:44px;border-radius:14px;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin-bottom:11px}
.rep-name{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px}
.rep-sub{font-size:11px;color:var(--ink3);margin-bottom:8px}
.rep-score{font-size:26px;font-weight:700;letter-spacing:-1px;line-height:1}
.rep-trend{font-size:11px;font-weight:700;margin-top:2px}
.rep-trend.up{color:#16a34a}.rep-trend.dn{color:var(--red)}.rep-trend.flat{color:var(--ink3)}
.rmgmt-table{width:100%;border-collapse:collapse;font-size:12.5px}
.rmgmt-table th{padding:9px 12px;text-align:left;font-size:9.5px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)}
.rmgmt-table td{padding:11px 12px;border-bottom:1px solid var(--border2)}
.rmgmt-table tr:last-child td{border-bottom:none}
.rmgmt-table tr:hover td{background:var(--surface)}
.loc-tag{font-size:10.5px;font-weight:700;background:var(--gl);color:var(--gd);padding:2px 8px;border-radius:6px}
.sv-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border2);font-size:12.5px;flex-wrap:wrap}
.sv-item:last-child{border-bottom:none}
.sv-url{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);background:var(--surface);padding:4px 9px;border-radius:7px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;border:1px solid var(--border2)}
.sv-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.sv-mgr{background:var(--gl);color:var(--gd)}.sv-loc{background:var(--bl);color:var(--blue)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--rl2);padding:36px;text-align:center;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag{border-color:var(--g);background:var(--gl)}
.dz-ico{font-size:36px;margin-bottom:10px;display:block}
.dz-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--ink3)}
.q-item{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--surface);border-radius:8px;margin-bottom:5px;font-size:12px;border:1px solid var(--border2)}
.q-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.q-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.q-size{color:var(--ink3);font-size:11px;flex-shrink:0}
.prog{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:10px 0 5px}
.prog-fill{height:100%;background:var(--g);border-radius:4px;transition:width .4s}
.prog-label{font-size:11.5px;color:var(--ink3)}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px;gap:2px}
.tab{padding:9px 17px;font-size:12.5px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--ink3);border-radius:8px 8px 0 0;transition:all .15s}
.tab:hover{color:var(--ink);background:var(--surface)}
.tab.active{border-bottom-color:var(--g);color:var(--g)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10.5px;font-weight:700;color:var(--ink3);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:10px;font-size:13.5px;font-family:'Inter',sans-serif;outline:none;color:var(--ink);transition:border-color .15s,box-shadow .15s;background:var(--bg3)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg textarea{min-height:140px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(4px)}
.modal-box{background:var(--card);border-radius:var(--rl3);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);border:1px solid var(--border2)}
.modal-box h2{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border2)}
.share-toggle{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px}
.share-toggle button{flex:1;padding:9px;font-size:12.5px;font-weight:600;border:none;background:var(--surface);color:var(--ink2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.share-toggle button.active{background:var(--g);color:#fff}
.msg-ok{background:#f0fdf4;border:1.5px solid #86efac;border-radius:9px;padding:10px 13px;color:#166534;font-size:12px;margin-top:8px}
.msg-err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:9px;padding:10px 13px;color:var(--red);font-size:12px;margin-top:8px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.spin-dark{border-color:rgba(0,0,0,.15);border-top-color:var(--g)}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty-ico{font-size:40px;opacity:.25;margin-bottom:12px;display:block}
.chart-wrap{position:relative;height:210px}
.corr-item{padding:10px 0;border-bottom:1px solid var(--border2);font-size:12px}
.corr-item:last-child{border-bottom:none}
.share-banner{background:var(--gd);color:#fff;padding:10px 22px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:10px;flex-shrink:0}
.status-bar{height:32px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0;font-size:11.5px;color:var(--ink3);transition:background .3s,border-color .3s}
.status-bar.warn{background:rgba(255,183,77,.08);border-bottom-color:rgba(255,183,77,.3)}
.status-bar.warn .sb-msg{color:var(--amber)}
.sb-msg{flex:1}
.loc-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(255,183,77,.15);color:var(--amber);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,183,77,.3);transition:background .15s}
.loc-pill:hover{background:rgba(255,183,77,.25)}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.mobile-overlay.on{display:block}
@media(max-width:800px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:-240px;top:0;height:100vh;z-index:200;transition:left .25s}
  .sidebar.mobile-open{left:0;box-shadow:var(--sh3)}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .info-2col{grid-template-columns:1fr}
  .scores-grid{grid-template-columns:1fr 1fr}
  .attn-grid{grid-template-columns:1fr 1fr}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  .page{padding:16px 14px 60px}
}
</style>
</head>

// ── STATUS BAR ──
function updateStatusBar(){
  const bar=g('status-bar'),msg=g('sb-msg');if(!bar||!msg)return;
  const job=window._lastJobStatus||{status:'idle'};
  const batchJob=window._lastBatchStatus||{status:'idle'};
  const jobRunning=job.status==='running';
  const batchRunning=batchJob.status==='running';
  const anyRunning=jobRunning||batchRunning;
  bar.classList.toggle('warn',anyRunning);

  // Build or remove the global progress bar
  let progBar=g('sb-prog-wrap');
  if(anyRunning){
    const active=jobRunning?job:batchJob;
    const pct=active.total?Math.round((active.processed||0)/active.total*100):0;
    const label=jobRunning
      ?`Re-analyzing: ${active.processed||0}/${active.total||'?'} calls (${pct}%) — ${active.errors||0} errors`
      :`Uploading: ${active.processed||0}/${active.total||'?'} files (${pct}%)`;
    if(!progBar){
      progBar=document.createElement('span');
      progBar.id='sb-prog-wrap';
      progBar.style.cssText='display:flex;align-items:center;gap:8px;flex:1;min-width:0';
      msg.parentNode.insertBefore(progBar,msg.nextSibling);
    }
    progBar.innerHTML=`<span style="font-size:11px;color:var(--amber);white-space:nowrap">${label}</span>
      <div style="flex:1;height:4px;background:rgba(255,183,77,.2);border-radius:4px;min-width:60px;max-width:220px">
        <div style="height:100%;width:${pct}%;background:var(--amber);border-radius:4px;transition:width .5s"></div>
      </div>`;
    msg.textContent='⚠ Do not delete calls until complete';
  } else {
    if(progBar)progBar.remove();
    // Show last job result briefly if just completed
    const justDone=job.status==='complete'&&job.summary;
    if(justDone&&job.summary.finished_at){
      const mins=Math.floor((new Date()-new Date(job.summary.finished_at))/60000);
      if(mins<10){
        const errs=job.summary.errors||0;
        msg.innerHTML=errs>0
          ?`✓ Re-analyze done: ${job.summary.succeeded} succeeded, <span style="color:var(--red)">${errs} failed</span> · <span style="cursor:pointer;text-decoration:underline" onclick="nav('management')">see details</span>`
          :`✓ Re-analyze done: ${job.summary.succeeded} calls · ${mins<1?'just now':mins+' min ago'}`;
        return;
      }
    }
    if(dataLoadedAt){
      const mins=Math.floor((new Date()-dataLoadedAt)/60000);
      msg.textContent=mins<1?'Data just loaded':`Data loaded ${mins} min ago`;
    }
  }
  updateLocIndicator();
}
function startStatusPoller(){
  if(statusPoller)clearInterval(statusPoller);
  let fastMode=false;
  async function poll(){
    try{
      const [rr,br]=await Promise.all([fetch(API+'/reanalyze/status'),fetch(API+'/batch_upload/status')]);
      const rd=await rr.json(),bd=await br.json();
      const wasRunning=(window._lastJobStatus?.status==='running')||(window._lastBatchStatus?.status==='running');
      window._lastJobStatus=rd;window._lastBatchStatus=bd;
      const nowRunning=rd.status==='running'||bd.status==='running';
      const nowDone=wasRunning&&!nowRunning;
      updateStatusBar();
      // Switch to fast polling (3s) when a job is running, slow (30s) when idle
      if(nowRunning&&!fastMode){fastMode=true;clearInterval(statusPoller);statusPoller=setInterval(poll,3000);}
      else if(!nowRunning&&fastMode){fastMode=false;clearInterval(statusPoller);statusPoller=setInterval(poll,30000);}
      if(nowDone){await loadCalls();({overview:renderOverview,library:renderLibrary,profiles:renderProfiles,management:renderManagement})[currentPage]?.();}
    }catch(e){}
  }
  statusPoller=setInterval(poll,30000);
  // Also update the "X mins ago" display every minute
  setInterval(updateStatusBar,60000);
}

function getFC(attn=''){
  const now=new Date(),cutoff=dateFilter>0?new Date(now-dateFilter*86400000):null;
  // Build rep→location map from reps table
  const repLocMap={};reps.forEach(r=>{if(r.location){if(r.full_name)repLocMap[r.full_name]=r.location;if(r.nickname)repLocMap[r.nickname]=r.location;}});
  return allCalls.filter(c=>{
    const dt=new Date(c.call_date||c.created_at);
    if(cutoff&&dt<cutoff)return false;
    if(locationFilter&&repLocMap[c.rep_name]!==locationFilter)return false;
    if(attn==='decline'&&!c.availability_decline)return false;
    if(attn==='onsite'&&!c.onsite_suggested)return false;
    if(attn==='turned_away'&&!c.turned_away)return false;
    if(attn==='quality'&&(!c.call_quality||c.call_quality==='normal'))return false;
    return true;
  });
}
function scc(src){return(src||getFC()).filter(c=>!c.exclude_from_scoring);}
function avg(arr,k){const v=(arr||[]).map(c=>c.scores?.[k]?.score||0).filter(v=>v>0);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):'—';}
function getScore(c,k){
  // information_control: use new key, fall back to average of old keys for pre-v12 calls
  if(k==='information_control'){
    const v=c.scores?.information_control?.score;
    if(v>0)return v;
    const old=((c.scores?.info_sequence?.score||0)+(c.scores?.call_control?.score||0))/2;
    return old||0;
  }
  return c.scores?.[k]?.score||c.score_overrides?.[k]||0;
}
function scCol(s){const n=parseFloat(s);if(isNaN(n))return'#6a8f6c';return n>=8?'#66bb6a':n>=5?'#ffb74d':'#ef5350';}
function chip(s){const n=parseFloat(s);if(isNaN(n)||s==='—')return'<span class="chip chip-n">—</span>';const c=n>=8?'chip-g':n>=5?'chip-y':'chip-r';return`<span class="chip ${c}">${typeof s==='number'?n.toFixed(1):s}</span>`;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtS(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}

function renderLB(){
  const sc=scc(getFC());

  const repNamesFiltered=repNames.filter(r=>sc.filter(c=>c.rep_name===r).length>=5);
  const data=repNamesFiltered.map(r=>{
    const rc=sc.filter(c=>c.rep_name===r);
    const a=k=>rc.length?(rc.reduce((s,c)=>s+(c.scores?.[k]?.score||0),0)/rc.length):0;
    // Fallback for old calls: average info_sequence + call_control if information_control missing
    const ic=rc.length?(rc.reduce((s,c)=>{
      const v=c.scores?.information_control?.score;
      if(v>0)return s+v;
      const old=((c.scores?.info_sequence?.score||0)+(c.scores?.call_control?.score||0))/2;
      return s+old;
    },0)/rc.length):0;
    return{rep_name:r,overall:a('overall'),rapport_tone:a('rapport_tone'),price_delivery:a('price_delivery'),salesmanship:a('salesmanship'),closing_attempt:a('closing_attempt'),information_control:ic,calls:rc.length};

function normObj(raw){
  if(!raw)return raw;
  const s=raw.toLowerCase().replace(/_/g,' ').replace(/-/g,' ').replace(/[.,!?]+$/,'').trim();
  if(s.includes('price')||s.includes('too high')||s.includes('expensive')||s.includes('cost')){
    if(s.includes('another quote')||s.includes('other quote')||s.includes('already have')||s.includes('have a quote'))return'Already have another quote';
    return'Price too high';
  }
  if(s.includes('think')||s.includes('consider')||s.includes('need time')||s.includes('not sure'))return'Need to think about it';
  if(s.includes('partner')||s.includes('spouse')||s.includes('check with')||s.includes('talk to')||s.includes('husband')||s.includes('wife'))return'Need to check with partner';
  if(s.includes('timing')||s.includes('not ready')||s.includes('wrong time')||s.includes('bad time'))return'Wrong timing';
  if(s.includes('another quote')||s.includes('other quote')||s.includes('already have')||s.includes('other company')||s.includes('other mover'))return'Already have another quote';
  return raw.trim();
}
function renderObj(sc){
  const cnt={};(sc||[]).forEach(c=>(c.objections_detected||[]).forEach(o=>{const n=normObj(o);cnt[n]=(cnt[n]||0)+1;}));
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);const el=g('obj-viz');if(!el)return;
  el.innerHTML=sorted.length?sorted.map(([o,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12.5px;cursor:pointer" onclick="libFilters.obj='${o}';libFilters.attn='';nav('library')" title="Filter calls with: ${o}"><span style="color:var(--ink2)">${o}</span><span style="font-size:11px;font-weight:700;background:rgba(239,83,80,.15);color:#ef9a9a;padding:2px 9px;border-radius:10px">${v}</span></div>`).join(''):'<div style="color:var(--ink4);font-size:13px">No objections recorded</div>';
}

function clearLibF(){libFilters={rep:'',out:'',score:'',search:'',sort:'newest',showExcl:false,attn:'',obj:'',kw:'',move_cat:'',confidence:''};renderLibrary();}
function renderCallList(){
  const q=libFilters.search.toLowerCase();
  const base=getFC();
  let list=base.filter(c=>{
    if(!libFilters.showExcl&&c.exclude_from_scoring)return false;
    if(libFilters.rep&&c.rep_name!==libFilters.rep)return false;
    if(libFilters.out&&c.call_outcome!==libFilters.out)return false;
    if(libFilters.score==='high'&&(c.scores?.overall?.score||0)<8)return false;
    if(libFilters.score==='mid'){const s=c.scores?.overall?.score||0;if(s<5||s>7)return false;}
    if(libFilters.score==='low'&&(c.scores?.overall?.score||0)>4)return false;
    if(libFilters.attn==='decline'&&!c.availability_decline)return false;
    if(libFilters.attn==='turned_away'&&!c.turned_away)return false;
    if(libFilters.obj&&!(c.objections_detected||[]).some(o=>normObj(o)===libFilters.obj))return false;
    if(libFilters.kw&&!(c.keywords_detected||[]).includes(libFilters.kw))return false;
    if(libFilters.move_cat&&c.move_category!==libFilters.move_cat)return false;
    if(libFilters.confidence==='low'&&(c.evaluation_confidence||10)>5)return false;
    if(libFilters.attn==='onsite'&&!c.onsite_suggested)return false;
    if(libFilters.attn==='turned_away'&&!c.turned_away)return false;
    if(libFilters.attn==='quality'&&(!c.call_quality||c.call_quality==='normal'))return false;
    if(q){const hay=[c.rep_name,c.caller_name,c.call_purpose,c.call_summary,c.transcript].join(' ').toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });
  if(libFilters.sort==='newest')list.sort((a,b)=>new Date(b.call_date||b.created_at)-new Date(a.call_date||a.created_at));
  else if(libFilters.sort==='oldest')list.sort((a,b)=>new Date(a.call_date||a.created_at)-new Date(b.call_date||b.created_at));
  else if(libFilters.sort==='score_high')list.sort((a,b)=>(b.scores?.overall?.score||0)-(a.scores?.overall?.score||0));
  else if(libFilters.sort==='score_low')list.sort((a,b)=>(a.scores?.overall?.score||0)-(b.scores?.overall?.score||0));

  }
  const cnt=g('lib-cnt');if(cnt)cnt.textContent=`${list.length} call${list.length!==1?'s':''}`;

  updateBB();
}

function buildTxHtml(c){
  if(!c.transcript)return'';
  const tx=c.transcript;
  const abandoned=new Set(c.objections_abandoned||[]);
  // Build a map of character position → {type, label, spanId}
  // type: 'kw' | 'obj' | 'obj-abandoned'
  const marks=[];
  (c.keywords_detected||[]).forEach((k,i)=>{
    const pos=c.keyword_positions?.[k];
    if(pos==null)return;
    // Find actual phrase in transcript near pos (case-insensitive)
    const search=k.toLowerCase();
    const start=tx.toLowerCase().indexOf(search,Math.max(0,pos-30));
    if(start<0)return;
    marks.push({start,end:start+k.length,cls:'tx-kw',id:`txs-${c.id}-kw-${i}`,label:k});
  });
  (c.objections_detected||[]).forEach((o,i)=>{
    const pos=c.objection_positions?.[o];
    if(pos==null)return;
    const search=o.toLowerCase();
    const start=tx.toLowerCase().indexOf(search,Math.max(0,pos-30));
    if(start<0)return;
    const cls=abandoned.has(o)?'tx-obj-abandoned':'tx-obj';
    marks.push({start,end:start+o.length,cls,id:`txs-${c.id}-obj-${i}`,label:o});
  });
  // Also auto-highlight abandoned objections even if no position — search full text
  abandoned.forEach((o,i)=>{
    const alreadyMarked=marks.some(m=>m.label===o);
    if(alreadyMarked)return;
    const search=o.toLowerCase();
    const start=tx.toLowerCase().indexOf(search);
    if(start<0)return;
    marks.push({start,end:start+o.length,cls:'tx-obj-abandoned',id:`txs-${c.id}-abn-${i}`,label:o});
  });
  if(!marks.length)return escHtml(tx);
  // Sort by start pos, remove overlaps
  marks.sort((a,b)=>a.start-b.start);
  const filtered=[];let cursor=0;
  marks.forEach(m=>{if(m.start>=cursor){filtered.push(m);cursor=m.end;}});
  // Build HTML
  let html='';let pos=0;
  filtered.forEach(m=>{
    if(m.start>pos)html+=escHtml(tx.slice(pos,m.start));
    html+=`<span class="${m.cls}" id="${m.id}" onclick="jumpTx(event,'${m.id}')">${escHtml(tx.slice(m.start,m.end))}</span>`;
    pos=m.end;
  });
  if(pos<tx.length)html+=escHtml(tx.slice(pos));
  return html;
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function jumpTx(evt,spanId){
  // Find which call this belongs to
  const span=document.getElementById(spanId);if(!span)return;

  // Open row if closed
  const row=txBox.closest('.crow');if(row&&!row.classList.contains('open'))row.classList.add('open');
  // Clear any previously active spans in this box
  txBox.querySelectorAll('.tx-kw.active,.tx-obj.active,.tx-obj-abandoned.active').forEach(el=>el.classList.remove('active'));
  span.classList.add('active');
  // Scroll
  setTimeout(()=>{
    span.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>span.classList.remove('active'),2500);
  },row&&!row.classList.contains('open')?200:50);
}

function renderProfiles(opts={}) {
  // Build store list from reps table
  const stores = [...new Set(reps.map(r=>r.location).filter(Boolean))].sort();
  // If global location filter is active, use it; otherwise use local store filter
  const storeFilter = locationFilter || opts.store || '';
  // Filter rep names by store if filter active
  let repNames = [...new Set(allCalls.map(c=>c.rep_name))].filter(Boolean).sort();
  if (storeFilter) {
    const storeReps = new Set(reps.filter(r=>r.location===storeFilter).flatMap(r=>[r.full_name,r.nickname].filter(Boolean)));
    repNames = repNames.filter(r => storeReps.has(r));
  }
  const cards=repNames.map(r=>{
    const rc=allCalls.filter(c=>c.rep_name===r&&!c.exclude_from_scoring);
    const overall=rc.length?(rc.reduce((a,c)=>a+(c.scores?.overall?.score||0),0)/rc.length).toFixed(1):'—';
    const rapport=rc.length?(rc.reduce((a,c)=>a+(c.scores?.rapport_tone?.score||0),0)/rc.length).toFixed(1):'—';
    const sorted=[...rc].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const r5=sorted.slice(0,5).map(c=>c.scores?.overall?.score||0),p5=sorted.slice(5,10).map(c=>c.scores?.overall?.score||0);
    const ra=r5.length?r5.reduce((a,b)=>a+b,0)/r5.length:0,pa=p5.length?p5.reduce((a,b)=>a+b,0)/p5.length:0;
    const trend=pa===0?'flat':ra>pa+0.3?'up':ra<pa-0.3?'dn':'flat';
    return`<div class="rep-card${opts.rep===r?' active':''}" onclick="openRepProfile('${esc(r)}')">
      <div class="rep-av">${ini(r)}</div>
      <div class="rep-name">${esc(r)}</div>
      <div class="rep-sub">${rc.length} scored call${rc.length!==1?'s':''}</div>
      ${(() => { const dbRep = reps.find(x=>x.full_name===r||x.nickname===r); return dbRep?.location ? `<div style="font-size:10.5px;color:var(--tx4);margin-bottom:4px">📍 ${esc(dbRep.location)}</div>` : ''; })()}
      <div class="rep-score" style="color:${scCol(parseFloat(overall))}">${overall}</div>
      <div style="font-size:11px;color:var(--ink3)">Rapport: ${rapport}/10</div>
      <div class="rep-trend ${trend}">${trend==='up'?'↑ Improving':trend==='dn'?'↓ Declining':'→ Stable'}</div>
    </div>`;
  }).join('');
  const storeOpts = stores.map(s=>`<option value="${s}"${storeFilter===s?' selected':''}>${s}</option>`).join('');
  set('page',`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      <div style="font-size:14px;font-weight:700;color:var(--tx)">Rep Profiles${locationFilter?` — ${esc(locationFilter)}`:''}</div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        ${(!locationFilter&&stores.length)?`<select class="fsel" onchange="renderProfiles({store:this.value})"><option value="">All locations</option>${storeOpts}</select>`:''}
        ${(!locationFilter&&storeFilter)?`<span class="bdg" style="cursor:pointer" onclick="renderProfiles({})">✕ ${storeFilter}</span>`:''}
      </div>
    </div>
    <div class="rep-grid">${cards||'<div class="empty"><span class="empty-ico">👤</span><p>No rep data yet.</p></div>'}</div>
    <div id="rep-detail"></div>`);
  if(opts.rep)openRepProfile(opts.rep);
}
function openRepProfile(repName){
  const rc=allCalls.filter(c=>c.rep_name===repName),sc=rc.filter(c=>!c.exclude_from_scoring);
  const sorted=[...rc].sort((a,b)=>new Date(b.call_date||b.created_at)-new Date(a.call_date||a.created_at));
  const teamSc=scc(getFC());
  document.querySelectorAll('.rep-card').forEach(el=>el.classList.toggle('active',el.querySelector('.rep-name')?.textContent===repName));
  const avgSc=SK.map(k=>({key:k,label:SL[SK.indexOf(k)],rep:sc.length?(sc.reduce((a,c)=>a+(c.scores?.[k]?.score||0),0)/sc.length).toFixed(1):'—',team:teamSc.length?(teamSc.reduce((a,c)=>a+(c.scores?.[k]?.score||0),0)/teamSc.length).toFixed(1):'—'}));
  const coachMap={};sc.forEach(c=>(c.coaching_points||[]).forEach(p=>{coachMap[p]=(coachMap[p]||0)+1;}));
  const topCoach=Object.entries(coachMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const strMap={};sc.forEach(c=>(c.strengths||[]).forEach(s=>{strMap[s]=(strMap[s]||0)+1;}));
  const topStr=Object.entries(strMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

      <div class="info-box"><div class="info-box-title">Recurring Coaching Points</div><ul class="info-list">${topCoach.map(([p,n])=>`<li><span>⚡</span>${esc(p)} <span style="color:var(--ink3);font-size:10px">(${n}×)</span></li>`).join('')||'<li style="color:var(--ink3)">Not enough data</li>'}</ul></div>

let expandedRep=null;

          <div style="display:flex;gap:6px">
            <select id="merge-${esc(r)}" class="fsel" style="flex:1;font-size:12px;padding:6px 8px"><option value="">— select rep —</option>${otherReps}</select>
            <button class="btn btn-d btn-xs" onclick="doInlineMerge('${esc(r)}')">Merge</button>

          <div style="font-size:10px;color:var(--ink3);margin-top:4px">Moves all ${cnt} calls to selected rep</div>
        </div>

    </td></tr>`:'';

      <td style="font-weight:600">${esc(r)}${isExpanded?' ▲':' ▾'}</td>
      <td>${dbRep?.location?`<span class="loc-tag">${esc(dbRep.location)}</span>`:'<span style="color:var(--amber);font-size:11px">⚠ unset</span>'}</td>
      <td>${cnt}</td><td>${chip(avgO)}</td>
      <td><span style="font-size:10px;font-weight:700;color:#16a34a;background:#d1fae5;padding:2px 8px;border-radius:10px">Active</span></td>
      <td onclick="event.stopPropagation()"><button class="btn btn-g btn-xs" onclick="libFilters.rep='${esc(r)}';nav('library')">View calls</button></td>
    </tr>${expandPanel}`;
  }).join('');
  const job=window._lastJobStatus||{status:'idle'};
  let reanalyzeHtml='';
  if(job.status==='running'){const pct=job.total?Math.round(job.processed/job.total*100):0;reanalyzeHtml=`<div style="background:var(--surface);border-radius:9px;padding:14px;margin-top:12px;border:1px solid var(--border2)"><div class="prog"><div class="prog-fill" id="reanalyze-prog" style="width:${pct}%"></div></div><div class="prog-label" id="reanalyze-status">Processing ${job.processed}/${job.total}: ${esc(job.current||'…')}</div></div>`;}
  else if(job.status==='complete')reanalyzeHtml=`<div class="msg-ok" style="margin-top:10px">✓ Done! ${job.processed} calls re-analyzed.</div>`;
  const unmatchedHtml=unmatched.length?`<div class="card" style="margin-bottom:16px">
    <div class="card-hdr"><h3>⚠ Unmatched Reps</h3><span class="bdg-amber bdg">${unmatched.length} names</span></div>
    <p style="font-size:12px;color:var(--ink3);margin-bottom:12px">These names appear in calls but have no roster record. They may be customers misidentified as reps, or reps not yet added.</p>
    ${unmatched.map(r=>{
      const cnt=allCalls.filter(c=>c.rep_name===r).length;
      const otherReps=repNames.filter(x=>x!==r).map(x=>`<option value="${esc(x)}">${esc(x)}</option>`).join('');
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);flex-wrap:wrap">
        <span style="font-weight:600;flex:1">${esc(r)}</span>
        <span style="font-size:11px;color:var(--ink3)">${cnt} call${cnt!==1?'s':''}</span>
        <button class="btn btn-p btn-xs" onclick="createRepFromName('${esc(r)}')">+ Add to roster</button>

        <button class="btn btn-g btn-xs" onclick="doUnmatchedMerge('${esc(r)}')">Merge</button>
      </div>`;
    }).join('')}
  </div>`:'';
  set('page',`
    ${unmatchedHtml}
    <div class="grid-2">
      <div class="card">
        <div class="card-hdr"><h3>Rep Roster</h3><button class="btn btn-p btn-sm" onclick="openAddRepModal()">+ Add Rep</button></div>
        <p style="font-size:11.5px;color:var(--ink3);margin-bottom:10px">Click a rep to expand editing options.</p>
        <table class="rmgmt-table"><thead><tr><th>Name</th><th>Location</th><th>Calls</th><th>Avg Score</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--ink3);padding:16px">No reps found</td></tr>'}</tbody></table>
      </div>
      <div>
        <div class="card">
          <div class="card-hdr"><h3>AI Deduplication</h3></div>
          <p style="font-size:12px;color:var(--ink3);margin-bottom:12px">Find rep names that may refer to the same person.</p>
          <button class="btn btn-s btn-sm" onclick="runDedup()" id="dedup-btn">🔍 Check for duplicates</button>
          <div id="dedup-results" style="margin-top:12px"></div>
        </div>
        <div class="card">
          <div class="card-hdr"><h3>Bulk Re-Analyze</h3></div>
          <p style="font-size:12px;color:var(--ink3);margin-bottom:12px">Re-run all transcripts through updated Claude prompt. Runs in background. ~$0.02/call.</p>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
            <button class="btn btn-s btn-sm" onclick="startReanalyze()" id="reanalyze-btn" ${job.status==='running'?'disabled':''}>${job.status==='running'?'<span class="spin spin-dark"></span> Running…':'⚡ Start bulk re-analyze'}</button>
            <button class="btn btn-g btn-sm" onclick="checkUnscored()">🔍 Check unscored calls</button>
          </div>
          ${job.status==='complete'&&job.summary?`<div style="background:var(--surface);border-radius:9px;padding:12px 14px;border:1px solid var(--border2);margin-bottom:10px">
            <div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Last job completed ${fmt(job.summary.finished_at)}</div>
            <div style="display:flex;gap:16px;flex-wrap:wrap">
              <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--g)">${job.summary.succeeded}</div><div style="font-size:11px;color:var(--ink3)">succeeded</div></div>
              <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--ink2)">${job.summary.skipped}</div><div style="font-size:11px;color:var(--ink3)">skipped<br>(no transcript)</div></div>
              <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--red)">${job.summary.errors}</div><div style="font-size:11px;color:var(--ink3)">errors</div></div>
              <div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--ink2)">${job.summary.total}</div><div style="font-size:11px;color:var(--ink3)">total</div></div>
            </div>
            ${job.failed_calls&&job.failed_calls.length?`<div style="margin-top:10px;border-top:1px solid var(--border2);padding-top:8px"><div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px">Failed calls:</div>${job.failed_calls.map(f=>`<div style="font-size:11px;color:var(--ink3);padding:2px 0">${esc(f.filename)} — ${esc(f.error)}</div>`).join('')}</div>`:''}
          </div>`:''}
          ${job.status==='running'?`<div style="background:var(--surface);border-radius:9px;padding:14px;margin-top:4px;border:1px solid var(--border2)"><div class="prog"><div class="prog-fill" id="reanalyze-prog" style="width:${job.total?Math.round(job.processed/job.total*100):0}%"></div></div><div class="prog-label" id="reanalyze-status">Processing ${job.processed}/${job.total}: ${esc(job.current||'…')}</div></div>`:''}

async function doInlineRename(repName){
  const el=g('ren-'+repName),msg=g('ren-msg-'+repName);
  const n=el?.value?.trim();if(!n){if(msg)msg.innerHTML='<span style="color:var(--red)">Enter a new name</span>';return;}
  try{
    const r=await fetch(API+'/reps/bulk_rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:repName,new_name:n})});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    allCalls.forEach(c=>{if(c.rep_name===repName)c.rep_name=n;});
    if(msg)msg.innerHTML=`<span style="color:var(--g)">✓ Renamed ${res.renamed} calls</span>`;
    expandedRep=n;setTimeout(()=>renderManagement(),1200);
  }catch(e){if(msg)msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`;}
}
async function doInlineLoc(repName,repId){
  const el=g('loc-'+repName),msg=g('loc-msg-'+repName);
  const loc=el?.value?.trim()||'';
  try{
    if(repId){
      await fetch(API+'/reps/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:repId,location:loc})});
      const idx=reps.findIndex(r=>r.id===repId);if(idx>=0)reps[idx].location=loc;
    } else {
      const r=await fetch(API+'/reps/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:repName,nickname:'',location:loc})});
      const saved=await r.json();if(!r.ok)throw new Error(saved.error||'Failed');
      await loadReps();
    }
    populateLocFilter();
    if(msg)msg.innerHTML=`<span style="color:var(--g)">✓ Saved</span>`;
    setTimeout(()=>renderManagement(),1000);
  }catch(e){if(msg)msg.innerHTML=`<span style="color:var(--red)">${e.message}</span>`;}
}
async function doInlineMerge(repName){
  const sel=g('merge-'+repName);
  const target=sel?.value;
  if(!target){alert('Select a rep to merge into');return;}
  const cnt=allCalls.filter(c=>c.rep_name===repName).length;
  if(!confirm(`Merge all ${cnt} calls from "${repName}" into "${target}"? This cannot be undone.`))return;
  try{
    await fetch(API+'/reps/bulk_rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:repName,new_name:target})});
    allCalls.forEach(c=>{if(c.rep_name===repName)c.rep_name=target;});
    expandedRep=null;renderManagement();
  }catch(e){alert(e.message);}
}
async function createRepFromName(repName){
  try{
    await fetch(API+'/reps/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:repName,nickname:'',location:''})});
    await loadReps();renderManagement();
  }catch(e){alert(e.message);}
}
async function doUnmatchedMerge(repName){
  const sel=g('um-merge-'+repName);
  const target=sel?.value;
  if(!target){alert('Select a rep to merge into');return;}
  const cnt=allCalls.filter(c=>c.rep_name===repName).length;

  try{
    await fetch(API+'/reps/bulk_rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old_name:repName,new_name:target})});
    allCalls.forEach(c=>{if(c.rep_name===repName)c.rep_name=target;});

}
function openAddRepModal(){g('new-rep-name').value='';g('new-rep-nick').value='';g('new-rep-loc').value='';g('add-rep-msg').innerHTML='';g('add-rep-modal').style.display='flex';}
async function doAddRep(){
  const name=g('new-rep-name').value.trim();if(!name){g('add-rep-msg').innerHTML='<div class="msg-err">Name required</div>';return;}
  try{await fetch(API+'/reps/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:name,nickname:g('new-rep-nick').value.trim(),location:g('new-rep-loc').value.trim()})});await loadReps();populateLocFilter();g('add-rep-msg').innerHTML='<div class="msg-ok">✓ Added</div>';setTimeout(()=>{g('add-rep-modal').style.display='none';renderManagement();},1000);}catch(e){g('add-rep-msg').innerHTML=`<div class="msg-err">${e.message}</div>`;}
}
async function runDedup(){
  const btn=g('dedup-btn'),res=g('dedup-results');btn.disabled=true;btn.innerHTML='<span class="spin spin-dark"></span> Analyzing…';
  try{const r=await fetch(API+'/reps/deduplicate',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});const data=await r.json();btn.disabled=false;btn.textContent='🔍 Check for duplicates';
    if(!data.suggestions?.length){res.innerHTML='<div class="msg-ok">✓ No duplicates found</div>';return;}
    res.innerHTML=data.suggestions.map((s,i)=>`<div style="background:var(--al);border:1.5px solid #f5d070;border-radius:9px;padding:12px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;margin-bottom:3px">${Math.round(s.confidence*100)}% confidence</div><div style="font-size:12px;margin-bottom:5px"><strong>${esc(s.canonical)}</strong> ← ${s.variants.map(v=>esc(v)).join(', ')}</div><div style="font-size:11px;color:var(--ink3);margin-bottom:8px">${esc(s.reason)}</div><div style="display:flex;gap:6px"><button class="btn btn-p btn-xs" onclick="acceptDedup('${esc(s.canonical)}',${JSON.stringify(s.variants)})">Accept & merge</button><button class="btn btn-g btn-xs" onclick="this.closest('[style]').remove()">Dismiss</button></div></div>`).join('');
  }catch(e){btn.disabled=false;btn.textContent='🔍 Check for duplicates';res.innerHTML=`<div class="msg-err">${e.message}</div>`;}

async function acceptDedup(canonical,variants){

function handleDrop(e){e.preventDefault();g('audio-drop').classList.remove('drag');handleFilesWithZip([...e.dataTransfer.files]);}
function handleSelect(files){handleFilesWithZip([...files]);}
async function handleFilesWithZip(files){
  const zipFiles=files.filter(f=>f.name.toLowerCase().endsWith('.zip')||f.type.includes('zip'));
  const audioOnly=files.filter(f=>f.type.startsWith('audio/')||f.name.match(/\.(mp3|m4a|wav|ogg|mp4|webm)$/i));
  if(zipFiles.length){
    const list=g('audio-queue-list'),queue=g('audio-queue');
    if(queue)queue.style.display='block';
    if(list)list.innerHTML=`<div class="q-item"><span class="q-ico"><span class="spin spin-dark"></span></span><span class="q-name">Extracting ZIP…</span></div>`;
    for(const zf of zipFiles){
      try{
        const zip=await JSZip.loadAsync(zf);
        const exts=new Set(['.mp3','.m4a','.wav','.ogg','.mp4','.webm','.mpeg','.mpga']);
        const entries=Object.values(zip.files).filter(f=>{if(f.dir)return false;const n=f.name.toLowerCase();if(n.startsWith('__')||n.startsWith('.'))return false;return exts.has(n.substring(n.lastIndexOf('.')));});
        for(const entry of entries){const blob=await entry.async('blob');audioOnly.push(new File([blob],entry.name.split('/').pop(),{type:'audio/mpeg'}));}
        if(list)list.innerHTML=`<div class="q-item" style="background:var(--gl)"><span class="q-ico">✅</span><span class="q-name">Extracted ${entries.length} files from ${zf.name}</span></div>`;
      }catch(err){if(list)list.innerHTML=`<div class="q-item" style="background:var(--rl)"><span class="q-ico">❌</span><span class="q-name">Failed: ${err.message}</span></div>`;return;}
    }
    setTimeout(()=>setAudioFiles(audioOnly),500);
  }else{setAudioFiles(audioOnly);}
}
function setAudioFiles(files){
  audioFiles=files;const btn=g('add-audio-btn');if(btn)btn.disabled=!files.length;
  if(!files.length)return;
  const queue=g('audio-queue'),list=g('audio-queue-list');
  if(queue)queue.style.display='block';
  if(list)list.innerHTML=files.map((f,i)=>`<div class="q-item" id="qi-${i}"><span class="q-ico" id="qis-${i}">⭕</span><span class="q-name">${esc(f.name)}</span><span class="q-size">${(f.size/1024/1024).toFixed(1)}MB</span></div>`).join('');
}
function setQS(i,s){const el=document.getElementById('qis-'+i);if(el)el.innerHTML={processing:'▶',done:'✅',skipped:'⚠️',error:'❌'}[s]||'⭕';}
async function submitAudio(){
  if(!audioFiles.length)return;
  const btn=g('add-audio-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Processing…';
  g('audio-progress').style.display='block';
  const skipped=[];let processed=0;const total=audioFiles.length;
  for(let i=0;i<total;i+=3){
    const batch=audioFiles.slice(i,i+3);
    await Promise.all(batch.map(async(af,bi)=>{
      const idx=i+bi;
      if(af.size>25*1024*1024){skipped.push(`${af.name} (too large)`);setQS(idx,'skipped');return;}
      setQS(idx,'processing');
      g('audio-prog-text').textContent=`Processing batch ${Math.floor(i/3)+1}/${Math.ceil(total/3)}: ${af.name}`;
      try{
        const dupR=await fetch(API+'/check_duplicate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:af.name})});
        const dupD=await dupR.json();
        if(dupD.duplicate){skipped.push(`${af.name} — already exists`);setQS(idx,'skipped');return;}
        const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=()=>rej(new Error('Read failed'));r.readAsDataURL(af);});
        const tr=await fetch(API+'/transcribe_and_analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({audio:b64,filename:af.name})});
        const trD=await tr.json();
        if(!tr.ok){skipped.push(`${af.name} (${trD.error||'failed'})`);setQS(idx,'error');return;}
        const repName=trD.rep_name_detected&&trD.rep_name_detected!=='Unknown'?trD.rep_name_detected:'Unknown';
        const sr=await fetch(API+'/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...trD,rep_name:repName,filename:af.name,check_duplicate:true})});
        const saved=await sr.json();
        if(!sr.ok||saved.duplicate){skipped.push(`${af.name} (${saved.duplicate?'duplicate':saved.error||'failed'})`);setQS(idx,saved.duplicate?'skipped':'error');return;}
        allCalls.unshift(Array.isArray(saved)?saved[0]:saved);setQS(idx,'done');processed++;
      }catch(e){skipped.push(`${af.name} (${e.message})`);setQS(idx,'error');}
    }));
    g('audio-prog-bar').style.width=Math.round(Math.min(i+3,total)/total*100)+'%';
  }
  g('audio-prog-bar').style.width='100%';g('audio-prog-text').textContent=`Done! ${processed} analyzed${skipped.length?`, ${skipped.length} skipped`:''}`;
  if(skipped.length){g('audio-skipped').style.display='block';g('audio-skipped-list').innerHTML=skipped.map(s=>`<div>• ${esc(s)}</div>`).join('');}
  if(processed>0)g('add-audio-msg').innerHTML=`<div class="msg-ok">✓ ${processed} call${processed!==1?'s':''} added!</div>`;
  btn.disabled=false;btn.textContent='Analyze & Save';audioFiles=[];
}
async function submitPaste(){
  const btn=g('paste-btn'),msg=g('paste-msg');
  const rep=g('paste-rep').value.trim(),tx=g('paste-tx').value.trim(),out=g('paste-out').value;
  if(!tx){msg.innerHTML='<div class="msg-err">Please provide a transcript</div>';return;}

// ── BULK ZIP UPLOAD ──
let bulkZipFile = null;
let bulkPoller = null;

function handleBulkDrop(e) {
  e.preventDefault();
  g('bulk-drop').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleBulkSelect(f);
}

function handleBulkSelect(f) {
  if (!f || (!f.name.endsWith('.zip') && f.type !== 'application/zip')) {
    g('bulk-msg').innerHTML = '<div class="msg-err">Please select a ZIP file</div>';
    return;
  }
  bulkZipFile = f;
  const info = g('bulk-file-info');
  info.style.display = 'block';
  info.innerHTML = `📦 <strong>${f.name}</strong> — ${(f.size/1024/1024).toFixed(1)}MB<br><span style="color:var(--tx3);font-size:12px">Estimated time: ~${Math.round(f.size/1024/1024/1.8)} min at 3 calls/batch</span>`;
  g('bulk-btn').disabled = false;
  g('bulk-msg').innerHTML = '';
}

async function startBulkUpload() {
  if (!bulkZipFile) return;
  const btn = g('bulk-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Uploading…';
  g('bulk-progress').style.display = 'block';
  g('bulk-prog-text').textContent = 'Sending ZIP to server…';
  try {
    // Read file as base64 and send as JSON
    const b64 = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.onerror = () => rej(new Error('Read failed'));
      reader.readAsDataURL(bulkZipFile);
    });
    const r = await fetch(API + '/batch_upload/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({zip: b64})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Upload failed');
    g('bulk-msg').innerHTML = '<div class="msg-ok">✓ Upload started! Processing in background — you can navigate away.</div>';
    btn.innerHTML = '<span class="spin"></span> Processing in background…';
    startBulkPoller();
  } catch(e) {
    g('bulk-msg').innerHTML = `<div class="msg-err">⚠ ${e.message}</div>`;
    btn.disabled = false;
    btn.innerHTML = 'Start Background Upload';
  }
}

function startBulkPoller() {
  if (bulkPoller) clearInterval(bulkPoller);
  bulkPoller = setInterval(async () => {
    try {
      const r = await fetch(API + '/batch_upload/status');
      const d = await r.json();
      const bar = g('bulk-prog-bar');
      const txt = g('bulk-prog-text');
      if (d.total > 0 && bar) bar.style.width = Math.round((d.processed + d.skipped + d.errors) / d.total * 100) + '%';
      if (txt) txt.textContent = d.status === 'running'
        ? `Processing ${d.processed + d.skipped + d.errors}/${d.total}: ${d.current || '…'} (${d.processed} saved, ${d.skipped} skipped, ${d.errors} errors)`
        : d.status === 'complete'
        ? `✓ Done! ${d.processed} calls added, ${d.skipped} skipped, ${d.errors} errors`
        : `Status: ${d.status}`;
      if (d.status === 'complete' || d.status === 'error') {
        clearInterval(bulkPoller); bulkPoller = null;
        const btn = g('bulk-btn');
        if (btn) { btn.disabled = false; btn.innerHTML = 'Start Background Upload'; }
        if (bar) bar.style.width = '100%';
        await loadCalls();
        if (currentPage === 'overview') renderOverview();
        else if (currentPage === 'library') renderCallList();
        if (d.error_list?.length) {
          const msg = g('bulk-msg');
          if (msg) msg.innerHTML += `<div style="margin-top:8px;font-size:11.5px;color:var(--tx3)">${d.error_list.slice(0,10).map(e=>`<div>• ${e}</div>`).join('')}${d.error_list.length>10?`<div>…and ${d.error_list.length-10} more</div>`:''}</div>`;
        }
      }
    } catch(e) {}
  }, 3000);
}

// Check bulk status on page load
async function checkBulkStatus() {
  try {
    const r = await fetch(API + '/batch_upload/status');
    const d = await r.json();
    if (d.status === 'running') {
      g('bulk-progress').style.display = 'block';
      startBulkPoller();
    }
  } catch(e) {}
}


// ── COST CALCULATOR ──
function renderCostCalc(fc) {
  const el = g('cost-calculator'); if (!el) return;
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthCalls = (fc || allCalls).filter(c => new Date(c.created_at) >= monthStart);
  const allTimeCalls = allCalls;

  // Cost estimates
  const DEEPGRAM_PER_MIN = 0.0043;
  const CLAUDE_PER_CALL = 0.023;
  const RENDER_MONTHLY = 25.00; // Starter=$7, Standard=$25

  function calcCosts(calls) {
    const deepgramMins = calls.reduce((a,c) => a + ((c.word_count||0) / 150), 0);
    const deepgramCost = deepgramMins * DEEPGRAM_PER_MIN;
    const claudeCost = calls.length * CLAUDE_PER_CALL;
    return { deepgram: deepgramCost, claude: claudeCost, total: deepgramCost + claudeCost, calls: calls.length, mins: deepgramMins };
  }

  const month = calcCosts(monthCalls);
  const allTime = calcCosts(allTimeCalls);
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const dayOfMonth = now.getDate();
  const projected = month.total / dayOfMonth * daysInMonth;
  const perCall = allTimeCalls.length ? allTime.total / allTimeCalls.length : 0;

  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
    <div style="background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">This Month</div>
      <div style="font-size:24px;font-weight:800;color:var(--tx)">$${(month.total + RENDER_MONTHLY/daysInMonth*dayOfMonth).toFixed(2)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">${month.calls} calls · ${Math.round(month.mins)} min audio</div>
    </div>
    <div style="background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Projected Monthly</div>
      <div style="font-size:24px;font-weight:800;color:var(--tx)">$${(projected + RENDER_MONTHLY).toFixed(2)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">incl. $${RENDER_MONTHLY} Render</div>
    </div>
    <div style="background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Per Call</div>
      <div style="font-size:24px;font-weight:800;color:var(--tx)">$${perCall.toFixed(3)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">avg all time</div>
    </div>
    <div style="background:var(--bg2);border-radius:10px;padding:14px;border:1px solid var(--border)">
      <div style="font-size:9px;font-weight:700;color:var(--tx4);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">All Time</div>
      <div style="font-size:24px;font-weight:800;color:var(--tx)">$${allTime.total.toFixed(2)}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:4px">${allTimeCalls.length} calls analyzed</div>
    </div>
  </div>
  <div style="display:flex;gap:16px;margin-top:10px;font-size:11.5px;color:var(--tx3)">
    <span>Deepgram: $${month.deepgram.toFixed(3)}/mo est.</span>
    <span>Claude: $${month.claude.toFixed(2)}/mo est.</span>
    <span>Render: $${RENDER_MONTHLY}/mo flat</span>
  </div>`;
}

function renderCosts(){
  const now=new Date();
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  const fc=getFC();
  const monthCalls=fc.filter(c=>new Date(c.created_at)>=monthStart);
  const allTimeCalls=locationFilter?fc:allCalls;
  const DEEPGRAM_PER_MIN=0.0043,CLAUDE_PER_CALL=0.023,RENDER_MONTHLY=25.00;
  function calcCosts(calls){
    const mins=calls.reduce((a,c)=>a+((c.word_count||0)/150),0);
    const deepgram=mins*DEEPGRAM_PER_MIN,claude=calls.length*CLAUDE_PER_CALL;
    return{deepgram,claude,total:deepgram+claude,calls:calls.length,mins};
  }
  const month=calcCosts(monthCalls),allTime=calcCosts(allTimeCalls);
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const dayOfMonth=now.getDate();
  const projected=dayOfMonth>0?(month.total/dayOfMonth*daysInMonth):0;
  const perCall=allTimeCalls.length?allTime.total/allTimeCalls.length:0;
  // Per-rep costs this month
  const repCosts={};monthCalls.forEach(c=>{
    const r=c.rep_name||'Unknown';
    if(!repCosts[r])repCosts[r]={calls:0,mins:0};
    repCosts[r].calls++;repCosts[r].mins+=(c.word_count||0)/150;
  });
  const repRows=Object.entries(repCosts).sort((a,b)=>b[1].calls-a[1].calls).map(([r,d])=>{
    const cost=d.mins*DEEPGRAM_PER_MIN+d.calls*CLAUDE_PER_CALL;
    return`<tr><td style="font-weight:600">${esc(r)}</td><td>${d.calls}</td><td>${Math.round(d.mins)} min</td><td>$${cost.toFixed(2)}</td></tr>`;
  }).join('');
  set('page',`
    <div class="metric-grid" style="margin-bottom:20px">
      <div class="mc blue"><div class="mc-label">This Month</div><div class="mc-val">$${(month.total+RENDER_MONTHLY/daysInMonth*dayOfMonth).toFixed(2)}</div><div class="mc-sub">${month.calls} calls · ${Math.round(month.mins)} min audio</div></div>
      <div class="mc blue"><div class="mc-label">Projected Monthly</div><div class="mc-val">$${(projected+RENDER_MONTHLY).toFixed(2)}</div><div class="mc-sub">incl. $${RENDER_MONTHLY} Render</div></div>
      <div class="mc amber"><div class="mc-label">Per Call Avg</div><div class="mc-val">$${perCall.toFixed(3)}</div><div class="mc-sub">all time average</div></div>
      <div class="mc green"><div class="mc-label">All Time</div><div class="mc-val">$${allTime.total.toFixed(2)}</div><div class="mc-sub">${allTimeCalls.length} calls analyzed</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-hdr"><h3>This Month Breakdown</h3></div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${[['Deepgram (transcription)','$'+month.deepgram.toFixed(3),'$0.0043/min'],['Claude (analysis)','$'+month.claude.toFixed(2),'$0.023/call'],['Render (hosting)','$'+(RENDER_MONTHLY/daysInMonth*dayOfMonth).toFixed(2),'$25/mo flat'],['Total','$'+(month.total+RENDER_MONTHLY/daysInMonth*dayOfMonth).toFixed(2),'']].map(([label,val,note])=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:9px;border:1px solid var(--border)">
            <div><div style="font-size:12.5px;font-weight:600">${label}</div>${note?`<div style="font-size:11px;color:var(--ink3)">${note}</div>`:''}</div>
            <div style="font-size:18px;font-weight:700;color:var(--g)">${val}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><h3>Cost by Rep — This Month</h3></div>
        ${repRows?`<table style="width:100%;border-collapse:collapse;font-size:12.5px">
          <thead><tr>
            <th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border)">Rep</th>
            <th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border)">Calls</th>
            <th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border)">Audio</th>
            <th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;border-bottom:1px solid var(--border)">Cost</th>
          </tr></thead>
          <tbody>${repRows}</tbody>
        </table>`:'<div class="empty"><p>No calls this month</p></div>'}
      </div>
    </div>`);
}

// ── REP COMPARISON PAGE ──
let compareRepA='',compareRepB='';
function renderCompare(opts={}){
  if(opts.repA)compareRepA=opts.repA;
  if(opts.repB)compareRepB=opts.repB;
  const repNames=[...new Set(allCalls.filter(c=>!c.exclude_from_scoring).map(c=>c.rep_name))].filter(Boolean).sort();
  const repOpts=r=>repNames.map(n=>`<option value="${esc(n)}"${n===r?' selected':''}>${esc(n)}</option>`).join('');
  const teamSc=scc(getFC());
  function repStats(name){
    if(!name)return null;
    const sc=allCalls.filter(c=>c.rep_name===name&&!c.exclude_from_scoring);
    if(!sc.length)return null;
    const avgK=k=>sc.length?(sc.reduce((a,c)=>a+(c.scores?.[k]?.score||0),0)/sc.length):0;
    const ckPcts=CK.map(k=>sc.length?Math.round(sc.filter(c=>c.checklist?.[k]).length/sc.length*100):0);
    const booked=sc.filter(c=>c.call_outcome==='booked').length;
    const br=Math.round(booked/sc.length*100);
    const coachMap={};sc.forEach(c=>(c.coaching_points||[]).forEach(p=>{coachMap[p]=(coachMap[p]||0)+1;}));
    const topCoach=Object.entries(coachMap).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([p])=>p);
    const sorted=[...sc].sort((a,b)=>new Date(a.call_date||a.created_at)-new Date(b.call_date||b.created_at));
    return{sc,scores:SK.map(k=>({k,avg:avgK(k)})),ckPcts,br,topCoach,sorted};
  }
  const A=repStats(compareRepA),B=repStats(compareRepB);
  const teamAvgK=k=>teamSc.length?(teamSc.reduce((a,c)=>a+(c.scores?.[k]?.score||0),0)/teamSc.length):0;
  function scoreGrid(){
    if(!A&&!B)return'';
    return`<div class="card" style="margin-bottom:16px">
      <div class="card-hdr"><h3>Score Comparison</h3><span class="bdg">vs team avg</span></div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr>
          <th style="padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">Category</th>
          ${A?`<th style="padding:9px 12px;text-align:center;font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">${esc(compareRepA)}</th>`:''}
          ${B?`<th style="padding:9px 12px;text-align:center;font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">${esc(compareRepB)}</th>`:''}
          <th style="padding:9px 12px;text-align:center;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">Team Avg</th>
        </tr></thead>
        <tbody>${SK.map((k,i)=>{
          const ta=teamAvgK(k);
          const av=A?A.scores[i].avg:null;
          const bv=B?B.scores[i].avg:null;
          const winner=av!==null&&bv!==null?(av>bv?'A':bv>av?'B':'tie'):null;
          return`<tr>
            <td style="padding:10px 12px;border-bottom:1px solid var(--border2);font-size:12px;font-weight:600">${SL[i]}</td>
            ${A?`<td style="padding:10px 12px;border-bottom:1px solid var(--border2);text-align:center">${chip(av.toFixed(1))}${winner==='A'?'<span style="color:#16a34a;font-size:10px;margin-left:4px">▲</span>':''}</td>`:''}
            ${B?`<td style="padding:10px 12px;border-bottom:1px solid var(--border2);text-align:center">${chip(bv.toFixed(1))}${winner==='B'?'<span style="color:#16a34a;font-size:10px;margin-left:4px">▲</span>':''}</td>`:''}
            <td style="padding:10px 12px;border-bottom:1px solid var(--border2);text-align:center;color:var(--ink3);font-size:12px">${ta.toFixed(1)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }
  function complianceGrid(){
    if(!A&&!B)return'';
    return`<div class="card" style="margin-bottom:16px">
      <div class="card-hdr"><h3>22-Step Compliance</h3></div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11.5px">
        <thead><tr>
          <th style="padding:7px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">Step</th>
          ${A?`<th style="padding:7px 10px;text-align:center;font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">${esc(compareRepA)}</th>`:''}
          ${B?`<th style="padding:7px 10px;text-align:center;font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border)">${esc(compareRepB)}</th>`:''}
        </tr></thead>
        <tbody>${CK.map((k,i)=>{
          const ap=A?A.ckPcts[i]:null;
          const bp=B?B.ckPcts[i]:null;
          const mkBar=p=>{const col=p>=80?'#16a34a':p>=50?'#d97706':'#dc2626';return`<div style="display:flex;align-items:center;gap:6px;justify-content:center"><div style="width:60px;height:5px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${p}%;height:100%;background:${col};border-radius:3px"></div></div><span style="font-size:10.5px;font-weight:700;color:${col};min-width:28px">${p}%</span></div>`;};
          return`<tr>
            <td style="padding:7px 10px;border-bottom:1px solid var(--border2);color:var(--ink2)">${CKFULL[i]}</td>
            ${A?`<td style="padding:7px 10px;border-bottom:1px solid var(--border2)">${mkBar(ap)}</td>`:''}
            ${B?`<td style="padding:7px 10px;border-bottom:1px solid var(--border2)">${mkBar(bp)}</td>`:''}
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }
  function coachGrid(){
    if(!A&&!B)return'';
    return`<div class="grid-2" style="margin-bottom:16px">
      ${A?`<div class="card"><div class="card-hdr"><h3 style="color:var(--blue)">${esc(compareRepA)} — Coaching Focus</h3></div><ul class="info-list">${A.topCoach.map(p=>`<li><span>⚡</span>${esc(p)}</li>`).join('')||'<li style="color:var(--ink3)">Not enough data</li>'}</ul></div>`:''}
      ${B?`<div class="card"><div class="card-hdr"><h3 style="color:var(--amber)">${esc(compareRepB)} — Coaching Focus</h3></div><ul class="info-list">${B.topCoach.map(p=>`<li><span>⚡</span>${esc(p)}</li>`).join('')||'<li style="color:var(--ink3)">Not enough data</li>'}</ul></div>`:''}
    </div>`;
  }
  set('page',`
    <div class="card" style="margin-bottom:16px">
      <div class="card-hdr"><h3>Select Reps to Compare</h3></div>
      <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:180px">
          <div style="font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Rep A</div>
          <select class="fsel" style="width:100%" onchange="compareRepA=this.value;renderCompare()"><option value="">— select rep —</option>${repOpts(compareRepA)}</select>
        </div>
        <div style="font-size:20px;color:var(--ink3);padding-bottom:8px">⚖️</div>
        <div style="flex:1;min-width:180px">
          <div style="font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px">Rep B</div>
          <select class="fsel" style="width:100%" onchange="compareRepB=this.value;renderCompare()"><option value="">— select rep —</option>${repOpts(compareRepB)}</select>
        </div>
        ${A&&B?`<div style="display:flex;gap:16px;padding-bottom:8px;flex-shrink:0">
          <div style="text-align:center"><div style="font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${esc(compareRepA)}</div><div style="font-size:22px;font-weight:800;color:${scCol(A.scores[8].avg)}">${A.scores[8].avg.toFixed(1)}</div><div style="font-size:11px;color:var(--ink3)">${A.sc.length} calls</div></div>
          <div style="text-align:center"><div style="font-size:9px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">${esc(compareRepB)}</div><div style="font-size:22px;font-weight:800;color:${scCol(B.scores[8].avg)}">${B.scores[8].avg.toFixed(1)}</div><div style="font-size:11px;color:var(--ink3)">${B.sc.length} calls</div></div>
        </div>`:''}
      </div>
    </div>
    ${(!compareRepA&&!compareRepB)?`<div class="empty"><span class="empty-ico">⚖️</span><p>Select two reps above to compare their performance side by side.</p></div>`:''}
    ${scoreGrid()}
    ${complianceGrid()}
    ${coachGrid()}`);
}

function exportCSV(){window.open(API+'/export/csv','_blank');}
function exportPDFCall(id){window.open(API+`/export/pdf/call/${id}`,'_blank');}
function exportPDFRep(name){window.open(API+`/export/pdf/rep/${encodeURIComponent(name)}`,'_blank');}

init();
</script>
