<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGMS — Call Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --g:  #4a7c3f;
  --gd: #2d5226;
  --gm: #6aa35e;
  --gl: #eef6ec;
  --g2: #d4edcf;
  --blue: #3b6fd4;
  --bl:  #e8effe;
  --amber: #c97a10;
  --al: #fef3df;
  --red: #c93030;
  --rl: #fdeaea;
  --ink: #1a1c1a;
  --ink2: #4a4e4a;
  --ink3: #8a918a;
  --border: #e2e8e1;
  --surface: #f6f9f5;
  --white: #fff;
  --card: #fff;
  --sidebar-w: 220px;
  --hdr: 56px;
  --r: 10px;
  --rl2: 14px;
  --sh: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1px rgba(0,0,0,.04);
  --sh2: 0 4px 20px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--surface)}
a{color:var(--g);text-decoration:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer}

/* ── LAYOUT ── */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--gd);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sidebar.collapsed{width:56px}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--hdr);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;box-shadow:0 1px 0 var(--border)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── SIDEBAR ── */
.sb-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo img{height:32px;flex-shrink:0}
.sb-logo-text{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px;white-space:nowrap;overflow:hidden}
.sb-logo-text span{color:var(--gm)}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:rgba(255,255,255,.15);color:#fff}
.sb-item .ico{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.sb-item .lbl{overflow:hidden;text-overflow:ellipsis}
.sb-sep{height:1px;background:rgba(255,255,255,.08);margin:8px 4px}
.sb-bottom{padding:10px 8px 14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-version{font-size:10px;color:rgba(255,255,255,.3);padding:6px 10px}
.sb-toggle{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer;background:none;border:none;width:100%}
.sb-toggle:hover{color:rgba(255,255,255,.7)}

/* ── TOPBAR ── */
.topbar-title{font-size:15px;font-weight:600;color:var(--ink)}
.topbar-sub{font-size:12px;color:var(--ink3);margin-left:2px}
.topbar-r{margin-left:auto;display:flex;gap:8px;align-items:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-p{background:var(--g);color:#fff}.btn-p:hover{background:var(--gd)}
.btn-s{background:var(--white);color:var(--g);border:1.5px solid var(--g)}.btn-s:hover{background:var(--gl)}
.btn-g{background:var(--surface);color:var(--ink2);border:1px solid var(--border)}.btn-g:hover{background:var(--border)}
.btn-d{background:var(--white);color:var(--red);border:1.5px solid #f5b8b8}.btn-d:hover{background:var(--rl)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── NEEDS ATTENTION ── */
.attn-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.attn-card{border-radius:var(--rl2);padding:16px 18px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid}
.attn-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.attn-card.red{background:#fff5f5;border-color:#f5a5a5}
.attn-card.amber{background:#fffbf0;border-color:#f5d488}
.attn-card.blue{background:#f0f5ff;border-color:#a5bef5}
.attn-card .ac-icon{font-size:22px;margin-bottom:6px}
.attn-card .ac-n{font-size:28px;font-weight:700;line-height:1;margin-bottom:3px}
.attn-card.red .ac-n{color:var(--red)}
.attn-card.amber .ac-n{color:var(--amber)}
.attn-card.blue .ac-n{color:var(--blue)}
.attn-card .ac-l{font-size:12px;font-weight:500;color:var(--ink2)}

/* ── METRIC CARDS ── */
.mrow{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:22px}
.mc{background:var(--card);border-radius:var(--rl2);padding:16px;box-shadow:var(--sh);border-top:3px solid var(--g);cursor:pointer;transition:box-shadow .15s}
.mc:hover{box-shadow:var(--sh2)}
.mc.bl{border-top-color:var(--blue)}
.mc.am{border-top-color:var(--amber)}
.mc.rd{border-top-color:var(--red)}
.mc-l{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.mc-v{font-size:26px;font-weight:700;color:var(--ink);line-height:1;font-variant-numeric:tabular-nums}
.mc-s{font-size:11px;color:var(--ink3);margin-top:3px}

/* ── SECTION CARDS ── */
.card{background:var(--card);border-radius:var(--rl2);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.card-hdr h3{font-size:13px;font-weight:600;color:var(--ink);flex:1}
.bdg{font-size:10px;font-weight:600;background:var(--gl);color:var(--gd);padding:2px 8px;border-radius:20px}
.bdg-b{background:var(--bl);color:var(--blue)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}

/* ── LEADERBOARD ── */
.lb{width:100%;border-collapse:collapse;font-size:12px}
.lb th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.lb th:hover{color:var(--g)}
.lb td{padding:9px 10px;border-bottom:1px solid var(--border)}
.lb tr:last-child td{border-bottom:none}
.lb tr:hover td{background:var(--gl);cursor:pointer}
.rav{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.r1{background:#fef3c7;color:#92400e}.r2{background:#f1f5f9;color:#374151}.r3{background:#fef9c3;color:#854d0e}.rn{background:var(--surface);color:var(--ink3)}
.score-chip{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:22px;border-radius:6px;font-size:11px;font-weight:700;padding:0 6px}
.sc-g{background:#d1fae5;color:#065f46}
.sc-y{background:#fef9c3;color:#854d0e}
.sc-r{background:#fee2e2;color:#991b1b}
.sc-n{background:var(--surface);color:var(--ink3)}

/* ── HEATMAP ── */
.hm-wrap{overflow-x:auto}
.hm{border-collapse:collapse;font-size:10px;min-width:700px;width:100%}
.hm th{padding:4px 6px;text-align:left;font-weight:600;color:var(--ink3);font-size:9px;white-space:nowrap}
.hm td{padding:4px 5px;text-align:center;border:1px solid var(--border);font-size:10px;font-weight:600;cursor:pointer}
.hm td:hover{opacity:.8}
.hm td.rn{text-align:left;font-weight:600;padding-left:10px;white-space:nowrap;font-size:12px;border:none;background:none;cursor:default}
.hm td.rn:hover{opacity:1}
.hmg{background:#bbf7d0;color:#065f46}
.hmy{background:#fef9c3;color:#854d0e}
.hmr{background:#fee2e2;color:#991b1b}
.hmx{background:var(--surface);color:var(--ink3)}

/* ── TALK RATIO ── */
.trbar{height:28px;border-radius:8px;overflow:hidden;display:flex;font-size:12px;font-weight:600}
.tr-r{background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center}
.tr-c{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center}

/* ── KW / OBJ ── */
.kw-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.kw-item:last-child{border-bottom:none}
.kw-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.kw-bar{height:100%;background:var(--g);border-radius:3px}
.kw-count{font-size:12px;font-weight:700;color:var(--g);min-width:20px;text-align:right}
.obj-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.obj-item:last-child{border-bottom:none}
.obj-count{font-size:11px;font-weight:600;background:var(--red);color:#fff;padding:1px 7px;border-radius:10px}

/* ── CALL LIBRARY ── */
.lib-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:6px 11px;flex:1;min-width:160px;max-width:280px}
.search-box input{border:none;background:none;outline:none;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);width:100%}
.search-box .ico{color:var(--ink3);font-size:14px}
.filter-pill{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--white);color:var(--ink2);cursor:pointer}
.filter-pill.active{border-color:var(--g);background:var(--gl);color:var(--gd)}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-sel{font-size:12px;padding:5px 9px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--ink);outline:none;font-family:'DM Sans',sans-serif;cursor:pointer}
.filter-sel:focus{border-color:var(--g)}
.bulk-bar{display:none;align-items:center;gap:10px;background:#fef9c3;border:1.5px solid #f5d488;border-radius:8px;padding:8px 14px;margin-bottom:10px;font-size:13px;font-weight:500;color:#854d0e}
.bulk-bar.on{display:flex}

/* ── CALL ROW ── */
.call-row{background:var(--white);border:1.5px solid var(--border);border-radius:var(--rl2);margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.call-row:hover{border-color:var(--g2)}
.call-row.open{border-color:var(--g)}
.call-row.excl{opacity:.6;border-style:dashed}
.cr-head{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.cr-head:hover,.call-row.open .cr-head{background:var(--gl)}
.call-row.open .cr-head{border-bottom:1.5px solid var(--border)}
.cr-av{width:34px;height:34px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.cr-av.excl{background:var(--ink3)}
.cr-av.blue{background:var(--blue)}
.cr-av.amber{background:var(--amber)}
.cr-meta{flex:1;min-width:0}
.cr-name{font-size:13px;font-weight:600;color:var(--ink)}
.cr-sub{font-size:11px;color:var(--ink3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cr-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0}
.outcome-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.op-b{background:#d1fae5;color:#065f46}
.op-e{background:#dbeafe;color:#1e40af}
.op-l{background:#fee2e2;color:#991b1b}
.op-u{background:var(--surface);color:var(--ink3)}
.quality-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fee2e2;color:#991b1b}
.cont-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--bl);color:var(--blue)}
.sent-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sd-pos{background:#16a34a}.sd-neu{background:#ca8a04}.sd-hes{background:#d97706}.sd-neg{background:#dc2626}
.chev{font-size:11px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.call-row.open .chev{transform:rotate(180deg)}
.cr-body{display:none;padding:20px}
.call-row.open .cr-body{display:block}

/* ── SCORECARD DETAIL ── */
.detail-section{margin-bottom:18px}
.detail-section h4{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.score-box{background:var(--surface);border-radius:8px;padding:11px 13px}
.score-box-lbl{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.score-box-val{font-size:20px;font-weight:700;line-height:1}
.score-box-bar{height:3px;background:var(--border);border-radius:2px;margin:4px 0 3px;overflow:hidden}
.score-box-fill{height:100%;border-radius:2px}
.score-box-note{font-size:11px;color:var(--ink3);line-height:1.4}
.ck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px}
.ck-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0}
.two-col-info{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-box{background:var(--surface);border-radius:8px;padding:12px}
.info-box-title{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.info-list{list-style:none}
.info-list li{font-size:12px;padding:2px 0;display:flex;gap:6px;line-height:1.5}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--gl);color:var(--gd)}
.tag-rm{cursor:pointer;font-size:9px;opacity:.5}.tag-rm:hover{opacity:1}
.tag-inp{font-size:12px;padding:2px 8px;border:1.5px solid var(--border);border-radius:20px;outline:none;width:100px;font-family:'DM Sans',sans-serif}
.tag-inp:focus{border-color:var(--g)}
textarea.nt{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:64px;outline:none}
textarea.nt:focus{border-color:var(--g)}
.ovr-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ovr-row select,.ovr-row input[type=number]{padding:5px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.ovr-row select:focus,.ovr-row input:focus{border-color:var(--g)}
.txb{background:var(--surface);border-radius:8px;padding:12px;font-size:11px;font-family:'DM Mono',monospace;line-height:1.9;max-height:280px;overflow-y:auto;white-space:pre-wrap}
.kw-link{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-decoration-color:var(--g)}
.excl-banner{background:#fef9c3;border:1.5px solid #f5d488;border-radius:8px;padding:9px 13px;font-size:12px;color:#854d0e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.continuation-timeline{display:flex;align-items:center;gap:8px;background:var(--bl);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--blue);flex-wrap:wrap}
.cont-call{background:var(--blue);color:#fff;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer}
.cont-call:hover{opacity:.85}

/* ── REP PROFILES ── */
.rep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:16px}
.rep-card{background:var(--card);border-radius:var(--rl2);padding:18px;box-shadow:var(--sh);cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.rep-card:hover{border-color:var(--g);box-shadow:var(--sh2)}
.rep-av{width:44px;height:44px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin-bottom:10px}
.rep-name{font-size:14px;font-weight:700;margin-bottom:2px}
.rep-sub{font-size:11px;color:var(--ink3)}
.rep-score{font-size:24px;font-weight:700;margin-top:8px}
.rep-trend{font-size:11px;font-weight:600}
.rep-trend.up{color:#16a34a}
.rep-trend.dn{color:var(--red)}
.rep-trend.flat{color:var(--ink3)}
.rep-detail{display:none}
.rep-detail.open{display:block}

/* ── REP MANAGEMENT ── */
.rep-mgmt-table{width:100%;border-collapse:collapse;font-size:13px}
.rep-mgmt-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.rep-mgmt-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.rep-mgmt-table tr:last-child td{border-bottom:none}
.rep-mgmt-table tr:hover td{background:var(--surface)}
.rep-loc-tag{font-size:11px;font-weight:600;background:var(--gl);color:var(--gd);padding:2px 7px;border-radius:6px}

/* ── SHARED VIEWS ── */
.shared-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px}
.shared-item:last-child{border-bottom:none}
.share-url{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink2);background:var(--surface);padding:3px 8px;border-radius:6px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.view-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.vb-m{background:var(--gl);color:var(--gd)}
.vb-r{background:var(--bl);color:var(--blue)}

/* ── ADD CALLS ── */
.upload-area{border:2px dashed var(--border);border-radius:var(--rl2);padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.drag{border-color:var(--g);background:var(--gl)}
.upload-ico{font-size:32px;margin-bottom:10px}
.upload-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px}
.upload-sub{font-size:12px;color:var(--ink3)}
.queue-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border-radius:8px;margin-bottom:5px;font-size:12px}
.qi-status{font-size:14px;width:16px;text-align:center}
.qi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.qi-size{color:var(--ink3);font-size:11px}
.prog-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin:8px 0 5px}
.prog-fill{height:100%;background:var(--g);border-radius:4px;transition:width .4s}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--ink3)}
.tab.active{border-bottom-color:var(--g);color:var(--g)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:var(--ink)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg textarea{min-height:140px;resize:vertical;font-family:'DM Mono',monospace;font-size:12px}
.rep-detect-note{background:var(--gl);border:1.5px solid var(--g2);border-radius:8px;padding:7px 11px;font-size:12px;color:var(--gd);margin-bottom:10px;display:none}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
.modal{background:var(--white);border-radius:var(--rl2);padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:var(--sh2)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── MESSAGES ── */
.msg-ok{background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:9px 12px;color:#166534;font-size:12px;margin-top:8px}
.msg-err{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:8px;padding:9px 12px;color:var(--red);font-size:12px;margin-top:8px}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--ink3)}
.empty-state .es-ico{font-size:36px;opacity:.3;margin-bottom:10px}
.empty-state p{font-size:13px}

/* ── REANALYZE PROGRESS ── */
.reanalyze-panel{background:var(--surface);border-radius:8px;padding:14px;margin-top:10px;display:none}
.reanalyze-panel.on{display:block}

/* ── SHARE MODAL ── */
.share-toggle{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.share-toggle button{flex:1;padding:8px;font-size:13px;font-weight:500;border:none;background:var(--surface);color:var(--ink2);cursor:pointer}
.share-toggle button.active{background:var(--g);color:#fff}

/* ── MOBILE ── */
.hamburger{display:none;padding:8px;background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink)}
@media(max-width:768px){
  .hamburger{display:block}
  .sidebar{position:fixed;left:-240px;top:0;height:100vh;z-index:200;transition:left .2s;width:220px!important}
  .sidebar.mobile-open{left:0;box-shadow:var(--sh2)}
  .two-col,.three-col{grid-template-columns:1fr}
  .scores-grid{grid-template-columns:1fr 1fr}
  .attn-row{grid-template-columns:1fr 1fr}
}

/* ── CHART HEIGHT ── */
.chart-wrap{position:relative;height:210px}
</style>
</head>
<body>

<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sb-logo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAA" style="height:28px;opacity:0" alt="">
    <div class="sb-logo-text">Little Guys <span>Movers</span></div>
  </div>
  <div class="sb-nav">
    <button class="sb-item active" onclick="nav('overview')" id="nav-overview"><span class="ico">🏠</span><span class="lbl">Overview</span></button>
    <button class="sb-item" onclick="nav('library')" id="nav-library"><span class="ico">📞</span><span class="lbl">Call Library</span></button>
    <button class="sb-item" onclick="nav('profiles')" id="nav-profiles"><span class="ico">👤</span><span class="lbl">Rep Profiles</span></button>
    <button class="sb-item" onclick="nav('management')" id="nav-management"><span class="ico">⚙️</span><span class="lbl">Rep Management</span></button>
    <button class="sb-item" onclick="nav('shared')" id="nav-shared"><span class="ico">📤</span><span class="lbl">Shared Views</span></button>
    <div class="sb-sep"></div>
    <button class="sb-item" onclick="nav('add')" id="nav-add"><span class="ico">➕</span><span class="lbl">Add Calls</span></button>
  </div>
  <div class="sb-bottom">
    <div class="sb-version">LGMS Intelligence v7</div>
  </div>
</nav>

<!-- MAIN AREA -->
<div class="main-area">
  <header class="topbar">
    <button class="hamburger" onclick="toggleMobileSidebar()">☰</button>
    <div>
      <div class="topbar-title" id="topbar-title">Overview</div>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <div class="topbar-r" id="topbar-r">
      <button class="btn btn-g btn-sm" onclick="exportCSV()">↓ Export CSV</button>
      <button class="btn btn-p btn-sm" onclick="nav('add')">+ Add Calls</button>
    </div>
  </header>

  <div class="content" id="content">
    <!-- pages rendered here -->
  </div>
</div>
</div>

<script>
// ─────────────────────────────────
// STATE
// ─────────────────────────────────
const API = '';
let allCalls = [], filtered = [], reps = [], sharedViews = [];
let lbKey = 'overall', lbDir = -1;
let selected = new Set();
let audioFiles = [];
let addTab = 'audio';
let currentPage = 'overview';
let trendChart = null, repChart = null;
let openRepId = null;

// Checklist keys (22-step)
const CK = ['got_move_date','got_customer_name','got_phone_number','got_cities','got_home_type','got_stairs_info','did_full_inventory','asked_forgotten_items','asked_about_boxes','gave_price_on_call','pitched_fvp','attempted_to_close','offered_email_estimate','mentioned_confirmations','thanked_customer','asked_name_at_start','led_estimate_process','scheduled_onsite_attempt','offered_alternatives','took_rapport_opportunities','completed_booking_wrapup','captured_lead'];
const CKL = ['Move date','Name','Phone','Cities','Home type','Stairs','Inventory','Forgotten','Boxes','Gave price','FVP','Closing','Email est.','Confirmations','Thanked','Name at start','Led process','Onsite attempt','Alternatives','Rapport','Booking wrap-up','Lead captured'];
const CKFULL = ['Move date','Customer name','Phone number','Cities/locations','Home type (load & unload)','Stairs info','Full inventory','Forgotten items','Moving boxes','Gave price on call','FVP pitched','Closing attempt','Email estimate offered','Confirmations mentioned','Thanked customer','Asked name at start','Led estimate process (Navigator)','Attempted to schedule onsite','Offered alternatives for difficult moves','Took rapport opportunities','Completed booking wrap-up','Lead captured'];
const SK = ['info_sequence','price_delivery','fvp_pitch','closing_attempt','call_control','professionalism','rapport_tone','overall'];
const SL = ['Info Sequence','Price Delivery','FVP Pitch','Closing','Call Control','Professionalism','Rapport & Tone','Overall'];
const KWS = ['Full Value Protection','confirmation call','hourly','moving boxes','fuel','declared value','schedule','Little Guys'];

// ─────────────────────────────────
// INIT
// ─────────────────────────────────
async function init() {
  await loadCalls();
  loadReps();
  loadSharedViews();
  nav('overview');
}

async function loadCalls() {
  try {
    const r = await fetch(API + '/calls');
    if (r.ok) allCalls = await r.json();
  } catch(e) { console.log('Load error:', e); }
  applyFilters();
}

async function loadReps() {
  try {
    const r = await fetch(API + '/reps');
    if (r.ok) reps = await r.json();
  } catch(e) {}
}

async function loadSharedViews() {
  try {
    const r = await fetch(API + '/shared_views');
    if (r.ok) sharedViews = await r.json();
  } catch(e) {}
}

// ─────────────────────────────────
// NAV
// ─────────────────────────────────
function nav(page, opts = {}) {
  currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = { overview:'Overview', library:'Call Library', profiles:'Rep Profiles', management:'Rep Management', shared:'Shared Views', add:'Add Calls' };
  document.getElementById('topbar-title').textContent = opts.title || titles[page] || page;
  document.getElementById('topbar-sub').textContent = opts.sub || '';

  const tr = document.getElementById('topbar-r');
  if (page === 'add') {
    tr.innerHTML = '';
  } else {
    tr.innerHTML = `<button class="btn btn-g btn-sm" onclick="exportCSV()">↓ Export CSV</button><button class="btn btn-p btn-sm" onclick="nav('add')">+ Add Calls</button>`;
  }

  const pages = { overview: renderOverview, library: renderLibrary, profiles: renderProfiles, management: renderManagement, shared: renderShared, add: renderAdd };
  if (pages[page]) pages[page](opts);

  // Mobile: close sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function toggleMobileSidebar() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ─────────────────────────────────
// FILTERS
// ─────────────────────────────────
function applyFilters(opts = {}) {
  const rep = opts.rep || '';
  const out = opts.out || '';
  const score = opts.score || '';
  const excl = opts.excl || false;
  const attnFilter = opts.attn || '';

  filtered = allCalls.filter(c => {
    if (rep && c.rep_name !== rep) return false;
    if (out && c.call_outcome !== out) return false;
    if (excl && c.exclude_from_scoring) return false;
    if (score === 'high' && (c.scores?.overall?.score || 0) < 8) return false;
    if (score === 'mid') { const s = c.scores?.overall?.score || 0; if (s < 5 || s > 7) return false; }
    if (score === 'low' && (c.scores?.overall?.score || 0) > 4) return false;
    if (attnFilter === 'decline' && !c.availability_decline) return false;
    if (attnFilter === 'onsite' && !c.onsite_suggested) return false;
    if (attnFilter === 'quality' && (c.call_quality === 'normal' || !c.call_quality)) return false;
    if (attnFilter === 'continuation' && !(c.is_continuation && c.continuation_group_id)) return false;
    return true;
  });
}

function scoringCalls(src) {
  return (src || filtered).filter(c => !c.exclude_from_scoring);
}

function avg(arr, k) {
  const vals = arr.map(c => c.scores?.[k]?.score || 0).filter(v => v > 0);
  return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
}

function scColor(s) {
  if (s >= 8) return '#16a34a';
  if (s >= 5) return '#d97706';
  return '#dc2626';
}

function scoreChip(s) {
  const n = parseFloat(s);
  if (isNaN(n) || s === '—') return `<span class="score-chip sc-n">—</span>`;
  const cls = n >= 8 ? 'sc-g' : n >= 5 ? 'sc-y' : 'sc-r';
  return `<span class="score-chip ${cls}">${n.toFixed(1)}</span>`;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─────────────────────────────────
// OVERVIEW PAGE
// ─────────────────────────────────
function renderOverview() {
  applyFilters();
  const sc = scoringCalls();
  const total = allCalls.length;
  const excl = allCalls.filter(c => c.exclude_from_scoring).length;
  const booked = sc.filter(c => c.call_outcome === 'booked').length;
  const br = sc.length ? Math.round(booked / sc.length * 100) : 0;
  const compPct = sc.length ? Math.round(sc.reduce((a, c) => a + CK.filter(k => c.checklist?.[k]).length, 0) / (sc.length * CK.length) * 100) : 0;

  // Attention counts
  const declines = allCalls.filter(c => c.availability_decline).length;
  const onsites = allCalls.filter(c => c.onsite_suggested).length;
  const badQuality = allCalls.filter(c => c.call_quality && c.call_quality !== 'normal').length;
  const conts = allCalls.filter(c => c.is_continuation && c.continuation_group_id).length;

  const content = document.getElementById('content');
  content.innerHTML = `
    ${(declines + onsites + badQuality + conts) > 0 ? `
    <div style="margin-bottom:6px"><div style="font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Needs Attention</div>
    <div class="attn-row">
      ${declines > 0 ? `<div class="attn-card red" onclick="navFilter('library','decline')"><div class="ac-icon">🚫</div><div class="ac-n">${declines}</div><div class="ac-l">Availability Declines</div></div>` : ''}
      ${onsites > 0 ? `<div class="attn-card amber" onclick="navFilter('library','onsite')"><div class="ac-icon">🏠</div><div class="ac-n">${onsites}</div><div class="ac-l">Onsite Suggested</div></div>` : ''}
      ${badQuality > 0 ? `<div class="attn-card amber" onclick="navFilter('library','quality')"><div class="ac-icon">📵</div><div class="ac-n">${badQuality}</div><div class="ac-l">Poor Audio / Disconnected</div></div>` : ''}
      ${conts > 0 ? `<div class="attn-card blue" onclick="navFilter('library','continuation')"><div class="ac-icon">🔗</div><div class="ac-n">${conts}</div><div class="ac-l">Continuation Calls</div></div>` : ''}
    </div></div>` : ''}

    <div class="mrow">
      <div class="mc" onclick="navFilter('library','')"><div class="mc-l">Total Calls</div><div class="mc-v">${total}</div><div class="mc-s">${excl} excluded</div></div>
      <div class="mc" onclick="navFilter('library','scored')"><div class="mc-l">Scored Calls</div><div class="mc-v">${sc.length}</div><div class="mc-s">${new Set(sc.map(c=>c.rep_name)).size} reps</div></div>
      <div class="mc bl" onclick=""><div class="mc-l">Avg Overall</div><div class="mc-v">${avg(sc,'overall')}</div><div class="mc-s">out of 10</div></div>
      <div class="mc bl"><div class="mc-l">Avg Rapport</div><div class="mc-v">${avg(sc,'rapport_tone')}</div><div class="mc-s">out of 10</div></div>
      <div class="mc am"><div class="mc-l">Process Compliance</div><div class="mc-v">${compPct}%</div><div class="mc-s">checklist avg</div></div>
      <div class="mc ${br >= 50 ? '' : 'rd'}"><div class="mc-l">Booking Rate</div><div class="mc-v">${br}%</div><div class="mc-s">${booked} booked</div></div>
    </div>

    <div class="two-col">
      <div class="card">
        <div class="card-hdr"><h3>Rep Leaderboard</h3><span class="bdg" id="lb-cnt"></span></div>
        <div style="overflow-x:auto">
          <table class="lb"><thead><tr>
            <th>#</th>
            <th onclick="sortLB('rep_name')">Rep</th>
            <th onclick="sortLB('overall')">Overall</th>
            <th onclick="sortLB('rapport_tone')">Rapport</th>
            <th onclick="sortLB('price_delivery')">Price</th>
            <th onclick="sortLB('fvp_pitch')">FVP</th>
            <th onclick="sortLB('closing_attempt')">Closing</th>
            <th onclick="sortLB('calls')">Calls</th>
          </tr></thead><tbody id="lb-body"></tbody></table>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><h3>Score Trends</h3></div>
        <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><h3>22-Step Checklist Compliance Heatmap</h3><span id="hm-excl-note" style="font-size:11px;color:var(--ink3);margin-left:auto"></span></div>
      <div class="hm-wrap"><table class="hm" id="heatmap"></table></div>
    </div>

    <div class="three-col">
      <div class="card"><div class="card-hdr"><h3>Talk Ratio (avg)</h3></div><div id="talk-viz"></div></div>
      <div class="card"><div class="card-hdr"><h3>Keyword Detection</h3></div><div id="kw-viz"></div></div>
      <div class="card"><div class="card-hdr"><h3>Objection Tracker</h3></div><div id="obj-viz"></div></div>
    </div>
  `;

  renderLB();
  renderTrend();
  renderHeatmap();
  renderTalk();
  renderKW();
  renderObj();
}

function navFilter(page, attn) {
  nav(page);
  if (attn) {
    window._attnFilter = attn;
    renderLibrary({ attn });
  }
}

function sortLB(k) {
  if (lbKey === k) lbDir *= -1; else { lbKey = k; lbDir = -1; }
  renderLB();
}

function renderLB() {
  const sc = scoringCalls();
  const repNames = [...new Set(sc.map(c => c.rep_name))].filter(Boolean);
  const data = repNames.map(r => {
    const rc = sc.filter(c => c.rep_name === r);
    const a = k => (rc.reduce((s, c) => s + (c.scores?.[k]?.score || 0), 0) / rc.length).toFixed(1);
    return { rep_name: r, overall: parseFloat(a('overall')), rapport_tone: parseFloat(a('rapport_tone')), price_delivery: parseFloat(a('price_delivery')), fvp_pitch: parseFloat(a('fvp_pitch')), closing_attempt: parseFloat(a('closing_attempt')), calls: rc.length };
  });
  data.sort((a, b) => lbKey === 'rep_name' ? a.rep_name.localeCompare(b.rep_name) * lbDir : (b[lbKey] - a[lbKey]) * -lbDir);
  const cnt = document.getElementById('lb-cnt');
  if (cnt) cnt.textContent = `${data.length} rep${data.length !== 1 ? 's' : ''}`;
  const body = document.getElementById('lb-body');
  if (!body) return;
  body.innerHTML = data.map((d, i) => {
    const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
    return `<tr onclick="nav('profiles',{rep:'${d.rep_name}'})">
      <td><span class="rav ${rc}">${i + 1}</span></td>
      <td style="font-weight:600">${d.rep_name}</td>
      <td>${scoreChip(d.overall.toFixed(1))}</td>
      <td>${scoreChip(d.rapport_tone.toFixed(1))}</td>
      <td>${scoreChip(d.price_delivery.toFixed(1))}</td>
      <td>${scoreChip(d.fvp_pitch.toFixed(1))}</td>
      <td>${scoreChip(d.closing_attempt.toFixed(1))}</td>
      <td style="color:var(--ink3);font-size:11px">${d.calls}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:var(--ink3);padding:16px">No scored calls</td></tr>';
}

function renderTrend() {
  const sc = [...scoringCalls()].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const canvas = document.getElementById('trend-chart');
  if (!canvas) return;
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  trendChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: sc.map(c => fmt(c.call_date || c.created_at)),
      datasets: [
        { label: 'Overall', data: sc.map(c => c.scores?.overall?.score || 0), borderColor: '#4a7c3f', backgroundColor: 'rgba(74,124,63,.08)', borderWidth: 2, pointRadius: 2, tension: .4, fill: true },
        { label: 'Rapport', data: sc.map(c => c.scores?.rapport_tone?.score || 0), borderColor: '#3b6fd4', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 2, tension: .4, borderDash: [4, 3] }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { font: { size: 11 }, boxWidth: 14 } } }, scales: { y: { min: 0, max: 10, ticks: { stepSize: 2, color: '#8a918a', font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.04)' } }, x: { ticks: { color: '#8a918a', maxRotation: 45, autoSkip: true, maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } } } }
  });
}

function renderHeatmap() {
  const sc = scoringCalls();
  const excl = filtered.filter(c => c.exclude_from_scoring).length;
  const note = document.getElementById('hm-excl-note');
  if (note) note.textContent = excl ? `${excl} excluded call${excl !== 1 ? 's' : ''} not counted` : '';
  const repNames = [...new Set(sc.map(c => c.rep_name))].filter(Boolean).sort();
  const hm = document.getElementById('heatmap');
  if (!hm) return;
  if (!repNames.length) { hm.innerHTML = '<tr><td style="padding:14px;color:var(--ink3)">No scored data</td></tr>'; return; }

  // Use short labels for heatmap
  let html = `<thead><tr><th>Rep</th>${CKL.map(l => `<th style="min-width:14px;font-size:8px">${l}</th>`).join('')}</tr></thead><tbody>`;
  repNames.forEach(r => {
    const rc = sc.filter(c => c.rep_name === r);
    html += `<tr><td class="rn" onclick="nav('profiles',{rep:'${r}'})" style="cursor:pointer;color:var(--g)">${r} <span style="font-size:9px;color:var(--ink3)">(${rc.length})</span></td>`;
    CK.forEach((k, i) => {
      const p = Math.round(rc.filter(c => c.checklist?.[k]).length / rc.length * 100);
      const cls = p >= 80 ? 'hmg' : p >= 50 ? 'hmy' : 'hmr';
      html += `<td class="${cls}" title="${CKL[i]}: ${p}%">${p}%</td>`;
    });
    html += '</tr>';
  });
  hm.innerHTML = html + '</tbody>';
}

function renderTalk() {
  const w = scoringCalls().filter(c => c.talk_ratio_rep > 0);
  const el = document.getElementById('talk-viz');
  if (!el) return;
  if (!w.length) { el.innerHTML = '<p style="color:var(--ink3);font-size:12px">No data yet</p>'; return; }
  const ar = Math.round(w.reduce((a, c) => a + c.talk_ratio_rep, 0) / w.length);
  const ac = 100 - ar;
  const onTarget = Math.abs(ar - 40) <= 8;
  el.innerHTML = `
    <div class="trbar" style="margin-bottom:8px">
      <div class="tr-r" style="width:${ar}%">${ar}%</div>
      <div class="tr-c" style="width:${ac}%">${ac}%</div>
    </div>
    <div style="display:flex;gap:12px;font-size:11px;color:var(--ink3);margin-bottom:8px">
      <span style="color:var(--g)">■ Rep avg ${ar}%</span>
      <span style="color:var(--blue)">■ Customer avg ${ac}%</span>
    </div>
    <div style="font-size:12px;color:${onTarget ? '#16a34a' : 'var(--amber)'}">${onTarget ? '✓ On target (ideal: 40/60)' : '⚠ Ideal: 40% rep / 60% customer'}</div>`;
}

function renderKW() {
  const cnt = {}; KWS.forEach(k => cnt[k] = 0);
  scoringCalls().forEach(c => (c.keywords_detected || []).forEach(k => { if (cnt[k] !== undefined) cnt[k]++; }));
  const sorted = Object.entries(cnt).sort((a, b) => b[1] - a[1]);
  const mx = Math.max(...sorted.map(([, v]) => v), 1);
  const el = document.getElementById('kw-viz');
  if (!el) return;
  el.innerHTML = sorted.map(([k, v]) => `
    <div class="kw-item">
      <span style="min-width:100px;font-size:11px">${k}</span>
      <div class="kw-bar-wrap"><div class="kw-bar" style="width:${Math.round(v/mx*100)}%"></div></div>
      <span class="kw-count">${v}</span>
    </div>`).join('');
}

function renderObj() {
  const cnt = {};
  scoringCalls().forEach(c => (c.objections_detected || []).forEach(o => { cnt[o] = (cnt[o] || 0) + 1; }));
  const sorted = Object.entries(cnt).sort((a, b) => b[1] - a[1]);
  const el = document.getElementById('obj-viz');
  if (!el) return;
  el.innerHTML = sorted.length ? sorted.map(([o, v]) => `
    <div class="obj-item">
      <span>${o}</span>
      <span class="obj-count">${v}</span>
    </div>`).join('') : '<p style="color:var(--ink3);font-size:12px">No objections recorded yet</p>';
}

// ─────────────────────────────────
// CALL LIBRARY
// ─────────────────────────────────
let libFilters = { rep: '', out: '', move: '', score: '', sent: '', search: '', sort: 'newest', excl: false, attn: '' };

function renderLibrary(opts = {}) {
  if (opts.attn) libFilters.attn = opts.attn;
  const repOpts = [...new Set(allCalls.map(c => c.rep_name))].filter(Boolean).sort().map(r => `<option value="${r}"${libFilters.rep===r?' selected':''}>${r}</option>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="lib-toolbar">
        <div class="search-box"><span class="ico">🔍</span><input type="text" placeholder="Search calls…" value="${libFilters.search}" oninput="libFilters.search=this.value;renderCallList()" /></div>
        <select class="filter-sel" onchange="libFilters.rep=this.value;renderCallList()"><option value="">All reps</option>${repOpts}</select>
        <select class="filter-sel" onchange="libFilters.out=this.value;renderCallList()">
          <option value="">All outcomes</option>
          <option value="booked"${libFilters.out==='booked'?' selected':''}>Booked</option>
          <option value="estimate_sent"${libFilters.out==='estimate_sent'?' selected':''}>Estimate sent</option>
          <option value="lost"${libFilters.out==='lost'?' selected':''}>Lost</option>
        </select>
        <select class="filter-sel" onchange="libFilters.score=this.value;renderCallList()">
          <option value="">All scores</option>
          <option value="high"${libFilters.score==='high'?' selected':''}>High 8-10</option>
          <option value="mid"${libFilters.score==='mid'?' selected':''}>Mid 5-7</option>
          <option value="low"${libFilters.score==='low'?' selected':''}>Low 1-4</option>
        </select>
        <select class="filter-sel" onchange="libFilters.sort=this.value;renderCallList()">
          <option value="newest"${libFilters.sort==='newest'?' selected':''}>Newest first</option>
          <option value="oldest"${libFilters.sort==='oldest'?' selected':''}>Oldest first</option>
          <option value="score_high"${libFilters.sort==='score_high'?' selected':''}>Highest score</option>
          <option value="score_low"${libFilters.sort==='score_low'?' selected':''}>Lowest score</option>
        </select>
        ${libFilters.attn ? `<button class="btn btn-g btn-sm" onclick="libFilters.attn='';renderCallList()">✕ Clear attention filter</button>` : ''}
        <button class="btn btn-g btn-sm" onclick="clearLibFilters()">Clear all</button>
        <span id="lib-cnt" style="font-size:12px;color:var(--ink3);margin-left:auto"></span>
        <button class="btn btn-g btn-sm" id="sel-all-btn" onclick="toggleSelectAll()">☐ Select all</button>
      </div>
      <div class="bulk-bar" id="bulk-bar">
        <span id="bulk-count">0 selected</span>
        <button class="btn btn-d btn-sm" onclick="bulkDelete()">🗑 Delete selected</button>
        <button class="btn btn-g btn-sm" onclick="clearSelection()">Cancel</button>
      </div>
      <div id="call-list"></div>
    </div>`;

  renderCallList();
}

function clearLibFilters() {
  libFilters = { rep: '', out: '', move: '', score: '', sent: '', search: '', sort: 'newest', excl: false, attn: '' };
  renderLibrary();
}

function renderCallList() {
  const q = libFilters.search.toLowerCase();
  let list = allCalls.filter(c => {
    if (libFilters.rep && c.rep_name !== libFilters.rep) return false;
    if (libFilters.out && c.call_outcome !== libFilters.out) return false;
    if (libFilters.score === 'high' && (c.scores?.overall?.score || 0) < 8) return false;
    if (libFilters.score === 'mid') { const s = c.scores?.overall?.score || 0; if (s < 5 || s > 7) return false; }
    if (libFilters.score === 'low' && (c.scores?.overall?.score || 0) > 4) return false;
    if (libFilters.attn === 'decline' && !c.availability_decline) return false;
    if (libFilters.attn === 'onsite' && !c.onsite_suggested) return false;
    if (libFilters.attn === 'quality' && (c.call_quality === 'normal' || !c.call_quality)) return false;
    if (libFilters.attn === 'continuation' && !(c.is_continuation && c.continuation_group_id)) return false;
    if (q) { const hay = [c.rep_name, c.caller_name, c.call_purpose, c.call_summary, c.transcript].join(' ').toLowerCase(); if (!hay.includes(q)) return false; }
    return true;
  });

  if (libFilters.sort === 'newest') list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else if (libFilters.sort === 'oldest') list.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  else if (libFilters.sort === 'score_high') list.sort((a, b) => (b.scores?.overall?.score || 0) - (a.scores?.overall?.score || 0));
  else if (libFilters.sort === 'score_low') list.sort((a, b) => (a.scores?.overall?.score || 0) - (b.scores?.overall?.score || 0));

  const cnt = document.getElementById('lib-cnt');
  if (cnt) cnt.textContent = `${list.length} call${list.length !== 1 ? 's' : ''}`;

  const el = document.getElementById('call-list');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="es-ico">📞</div><p>No calls match current filters.</p></div>';
    return;
  }

  // Group continuation calls
  const groups = {};
  list.forEach(c => {
    if (c.is_continuation && c.continuation_group_id) {
      if (!groups[c.continuation_group_id]) groups[c.continuation_group_id] = [];
      groups[c.continuation_group_id].push(c);
    }
  });

  el.innerHTML = list.map(c => renderCallRow(c, groups)).join('');
  updateBulkBar();
}

function renderCallRow(c, groups = {}) {
  const s = c.scores?.overall?.score || 0;
  const eff = c.score_overrides?.overall ?? s;
  const ini = (c.rep_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const dt = fmt(c.call_date || c.created_at);
  const tags = (c.tags || []).map(t => `<span class="tag" onclick="event.stopPropagation();libFilters.search='${t}';renderCallList()">${t}</span>`).join('');
  const isExcl = c.exclude_from_scoring;
  const sel = selected.has(c.id);
  const ovCount = c.score_overrides && Object.keys(c.score_overrides).length;

  const outcomeClass = c.call_outcome === 'booked' ? 'op-b' : c.call_outcome === 'estimate_sent' ? 'op-e' : c.call_outcome === 'lost' ? 'op-l' : 'op-u';
  const outcomeLabel = c.call_outcome === 'booked' ? 'Booked' : c.call_outcome === 'estimate_sent' ? 'Estimate sent' : c.call_outcome === 'lost' ? 'Lost' : 'Unknown';
  const sentClass = c.customer_sentiment === 'positive' ? 'sd-pos' : c.customer_sentiment === 'hesitant' ? 'sd-hes' : c.customer_sentiment === 'negative' ? 'sd-neg' : 'sd-neu';

  // Continuation timeline
  let contTimeline = '';
  if (c.is_continuation && c.continuation_group_id && groups[c.continuation_group_id]) {
    const grp = [...groups[c.continuation_group_id]].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    if (grp.length > 1) {
      const timelineHtml = grp.map((gc, i) => `<span class="cont-call" onclick="event.stopPropagation();toggleCallRow('${gc.id}')" title="${gc.caller_name}">Call ${i+1} ${fmt(gc.call_date||gc.created_at)}</span>${i < grp.length-1 ? ' → ' : ''}`).join('');
      contTimeline = `<div class="continuation-timeline">🔗 Continuation series: ${timelineHtml}</div>`;
    }
  }

  // Scorecard
  const scoresHtml = SK.map((k, i) => {
    const v = c.score_overrides?.[k] ?? c.scores?.[k]?.score ?? 0;
    const col = scColor(v);
    return `<div class="score-box">
      <div class="score-box-lbl">${SL[i]}</div>
      <div class="score-box-val" style="color:${col}">${v}<span style="font-size:10px;color:var(--ink3)">/10</span></div>
      <div class="score-box-bar"><div class="score-box-fill" style="width:${v*10}%;background:${col}"></div></div>
      <div class="score-box-note">${c.scores?.[k]?.note || ''}</div>
    </div>`;
  }).join('');

  const ckHtml = CK.map((k, i) => `<div class="ck-item">${c.checklist?.[k] ? '✅' : '❌'} <span>${CKFULL[i]}</span></div>`).join('');

  // Transcript with keyword highlighting
  let txHtml = esc(c.transcript || '');
  if (c.keyword_positions && c.transcript) {
    // We'll add scroll targets for keywords
  }

  return `<div class="call-row${isExcl ? ' excl' : ''}${sel ? ' open' : ''}" id="row-${c.id}">
    <div class="cr-head" onclick="toggleCallRow('${c.id}')">
      <input type="checkbox" ${sel ? 'checked' : ''} onclick="event.stopPropagation();toggleSelect('${c.id}')" style="width:15px;height:15px;cursor:pointer;flex-shrink:0" />
      <div class="cr-av${isExcl ? ' excl' : ''}">${ini}</div>
      <div class="cr-meta">
        <div class="cr-name">
          <span onclick="event.stopPropagation();nav('profiles',{rep:'${esc(c.rep_name||'')}'});" style="cursor:pointer;color:var(--g)">${c.rep_name || '?'}</span>
          — ${c.caller_name || 'Unknown caller'}
          ${isExcl ? '<span style="font-size:10px;color:var(--ink3);font-weight:400"> (excluded)</span>' : ''}
        </div>
        <div class="cr-sub">${c.call_purpose || ''} · ${c.move_type || ''} · ${dt}${c.word_count ? ` · ~${c.word_count} words` : ''}</div>
      </div>
      <div class="cr-badges">
        <span class="outcome-pill ${outcomeClass}" onclick="event.stopPropagation();libFilters.out='${c.call_outcome}';renderCallList()">${outcomeLabel}</span>
        ${c.call_quality && c.call_quality !== 'normal' ? `<span class="quality-pill">${c.call_quality === 'disconnected' ? '📵 Disconnected' : '⚠ Poor audio'}</span>` : ''}
        ${c.is_continuation ? '<span class="cont-pill">🔗 Continuation</span>' : ''}
        ${c.availability_decline ? '<span class="quality-pill" style="background:#fdeaea">🚫 Declined</span>' : ''}
        ${c.onsite_suggested ? '<span class="quality-pill" style="background:#fef3df;color:#92400e">🏠 Onsite</span>' : ''}
        <span class="sent-dot ${sentClass}" title="${c.customer_sentiment || 'neutral'}"></span>
        ${tags}
        ${!isExcl ? `<span style="font-size:20px;font-weight:700;color:${scColor(eff)}">${eff}<span style="font-size:11px;color:var(--ink3)">/10</span></span>` : ''}
        ${ovCount ? '<span style="font-size:10px;color:var(--amber)" title="Score override active">⚡</span>' : ''}
      </div>
      <span class="chev">▾</span>
    </div>
    <div class="cr-body">
      ${isExcl ? `<div class="excl-banner">⚠ Excluded from scoring. Reason: ${c.exclusion_reason || c.call_type || 'marked excluded'}</div>` : ''}
      ${contTimeline}

      <div class="detail-section"><h4>Summary</h4>
        <p style="font-size:13px;line-height:1.7">${c.call_summary || ''}</p>
        ${c.key_details ? `<div style="background:var(--gl);border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;color:var(--gd)">${c.key_details}</div>` : ''}
      </div>

      ${!isExcl ? `<div class="detail-section"><h4>Performance Scores</h4><div class="scores-grid">${scoresHtml}</div></div>` : ''}

      <div class="detail-section"><h4>22-Step Checklist</h4><div class="ck-grid">${ckHtml}</div></div>

      <div class="detail-section"><div class="two-col-info">
        <div class="info-box"><div class="info-box-title">Strengths</div><ul class="info-list">${(c.strengths || []).map(s => `<li><span>💪</span>${s}</li>`).join('') || '<li style="color:var(--ink3)">None recorded</li>'}</ul></div>
        <div class="info-box"><div class="info-box-title">Coaching Points</div><ul class="info-list">${(c.coaching_points || []).map(p => `<li><span>⚡</span>${p}</li>`).join('') || '<li style="color:var(--ink3)">None recorded</li>'}</ul></div>
      </div></div>

      <div class="detail-section"><h4>Keywords Detected</h4>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${(c.keywords_detected || []).map(k => {
            const pos = c.keyword_positions?.[k];
            return `<span class="tag${pos !== undefined ? ' kw-link' : ''}" ${pos !== undefined ? `onclick="scrollToTranscript('${c.id}',${pos})"` : ''}>${k}</span>`;
          }).join('') || '<span style="color:var(--ink3);font-size:12px">None detected</span>'}
        </div>
      </div>

      ${(c.objections_detected || []).length ? `<div class="detail-section"><h4>Objections</h4><div style="display:flex;flex-wrap:wrap;gap:5px">${c.objections_detected.map(o => {
        const pos = c.objection_positions?.[o];
        return `<span style="background:#fee2e2;color:#991b1b;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;${pos!==undefined?'cursor:pointer;text-decoration:underline;text-decoration-style:dotted':''}" ${pos!==undefined?`onclick="scrollToTranscript('${c.id}',${pos})"`:''} >${o}</span>`;
      }).join('')}</div></div>` : ''}

      <div class="detail-section"><h4>Talk Ratio</h4>
        <div class="trbar" style="max-width:360px">
          <div class="tr-r" style="width:${c.talk_ratio_rep||40}%">${c.talk_ratio_rep||40}% Rep</div>
          <div class="tr-c" style="width:${c.talk_ratio_customer||60}%">${c.talk_ratio_customer||60}% Cust</div>
        </div>
      </div>

      <div class="detail-section"><h4>Tags</h4>
        <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
          ${(c.tags || []).map(t => `<span class="tag">${t} <span class="tag-rm" onclick="rmTag('${c.id}','${t}')">✕</span></span>`).join('')}
          <input class="tag-inp" placeholder="+ Add tag" onkeydown="addTag(event,'${c.id}')" />
        </div>
      </div>

      <div class="detail-section"><h4>Manager Notes</h4>
        <textarea class="nt" id="nt-${c.id}" placeholder="Add coaching notes…">${c.manager_notes || ''}</textarea>
        <button class="btn btn-s btn-sm" style="margin-top:6px" onclick="saveNotes('${c.id}')">Save notes</button>
      </div>

      <div class="detail-section"><h4>Score Override</h4>
        <div class="ovr-row">
          <select id="ok-${c.id}"><option value="">Select category…</option>${[...SK].map(k=>`<option value="${k}">${k.replace(/_/g,' ')}</option>`).join('')}</select>
          <input type="number" min="1" max="10" placeholder="1-10" id="ov-${c.id}" style="width:64px" />
          <button class="btn btn-s btn-sm" onclick="applyOv('${c.id}')">Apply</button>
          ${ovCount ? `<button class="btn btn-d btn-sm" onclick="clrOv('${c.id}')">Clear overrides</button>` : ''}
        </div>
        ${ovCount ? `<div style="margin-top:5px;font-size:11px;color:var(--ink3)">Active: ${Object.entries(c.score_overrides).map(([k,v])=>`${k}:${v}`).join(', ')}</div>` : ''}
      </div>

      <div class="detail-section"><h4>Exclude from Scoring</h4>
        <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
          <input type="checkbox" ${c.exclude_from_scoring ? 'checked' : ''} onchange="toggleExclude('${c.id}',this.checked)" />
          Exclude this call from all metrics and leaderboard
        </label>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn btn-g btn-sm" onclick="exportPDFCall('${c.id}')">↓ PDF Scorecard</button>
        <button class="btn btn-g btn-sm" onclick="openShareModal('${c.id}')">🔗 Share</button>
        ${c.audio_url ? `<a href="${c.audio_url}" target="_blank" class="btn btn-g btn-sm">▶ Audio</a>` : ''}
      </div>

      ${c.transcript ? `<div class="detail-section"><h4>Transcript</h4><div class="txb" id="tx-${c.id}">${txHtml}</div></div>` : ''}

      <div style="text-align:right;margin-top:12px">
        <button class="btn btn-d btn-sm" onclick="delCall('${c.id}')">🗑 Delete call</button>
      </div>
    </div>
  </div>`;
}

function toggleCallRow(id) {
  const row = document.getElementById('row-' + id);
  if (row) row.classList.toggle('open');
}

function scrollToTranscript(callId, charPos) {
  const tx = document.getElementById('tx-' + callId);
  if (!tx) return;
  // Highlight at char position
  const text = tx.textContent;
  const snippet = text.slice(Math.max(0, charPos - 2), charPos + 30);
  const escaped = esc(snippet);
  tx.scrollTop = 0;
  // Simple visual flash
  tx.style.outline = '2px solid var(--g)';
  setTimeout(() => tx.style.outline = '', 1500);
}

// ── SELECTION ──
function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  updateBulkBar();
  const row = document.getElementById('row-' + id);
  if (row) row.querySelector('input[type=checkbox]').checked = selected.has(id);
}

function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  if (!bar) return;
  const n = selected.size;
  bar.classList.toggle('on', n > 0);
  const cnt = document.getElementById('bulk-count');
  if (cnt) cnt.textContent = `${n} call${n !== 1 ? 's' : ''} selected`;
}

function clearSelection() { selected.clear(); updateBulkBar(); renderCallList(); }

function toggleSelectAll() {
  const rows = document.querySelectorAll('#call-list .call-row');
  const ids = [...rows].map(el => el.id.replace('row-', ''));
  const allSel = ids.every(id => selected.has(id));
  if (allSel) ids.forEach(id => selected.delete(id)); else ids.forEach(id => selected.add(id));
  updateBulkBar(); renderCallList();
}

async function bulkDelete() {
  const n = selected.size;
  if (!n || !confirm(`Delete ${n} call${n !== 1 ? 's' : ''}? This cannot be undone.`)) return;
  try {
    const r = await fetch(API + '/bulk_delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ids: [...selected] }) });
    const res = await r.json();
    if (!r.ok) throw new Error(res.error || 'Bulk delete failed');
    allCalls = allCalls.filter(c => !selected.has(c.id));
    selected.clear();
    renderCallList();
  } catch(e) { alert('Delete failed: ' + e.message); }
}

async function delCall(id) {
  if (!confirm('Delete this call? Cannot be undone.')) return;
  try {
    const r = await fetch(API + '/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
    if (!r.ok) throw new Error('Delete failed');
    allCalls = allCalls.filter(c => c.id !== id);
    selected.delete(id);
    renderCallList();
  } catch(e) { alert(e.message); }
}

async function toggleExclude(id, val) { await updCall(id, { exclude_from_scoring: val, exclusion_reason: val ? 'Manually excluded by manager' : '' }); }
async function addTag(e, id) {
  if (e.key !== 'Enter') return;
  const inp = e.target, tag = inp.value.trim(); if (!tag) return;
  const c = allCalls.find(x => x.id === id); if (!c) return;
  await updCall(id, { tags: [...(c.tags || []), tag] }); inp.value = '';
}
async function rmTag(id, tag) { const c = allCalls.find(x => x.id === id); if (!c) return; await updCall(id, { tags: (c.tags || []).filter(t => t !== tag) }); }
async function saveNotes(id) { await updCall(id, { manager_notes: document.getElementById('nt-' + id).value }); }
async function applyOv(id) {
  const k = document.getElementById('ok-' + id).value, v = parseInt(document.getElementById('ov-' + id).value);
  if (!k || isNaN(v) || v < 1 || v > 10) { alert('Select a category and enter 1-10'); return; }
  const c = allCalls.find(x => x.id === id);
  await updCall(id, { score_overrides: { ...(c?.score_overrides || {}), [k]: v } });
}
async function clrOv(id) { await updCall(id, { score_overrides: {} }); }

async function updCall(id, data) {
  try {
    await fetch(API + '/update', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, ...data }) });
    const i = allCalls.findIndex(c => c.id === id);
    if (i >= 0) allCalls[i] = { ...allCalls[i], ...data };
    if (currentPage === 'library') renderCallList();
    else if (currentPage === 'overview') renderOverview();
  } catch(e) { alert('Save failed: ' + e.message); }
}

// ─────────────────────────────────
// REP PROFILES
// ─────────────────────────────────
function renderProfiles(opts = {}) {
  const repNames = [...new Set(allCalls.map(c => c.rep_name))].filter(Boolean).sort();
  const targetRep = opts.rep || null;

  let html = `<div class="rep-grid">`;
  repNames.forEach(r => {
    const rc = allCalls.filter(c => c.rep_name === r && !c.exclude_from_scoring);
    const overall = rc.length ? (rc.reduce((a, c) => a + (c.scores?.overall?.score || 0), 0) / rc.length).toFixed(1) : '—';
    const rapport = rc.length ? (rc.reduce((a, c) => a + (c.scores?.rapport_tone?.score || 0), 0) / rc.length).toFixed(1) : '—';
    const ini = r.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    html += `<div class="rep-card" onclick="openRepProfile('${esc(r)}')">
      <div class="rep-av">${ini}</div>
      <div class="rep-name">${r}</div>
      <div class="rep-sub">${rc.length} scored call${rc.length !== 1 ? 's' : ''}</div>
      <div class="rep-score" style="color:${scColor(parseFloat(overall))}">${overall}</div>
      <div style="font-size:11px;color:var(--ink3)">Rapport: ${rapport}/10</div>
    </div>`;
  });
  html += '</div><div id="rep-profile-detail"></div>';

  document.getElementById('content').innerHTML = html;
  if (targetRep) openRepProfile(targetRep);
}

function openRepProfile(repName) {
  const rc = allCalls.filter(c => c.rep_name === repName);
  const sc = rc.filter(c => !c.exclude_from_scoring);
  const sorted = [...rc].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const ini = repName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  const avgScores = SK.map(k => ({

function openRenameModal(name) {
  document.getElementById('rename-old').value = name;
  document.getElementById('rename-new').value = '';

async function doRename() {
  const oldName = document.getElementById('rename-old').value;
  const newName = document.getElementById('rename-new').value.trim();
  if (!newName) { document.getElementById('rename-msg').innerHTML = '<div class="msg-err">Enter a new name</div>'; return; }
  try {
    const r = await fetch(API + '/reps/bulk_rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old_name: oldName, new_name: newName }) });
    const res = await r.json();
    if (!r.ok) throw new Error(res.error);
    allCalls.forEach(c => { if (c.rep_name === oldName) c.rep_name = newName; });
    document.getElementById('rename-msg').innerHTML = `<div class="msg-ok">✓ Renamed ${res.renamed} calls from "${oldName}" to "${newName}"</div>`;
    setTimeout(() => { document.getElementById('rename-modal').style.display = 'none'; renderManagement(); }, 1500);
  } catch(e) { document.getElementById('rename-msg').innerHTML = `<div class="msg-err">Error: ${e.message}</div>`; }
}

}

async function runDedup() {
  const btn = document.getElementById('dedup-btn');
  const res = document.getElementById('dedup-results');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Analyzing…';
  try {
    const r = await fetch(API + '/reps/deduplicate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await r.json();
    btn.disabled = false; btn.textContent = '🔍 Check for duplicates';
    if (!data.suggestions || !data.suggestions.length) {
      res.innerHTML = '<div class="msg-ok">✓ No duplicate rep names detected</div>'; return;
    }
    res.innerHTML = data.suggestions.map((s, i) => `
      <div style="background:var(--al);border:1.5px solid #f5d488;border-radius:8px;padding:12px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:600;margin-bottom:4px">Possible match (${Math.round(s.confidence*100)}% confidence)</div>
        <div style="font-size:12px;margin-bottom:6px"><strong>${s.canonical}</strong> ← ${s.variants.join(', ')}</div>
        <div style="font-size:11px;color:var(--ink3);margin-bottom:8px">${s.reason}</div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-p btn-xs" onclick="acceptDedup(${i},'${esc(s.canonical)}',${JSON.stringify(s.variants)})">Accept & merge</button>
          <button class="btn btn-g btn-xs" onclick="this.closest('div[style]').remove()">Dismiss</button>
        </div>
      </div>`).join('');
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔍 Check for duplicates';
    res.innerHTML = `<div class="msg-err">Error: ${e.message}</div>`;
  }
}

async function acceptDedup(idx, canonical, variants) {
  for (const v of variants) {
    if (v === canonical) continue;
    try {
      await fetch(API + '/reps/bulk_rename', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old_name: v, new_name: canonical }) });
      allCalls.forEach(c => { if (c.rep_name === v) c.rep_name = canonical; });
    } catch(e) {}
  }
  renderManagement();
}

async function startReanalyze() {
  const btn = document.getElementById('reanalyze-btn');
  const panel = document.getElementById('reanalyze-panel');
  btn.disabled = true; btn.innerHTML = '<span class="spin" style="border-top-color:var(--g)"></span> Running…';
  panel.classList.add('on');

  try {
    const es = new EventSource(API + '/reanalyze/stream');
    es.onmessage = e => {
      const d = JSON.parse(e.data);
      const pct = d.total ? Math.round(d.processed / d.total * 100) : 0;
      document.getElementById('reanalyze-prog').style.width = pct + '%';
      document.getElementById('reanalyze-status').textContent = d.status === 'complete'
        ? `✓ Done! ${d.processed} re-analyzed, ${d.errors} errors`
        : d.current ? `Processing ${d.processed}/${d.total}: ${d.current}` : `Starting…`;
      if (d.status === 'complete' || d.status === 'error') {
        es.close();
        btn.disabled = false; btn.textContent = '⚡ Start bulk re-analyze';
        loadCalls();
      }
    };
    es.onerror = () => { es.close(); btn.disabled = false; btn.textContent = '⚡ Start bulk re-analyze'; };
  } catch(e) {
    btn.disabled = false; btn.textContent = '⚡ Start bulk re-analyze';
  }
}

function handleAudioSelect(files) { handleFilesWithZip([...files]); }

async function handleFilesWithZip(files) {
  const zipFiles = files.filter(f => f.name.toLowerCase().endsWith('.zip') || f.type.includes('zip'));
  const audioOnly = files.filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|m4a|wav|ogg|mp4|webm)$/i));

  if (zipFiles.length > 0) {
    const listEl = document.getElementById('audio-queue-list');
    const queue = document.getElementById('audio-queue');
    queue.style.display = 'block';
    listEl.innerHTML = `<div class="queue-item"><span class="qi-status"><span class="spin" style="border-top-color:var(--g)"></span></span><span class="qi-name">Extracting ZIP…</span></div>`;

    for (const zf of zipFiles) {
      try {
        const zip = await JSZip.loadAsync(zf);
        const audioExts = new Set(['.mp3','.m4a','.wav','.ogg','.mp4','.webm','.mpeg','.mpga']);
        const entries = Object.values(zip.files).filter(f => {
          if (f.dir) return false;
          const name = f.name.toLowerCase();
          if (name.startsWith('__') || name.startsWith('.')) return false;
          return audioExts.has(name.substring(name.lastIndexOf('.')));
        });
        for (const entry of entries) {
          const blob = await entry.async('blob');
          const filename = entry.name.split('/').pop();
          audioOnly.push(new File([blob], filename, { type: 'audio/mpeg' }));
        }
        listEl.innerHTML = `<div class="queue-item" style="background:var(--gl)"><span class="qi-status">✅</span><span class="qi-name">Extracted ${entries.length} audio files from ${zf.name}</span></div>`;
      } catch(err) {
        listEl.innerHTML = `<div class="queue-item" style="background:var(--rl)"><span class="qi-status">❌</span><span class="qi-name">Failed to extract ${zf.name}</span></div>`;
        return;
      }
    }
    setTimeout(() => setAudioFiles(audioOnly), 500);
  } else {
    setAudioFiles(audioOnly);
  }
}

function setAudioFiles(files) {
  audioFiles = files;
  const btn = document.getElementById('add-audio-btn');
  if (btn) btn.disabled = !files.length;
  if (!files.length) return;
  const queue = document.getElementById('audio-queue');
  const list = document.getElementById('audio-queue-list');
  if (!queue || !list) return;
  queue.style.display = 'block';
  list.innerHTML = files.map((f, i) => `
    <div class="queue-item" id="qi-${i}">
      <span class="qi-status" id="qis-${i}">⭕</span>
      <span class="qi-name">${f.name}</span>
      <span class="qi-size">${(f.size/1024/1024).toFixed(1)}MB</span>
    </div>`).join('');
}

function updQueueItem(i, status) {
  const el = document.getElementById('qis-' + i);
  if (el) el.innerHTML = { processing: '▶', done: '✅', skipped: '⚠', error: '❌' }[status] || '⭕';
}

async function submitAudio() {
  if (!audioFiles.length) return;
  const btn = document.getElementById('add-audio-btn');
  const skipped = [];
  let processed = 0;
  const total = audioFiles.length;

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Processing…';
  document.getElementById('audio-progress').style.display = 'block';

  for (let i = 0; i < audioFiles.length; i++) {
    const af = audioFiles[i];
    if (af.size > 25 * 1024 * 1024) { skipped.push(`${af.name} (too large, max 25MB)`); updQueueItem(i, 'skipped'); continue; }

    updQueueItem(i, 'processing');
    document.getElementById('audio-prog-text').textContent = `Checking ${i+1}/${total}: ${af.name}…`;

    try {
      const dupCheck = await fetch(API + '/check_duplicate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filename: af.name }) });
      const dupRes = await dupCheck.json();
      if (dupRes.duplicate) { skipped.push(`${af.name} — already in dashboard`); updQueueItem(i, 'skipped'); continue; }
    } catch(e) {}

    document.getElementById('audio-prog-bar').style.width = Math.round((i / total) * 90 + 5) + '%';
    document.getElementById('audio-prog-text').textContent = `Processing ${i+1}/${total}: ${af.name}`;

    try {
      const b64 = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = () => rej(new Error('Read failed')); r.readAsDataURL(af); });
      const tr = await fetch(API + '/transcribe_and_analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ audio: b64, filename: af.name }) });
      const trData = await tr.json();
      if (!tr.ok) { skipped.push(`${af.name} (${trData.error || 'failed'})`); updQueueItem(i, 'error'); continue; }

      const repName = trData.rep_name_detected && trData.rep_name_detected !== 'Unknown' ? trData.rep_name_detected : 'Unknown';
      const sr = await fetch(API + '/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...trData, rep_name: repName, filename: af.name, check_duplicate: true }) });
      const saved = await sr.json();
      if (!sr.ok) { skipped.push(`${af.name} (save failed)`); updQueueItem(i, 'error'); continue; }
      if (saved.duplicate) { skipped.push(`${af.name} (duplicate)`); updQueueItem(i, 'skipped'); continue; }
      allCalls.unshift(Array.isArray(saved) ? saved[0] : saved);
      updQueueItem(i, 'done');
      processed++;
    } catch(e) { skipped.push(`${af.name} (${e.message})`); updQueueItem(i, 'error'); }
  }

  document.getElementById('audio-prog-bar').style.width = '100%';
  document.getElementById('audio-prog-text').textContent = `Done! ${processed} analyzed, ${skipped.length} skipped.`;
  if (skipped.length) {
    document.getElementById('audio-skipped').style.display = 'block';
    document.getElementById('audio-skipped-list').innerHTML = skipped.map(s => `<div>• ${s}</div>`).join('');
  }
  btn.disabled = false; btn.textContent = 'Analyze & Save';
  if (processed > 0) { document.getElementById('add-audio-msg').innerHTML = `<div class="msg-ok">✓ ${processed} call${processed!==1?'s':''} added successfully.</div>`; audioFiles = []; }
}

async function submitPaste() {
  const btn = document.getElementById('paste-btn');
  const msg = document.getElementById('paste-msg');
  const rep = document.getElementById('paste-rep').value.trim();
  const tx = document.getElementById('paste-tx').value.trim();
  const out = document.getElementById('paste-out').value;
  if (!tx) { msg.innerHTML = '<div class="msg-err">Please provide a transcript.</div>'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Analyzing…';
  try {
    const ar = await fetch(API + '/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ transcript: tx, filename: `${rep || 'unknown'}_call.txt` }) });
    const res = await ar.json();
    if (!ar.ok) throw new Error(res.error);
    if (out !== 'unknown') res.call_outcome = out;
    const repName = rep || res.rep_name_detected || 'Unknown';
    if (res.rep_name_detected && res.rep_name_detected !== 'Unknown') {
      document.getElementById('paste-rep-detect').style.display = 'block';
      document.getElementById('paste-rep-detect').textContent = `✅ Auto-detected rep: "${res.rep_name_detected}"`;
    }
    const sr = await fetch(API + '/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ...res, rep_name: repName, transcript: tx }) });
    const saved = await sr.json();
    if (!sr.ok) throw new Error(saved.error);
    allCalls.unshift(Array.isArray(saved) ? saved[0] : saved);
    msg.innerHTML = '<div class="msg-ok">✓ Call analyzed and saved!</div>';
    document.getElementById('paste-tx').value = '';
    btn.disabled = false; btn.textContent = 'Analyze & Save';
  } catch(e) { msg.innerHTML = `<div class="msg-err">⚠ ${e.message}</div>`; btn.disabled = false; btn.textContent = 'Analyze & Save'; }
}

function exportCSV() {
  const hdrs = ['Date','Call Date','Rep','Caller','Purpose','Type','Move','Outcome','Sentiment','Excluded','Overall','Rapport','Info Seq','Price','FVP','Closing','Control','Prof.','Compliance%','Talk Rep%','Talk Cust%','Words','Quality','Declined','Onsite','Continuation','Keywords','Objections'];
  const rows = allCalls.map(c => {
    const s = c.scores || {};
    const comp = Math.round(CK.filter(k => c.checklist?.[k]).length / CK.length * 100);
    return [
      (c.created_at||'').slice(0,10), (c.call_date||'').slice(0,10),
      c.rep_name||'', c.caller_name||'', c.call_purpose||'', c.call_type||'', c.move_type||'',
      c.call_outcome||'', c.customer_sentiment||'', c.exclude_from_scoring?'Yes':'No',
      s.overall?.score||'', s.rapport_tone?.score||'', s.info_sequence?.score||'',
      s.price_delivery?.score||'', s.fvp_pitch?.score||'', s.closing_attempt?.score||'',
      s.call_control?.score||'', s.professionalism?.score||'', comp,
      c.talk_ratio_rep||'', c.talk_ratio_customer||'', c.word_count||'',
      c.call_quality||'normal', c.availability_decline?'Yes':'No',
      c.onsite_suggested?'Yes':'No', c.is_continuation?'Yes':'No',
      (c.keywords_detected||[]).join('; '), (c.objections_detected||[]).join('; ')
    ].map(v => `"${String(v).replace(/"/g,'""')}"`);
  });
  const csv = [hdrs, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `lgms_calls_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}
