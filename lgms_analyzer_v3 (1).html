<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGMS Call Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
:root{--bg:#0b0e0d;--surface:#131816;--surface2:#1a2020;--border:#253030;--accent:#00d4aa;--accent2:#00a882;--warn:#ff5f3d;--yellow:#f5c842;--muted:#4a6060;--text:#e0eeeb;--text2:#7a9e98}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,212,170,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
header{padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;background:rgba(11,14,13,0.95);backdrop-filter:blur(8px)}
.logo-box{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#000}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:17px}
header h1 span{color:var(--accent)}
.header-badge{margin-left:auto;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.main{max-width:1040px;margin:0 auto;padding:32px 32px 80px;position:relative;z-index:1}
.tabs{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:none}
.tab.active{background:var(--accent);color:#000;font-weight:500}
.tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.panel{display:none}
.panel.active{display:block}
.upload-zone{border:2px dashed var(--border);border-radius:16px;padding:44px 40px;text-align:center;cursor:pointer;transition:all .25s;margin-bottom:20px;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--surface2)}
.upload-zone .up-icon{font-size:34px;margin-bottom:12px}
.upload-zone h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:6px}
.upload-zone p{color:var(--text2);font-size:12px;margin-bottom:18px}
.paste-area{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px}
.paste-area label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);display:block;margin-bottom:8px}
.paste-area input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;margin-bottom:10px;transition:border-color .2s}
.paste-area input:focus{border-color:var(--accent)}
.paste-area input::placeholder{color:var(--muted)}
.paste-area textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;outline:none;resize:vertical;min-height:200px;transition:border-color .2s}
.paste-area textarea:focus{border-color:var(--accent)}
.paste-area textarea::placeholder{color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--accent);color:#000;font-weight:500}
.btn-primary:hover{background:#00f0c0;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--muted);color:#000;cursor:not-allowed;transform:none;opacity:.7}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
#fileInput{display:none}
.file-queue{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;display:flex;align-items:center;gap:12px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.file-info{flex:1}
.file-name{font-size:13px}
.file-size{font-size:11px;color:var(--muted);margin-top:2px}
.file-status{font-size:10px;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.8px;font-weight:500}
.status-pending{background:rgba(74,96,96,.3);color:var(--muted)}
.status-processing{background:rgba(0,212,170,.12);color:var(--accent);animation:blink 1.4s infinite}
.status-done{background:rgba(0,212,170,.15);color:var(--accent)}
.status-error{background:rgba(255,95,61,.15);color:var(--warn)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px;transition:color .2s}
.remove-btn:hover{color:var(--warn)}
.actions{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.progress-text{font-size:12px;color:var(--muted);margin-left:4px}
.summary-strip{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px}
.sum-stat{flex:1;padding:16px 20px;border-right:1px solid var(--border);text-align:center}
.sum-stat:last-child{border-right:none}
.sum-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);line-height:1}
.sum-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:4px}
.section-hdr{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.call-cards{display:flex;flex-direction:column;gap:16px}
.call-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp .35s ease}
.card-head{padding:15px 20px;display:flex;align-items:center;gap:13px;cursor:pointer;user-select:none;background:var(--surface2);border-bottom:1px solid transparent;transition:border-color .2s}
.call-card.open .card-head{border-bottom-color:var(--border)}
.call-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000;flex-shrink:0}
.card-meta{flex:1}
.card-meta h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.card-meta p{font-size:11px;color:var(--muted);margin-top:2px}
.overall-badge{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;line-height:1}
.grade-pill{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;margin-left:8px}
.chevron{color:var(--muted);transition:transform .3s;font-size:13px;margin-left:6px}
.call-card.open .chevron{transform:rotate(180deg)}
.card-body{display:none;padding:22px}
.call-card.open .card-body{display:block}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:20px}
.score-tile{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 14px}
.score-tile .lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:5px}
.score-tile .val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1}
.score-tile .bar{height:3px;background:var(--border);border-radius:2px;margin:7px 0 5px;overflow:hidden}
.score-tile .bar-fill{height:100%;border-radius:2px}
.score-tile .note{font-size:11px;color:var(--text2);line-height:1.4}
.checklist{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:15px 17px;margin-bottom:18px}
.checklist-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:11px}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px}
.check-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);line-height:1.3}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.insight-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.insight-box .ib-title{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:9px}
.insight-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.insight-list li{display:flex;gap:8px;font-size:12px;color:var(--text2);line-height:1.4}
.insight-list li span{flex-shrink:0}
.summary-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:18px;white-space:pre-wrap}
.key-details-box{background:rgba(0,212,170,.05);border:1px solid rgba(0,212,170,.2);border-radius:10px;padding:13px 15px;font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:18px}
.sub-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:8px}
.error-box{background:rgba(255,95,61,.08);border:1px solid rgba(255,95,61,.25);border-radius:8px;padding:12px 16px;color:var(--warn);font-size:12px;line-height:1.6}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px}
.empty .eicon{font-size:32px;margin-bottom:12px;opacity:.35}
@media(max-width:640px){.main{padding:20px 16px 60px}header{padding:14px 16px}.two-col{grid-template-columns:1fr}.summary-strip{flex-wrap:wrap}.sum-stat{min-width:50%;border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<header>
  <div class="logo-box">LG</div>
  <h1>LGMS <span>Call Analyzer</span></h1>
  <div class="header-badge">Sales Intelligence</div>
</header>
<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('upload')">Upload .txt file</button>
    <button class="tab" onclick="switchTab('paste')">Paste transcript</button>
  </div>

  <div class="panel active" id="panel-upload">
    <div class="upload-zone" id="uploadZone">
      <div class="up-icon">📄</div>
      <h2>Drop transcript files here</h2>
      <p>.txt files · Multiple files supported</p>
      <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">+ Add Transcripts</button>
      <input type="file" id="fileInput" multiple accept=".txt,text/plain" />
    </div>
    <div class="file-queue" id="fileQueue"></div>
    <div class="actions" id="actionsBar" style="display:none">
      <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeAll()">▶ Analyze All</button>
      <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
      <span class="progress-text" id="progressText"></span>
    </div>
  </div>

  <div class="panel" id="panel-paste">
    <div class="paste-area">
      <label>Rep name</label>
      <input type="text" id="repName" placeholder="e.g. JD" />
      <label>Transcript</label>
      <textarea id="transcriptText" placeholder="Paste the call transcript here..."></textarea>
      <div style="margin-top:12px;display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" onclick="analyzePasted()">▶ Analyze</button>
        <span id="pasteError" style="font-size:12px;color:var(--warn)"></span>
      </div>
    </div>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="summary-strip" id="summaryStrip"></div>
    <div class="section-hdr">Analysis Results</div>
    <div class="call-cards" id="callCards"></div>
  </div>

  <div class="empty" id="emptyState">
    <div class="eicon">📞</div>
    <div>Upload transcript files or paste a transcript to get started</div>
  </div>
</div>

<script>
const SERVER = "http://127.0.0.1:8765";
const files = [];
let analyzing = false;
let resultCount = 0;

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='upload'?0:1)));
  document.getElementById('panel-upload').classList.toggle('active',tab==='upload');
  document.getElementById('panel-paste').classList.toggle('active',tab==='paste');
}

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over')});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');addFiles([...e.dataTransfer.files])});
document.getElementById('fileInput').addEventListener('change',e=>{addFiles([...e.target.files]);e.target.value=''});

function addFiles(newFiles){
  newFiles.forEach(f=>{if(f.name.endsWith('.txt')||f.type==='text/plain')files.push({file:f,status:'pending',result:null,error:null})});
  renderQueue();
  document.getElementById('emptyState').style.display=files.length?'none':'block';
  document.getElementById('actionsBar').style.display=files.length?'flex':'none';
}

function renderQueue(){
  document.getElementById('fileQueue').innerHTML=files.map((f,i)=>`
    <div class="file-item">
      <span>📄</span>
      <div class="file-info"><div class="file-name">${f.file.name}</div><div class="file-size">${(f.file.size/1024).toFixed(1)} KB</div></div>
      <span class="file-status status-${f.status}">${f.status}</span>
      ${f.status==='pending'?`<button class="remove-btn" onclick="removeFile(${i})">✕</button>`:''}
    </div>`).join('');
}

function removeFile(i){files.splice(i,1);renderQueue();document.getElementById('actionsBar').style.display=files.length?'flex':'none';document.getElementById('emptyState').style.display=files.length?'none':'block'}
function clearAll(){files.length=0;renderQueue();document.getElementById('actionsBar').style.display='none';document.getElementById('emptyState').style.display='block'}

async function readFile(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('Read failed'));r.readAsText(file)})}

async function callServer(transcript,filename){
  const resp=await fetch(`${SERVER}/analyze`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transcript,filename})});
  const data=await resp.json();
  if(!resp.ok)throw new Error(data.error||`Server error ${resp.status}`);
  return data;
}

async function analyzeAll(){
  if(analyzing)return;
  analyzing=true;
  document.getElementById('analyzeBtn').disabled=true;
  document.getElementById('resultsSection').style.display='block';
  const pending=files.filter(f=>f.status==='pending');
  let done=0;
  for(let i=0;i<files.length;i++){
    if(files[i].status!=='pending')continue;
    files[i].status='processing';renderQueue();
    document.getElementById('progressText').textContent=`Analyzing ${done+1} of ${pending.length}...`;
    try{
      const text=await readFile(files[i].file);
      files[i].result=await callServer(text,files[i].file.name);
      files[i].status='done';
      renderCard(files[i].result,++resultCount);
    }catch(e){files[i].status='error';files[i].error=e.message;renderErrorCard(files[i],i)}
    done++;renderQueue();updateSummary();
  }
  document.getElementById('progressText').textContent=`✓ Done — ${done} call${done!==1?'s':''} analyzed`;
  document.getElementById('analyzeBtn').disabled=false;
  analyzing=false;
}

async function analyzePasted(){
  const rep=document.getElementById('repName').value.trim();
  const text=document.getElementById('transcriptText').value.trim();
  const errEl=document.getElementById('pasteError');
  errEl.textContent='';
  if(!rep){errEl.textContent='Please enter the rep name.';return}
  if(!text){errEl.textContent='Please paste a transcript.';return}
  errEl.textContent='Analyzing...';
  try{
    const result=await callServer(text,`${rep} - call ${resultCount+1}.txt`);
    document.getElementById('resultsSection').style.display='block';
    document.getElementById('emptyState').style.display='none';
    renderCard(result,++resultCount);
    updateSummary();
    errEl.textContent='';
    document.getElementById('transcriptText').value='';
    document.getElementById('repName').value='';
  }catch(e){errEl.textContent=`Error: ${e.message}`}
}

function scoreColor(s){return s>=8?'var(--accent)':s>=5?'var(--yellow)':'var(--warn)'}
function getGrade(s){
  if(s>=9)return{label:'Excellent',bg:'rgba(0,212,170,0.15)',color:'var(--accent)'};
  if(s>=7)return{label:'Good',bg:'rgba(245,200,66,0.15)',color:'var(--yellow)'};
  if(s>=5)return{label:'Needs Work',bg:'rgba(255,95,61,0.12)',color:'var(--warn)'};
  return{label:'Poor',bg:'rgba(255,95,61,0.2)',color:'var(--warn)'};
}

const scoreLabels={info_sequence:'Info Sequence',price_delivery:'Price Delivery',fvp_pitch:'FVP Pitch',closing_attempt:'Closing',call_control:'Call Control',professionalism:'Professionalism'};
const checkLabels=[['got_move_date','Move Date'],['got_customer_name','Customer Name'],['got_phone_number','Phone Number'],['got_cities','Cities/Locations'],['got_home_type','Home Type'],['got_stairs_info','Stairs Info'],['did_full_inventory','Full Inventory'],['asked_forgotten_items','Forgotten Items'],['asked_about_boxes','Boxes'],['gave_price_on_call','Gave Price on Call'],['pitched_fvp','FVP Pitched'],['attempted_to_close','Closing Attempt'],['offered_email_estimate','Offered Email Estimate'],['mentioned_confirmations','Mentioned Confirmations'],['thanked_customer','Thanked Customer']];

const allResults=[];
function renderCard(r,idx){
  allResults.push(r);
  const overall=r.scores.overall.score;
  const grade=getGrade(overall);
  const id=`card-${idx}`;
  const scoresHTML=Object.entries(r.scores).filter(([k])=>k!=='overall').map(([k,v])=>{const col=scoreColor(v.score);return`<div class="score-tile"><div class="lbl">${scoreLabels[k]||k}</div><div class="val" style="color:${col}">${v.score}<span style="font-size:11px;color:var(--muted)">/10</span></div><div class="bar"><div class="bar-fill" style="width:${v.score*10}%;background:${col}"></div></div><div class="note">${v.note}</div></div>`}).join('');
  const checksHTML=checkLabels.map(([key,label])=>`<div class="check-item"><span>${r.checklist[key]?'✅':'❌'}</span>${label}</div>`).join('');
  const div=document.createElement('div');
  div.className='call-card open';div.id=id;
  div.innerHTML=`
    <div class="card-head" onclick="toggleCard('${id}')">
      <div class="call-num">${idx}</div>
      <div class="card-meta"><h3>${r.filename||`Call ${idx}`}</h3><p>${r.call_purpose} · ${r.caller_name} · ${r.move_type}</p></div>
      <div class="overall-badge" style="color:${scoreColor(overall)}">${overall}<span style="font-size:13px;color:var(--muted)">/10</span></div>
      <div class="grade-pill" style="background:${grade.bg};color:${grade.color}">${grade.label}</div>
      <span class="chevron">▾</span>
    </div>
    <div class="card-body">
      <div class="sub-label">Call Summary</div>
      <div class="summary-box">${r.call_summary}</div>
      ${r.key_details_captured?`<div class="sub-label">Key Details Captured</div><div class="key-details-box">${r.key_details_captured}</div>`:''}
      <div class="sub-label">Performance Scores</div>
      <div class="score-grid">${scoresHTML}</div>
      <div class="checklist"><div class="checklist-title">Process Checklist</div><div class="check-grid">${checksHTML}</div></div>
      <div class="two-col">
        <div class="insight-box"><div class="ib-title">Strengths</div><ul class="insight-list">${(r.strengths||[]).map(s=>`<li><span>💪</span>${s}</li>`).join('')}</ul></div>
        <div class="insight-box"><div class="ib-title">Coaching Points</div><ul class="insight-list">${(r.coaching_points||[]).map(s=>`<li><span>⚡</span>${s}</li>`).join('')}</ul></div>
      </div>
    </div>`;
  document.getElementById('callCards').appendChild(div);
}

function renderErrorCard(f,idx){
  const div=document.createElement('div');div.className='call-card open';
  div.innerHTML=`<div class="card-head"><div class="call-num" style="background:var(--warn)">${idx+1}</div><div class="card-meta"><h3>${f.file.name}</h3><p>Analysis failed</p></div></div><div class="card-body"><div class="error-box">⚠ ${f.error}</div></div>`;
  document.getElementById('callCards').appendChild(div);
}

function toggleCard(id){document.getElementById(id).classList.toggle('open')}

function updateSummary(){
  if(!allResults.length)return;
  const avg=key=>(allResults.reduce((a,r)=>a+r.scores[key].score,0)/allResults.length).toFixed(1);
  const clKeys=Object.keys(allResults[0].checklist);
  const pct=Math.round(allResults.reduce((a,r)=>a+clKeys.filter(k=>r.checklist[k]).length,0)/(allResults.length*clKeys.length)*100);
  document.getElementById('summaryStrip').innerHTML=`
    <div class="sum-stat"><div class="sum-num">${allResults.length}</div><div class="sum-lbl">Calls Analyzed</div></div>
    <div class="sum-stat"><div class="sum-num">${avg('overall')}</div><div class="sum-lbl">Avg Overall</div></div>
    <div class="sum-stat"><div class="sum-num">${avg('price_delivery')}</div><div class="sum-lbl">Price Delivery</div></div>
    <div class="sum-stat"><div class="sum-num">${avg('fvp_pitch')}</div><div class="sum-lbl">FVP Pitch</div></div>
    <div class="sum-stat"><div class="sum-num">${avg('closing_attempt')}</div><div class="sum-lbl">Closing</div></div>
    <div class="sum-stat"><div class="sum-num">${pct}%</div><div class="sum-lbl">Process Compliance</div></div>`;
}
</script>
</body>
</html>
